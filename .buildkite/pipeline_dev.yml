# Dev pipeline for tpu-inference-dev — modified to only run the Kimi-K2.6
# Unit Test step from .buildkite/models/moonshotai_Kimi-K2_6.yml. Used to
# verify the MLA kv_b_proj layout fix.
#
# HOW TO TRIGGER THIS PIPELINE
# ─────────────────────────────
# Option A — Buildkite UI:
#   Go to https://buildkite.com/tpu-commons/tpu-inference-dev
#   Click "New Build", set branch to your branch, click "Create Build".
#
# Option B — Buildkite API (requires BUILDKITE_API_TOKEN in your env):
#   curl -s -X POST \
#     -H "Authorization: Bearer $BUILDKITE_API_TOKEN" \
#     -H "Content-Type: application/json" \
#     "https://api.buildkite.com/v2/organizations/tpu-commons/pipelines/tpu-inference-dev/builds" \
#     -d "{\"commit\": \"$(git rev-parse HEAD)\", \"branch\": \"$(git rev-parse --abbrev-ref HEAD)\", \"message\": \"my test\"}"

steps:

  # -----------------------------------------------------------------
  # Build Step (required by the test step below)
  # -----------------------------------------------------------------
  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  # -----------------------------------------------------------------
  # Mirror of .buildkite/models/moonshotai_Kimi-K2_6.yml steps 16-36.
  # soft_fail flipped from upstream's true -> false so failure is loud.
  # -----------------------------------------------------------------
  - label: "tpu7x Unit tests for moonshotai/Kimi-K2.6"
    key: tpu7x_moonshotai_Kimi-K2_6_UnitTest
    depends_on: tpu7x_build_docker
    soft_fail: false
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      NEW_MODEL_DESIGN: "1"
      SKIP_ACCURACY_TESTS: "False"
      VLLM_MLA_DISABLE: "0"
      MOE_REQUANTIZE_BLOCK_SIZE: "512"
      MOE_REQUANTIZE_WEIGHT_DTYPE: "fp4"
      MODEL_IMPL_TYPE: "vllm"
      USE_V7X8_QUEUE: "True"
    commands:
      - |
        if [ "${TPU_VERSION:-tpu6e}" = "tpu6e" ]; then
          buildkite-agent meta-data set "${TPU_VERSION:-tpu6e}_moonshotai_Kimi-K2_6_UnitTest" "not enough HBM"
        else
          .buildkite/scripts/run_in_docker.sh \
            bash /workspace/tpu_inference/tests/e2e/benchmarking/mlperf.sh \
              -m "gs://tpu-commons-ci/moonshootai/kimi/2.6" -t 2750
        fi
