steps:

  # -----------------------------------------------------------------
  # Build Step (required by all demo steps below)
  # -----------------------------------------------------------------
  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  # -----------------------------------------------------------------
  # MMMU-pro Accuracy Tests
  # -----------------------------------------------------------------
  - label: "tpu7x [dev] MMMU-pro accuracy for Qwen/Qwen3-VL-8B-Instruct"
    key: tpu7x_dev_mmmu_pro_qwen3
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    agents:
      queue: tpu_v7x_8_queue
    soft_fail: true
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/check_mmmu_pro_accuracy.sh \
          --model "Qwen/Qwen3-VL-8B-Instruct" --threshold 0.15 --tp_size 8 --limit 50

  - label: "tpu7x [dev] MMMU-pro accuracy for Qwen/Qwen2.5-VL-7B-Instruct"
    key: tpu7x_dev_mmmu_pro_qwen2_5
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    agents:
      queue: tpu_v7x_8_queue
    soft_fail: true
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/check_mmmu_pro_accuracy.sh \
          --model "Qwen/Qwen2.5-VL-7B-Instruct" --threshold 0.15 --tp_size 4 --limit 50
