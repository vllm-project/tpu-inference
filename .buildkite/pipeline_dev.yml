# NVFP4 multi-model validation — run NVFP4 path on three checkpoints in
# parallel to verify the support is generic across model architectures
# and sizes.

steps:

  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  # Unit tests + accuracy + perf for the smallest NVFP4 model (the one PR
  # #2503 already exercises). Mirrors the previous validation gates.
  - label: "tpu7x NVFP4 unit tests"
    key: tpu7x_nvfp4_unit_tests
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    agents:
      queue: tpu_v7x_2_queue
    timeout_in_minutes: 30
    soft_fail: true
    commands:
      - .buildkite/scripts/run_in_docker.sh python3 -m pytest -s -v -x /workspace/tpu_inference/tests/layers/vllm/test_nvfp4.py

  - label: "tpu7x Accuracy for nvidia/Qwen3-30B-A3B-NVFP4"
    key: tpu7x_qwen3_30b_nvfp4_accuracy
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: "nvidia/Qwen3-30B-A3B-NVFP4"
      TENSOR_PARALLEL_SIZE: "8"
      MINIMUM_ACCURACY_THRESHOLD: "0.80"
      MODEL_IMPL_TYPE: "vllm"
    agents:
      queue: tpu_v7x_8_queue
    timeout_in_minutes: 120
    soft_fail: true
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/test_accuracy.sh

  - label: "tpu7x Performance for nvidia/Qwen3-30B-A3B-NVFP4"
    key: tpu7x_qwen3_30b_nvfp4_benchmark
    depends_on: tpu7x_qwen3_30b_nvfp4_accuracy
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: "nvidia/Qwen3-30B-A3B-NVFP4"
      TENSOR_PARALLEL_SIZE: "8"
      MINIMUM_THROUGHPUT_THRESHOLD: "5.00"
      INPUT_LEN: "1800"
      OUTPUT_LEN: "128"
      PREFIX_LEN: "0"
      MAX_MODEL_LEN: "2048"
      MAX_NUM_SEQS: "16"
      MAX_NUM_BATCHED_TOKENS: "2048"
      MODEL_IMPL_TYPE: "vllm"
    agents:
      queue: tpu_v7x_8_queue
    timeout_in_minutes: 120
    soft_fail: true
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/benchmark.sh

  # Accuracy: Qwen3-Coder-480B-A35B-Instruct-NVFP4
  - label: "tpu7x Accuracy for nvidia/Qwen3-Coder-480B-A35B-Instruct-NVFP4"
    key: tpu7x_qwen3_coder_480b_nvfp4_accuracy
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    agents:
      queue: tpu_v7x_8_queue
    timeout_in_minutes: 120
    soft_fail: true
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/check_lm_eval.sh \
          --model_name "nvidia/Qwen3-Coder-480B-A35B-Instruct-NVFP4" \
          --use_moe_ep_kernel 0 \
          --tensor_parallel_size 8 \
          --max_model_len 2048 \
          --max_num_batched_tokens 2048 \
          --max_gen_toks 256 \
          --enable_expert_parallel 1 \
          --flex_threshold 0.85 \
          --strict_threshold 0.70

  # Accuracy: Qwen3.5-397B-A17B-NVFP4
  - label: "tpu7x Accuracy for nvidia/Qwen3.5-397B-A17B-NVFP4"
    key: tpu7x_qwen3_5_397b_nvfp4_accuracy
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    agents:
      queue: tpu_v7x_8_queue
    timeout_in_minutes: 120
    soft_fail: true
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/check_lm_eval.sh \
          --model_name "nvidia/Qwen3.5-397B-A17B-NVFP4" \
          --use_moe_ep_kernel 0 \
          --tensor_parallel_size 8 \
          --max_model_len 4096 \
          --max_num_batched_tokens 4096 \
          --max_gen_toks 2048 \
          --enable_expert_parallel 1 \
          --flex_threshold 0.63 \
          --strict_threshold 0.63 \
          --limit_mm_per_prompt '{"image": 0, "video": 0}' \
          --block_size 256 \
          --limit 100 \
          --enable_thinking false
