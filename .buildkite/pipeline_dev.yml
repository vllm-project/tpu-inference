# Gemma4-31B perf probes — default RPA + batched RPA in parallel on v7x_2.
# Used on both the "before #2601" branch (revert) and "after fix" branch
# to produce a 4-cell comparison.

steps:
  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "tpu7x Gemma4-31B perf probe (default RPA)"
    key: tpu7x_gemma4_31b_perf_default
    depends_on: tpu7x_build_docker
    soft_fail: true
    agents:
      queue: tpu_v7x_2_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/.buildkite/scripts/perf_probe_gemma4_31b_v7x2.sh

  - label: "tpu7x Gemma4-31B perf probe (batched RPA)"
    key: tpu7x_gemma4_31b_perf_batched
    depends_on: tpu7x_build_docker
    soft_fail: true
    agents:
      queue: tpu_v7x_2_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/.buildkite/scripts/perf_probe_gemma4_31b_v7x2_batched.sh
