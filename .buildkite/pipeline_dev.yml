# Dev pipeline for tpu-inference-dev.
# Re-runs the nightly "tpu7x Performance benchmarks for google/gemma-4-31B-it"
# step against the latest releases/v0.21.0 (which now has the merged
# TIMEOUT_SECONDS=1800 bump from PR #2722) before triggering the full nightly.

steps:

  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "tpu7x Performance benchmarks for google/gemma-4-31B-it (TIMEOUT_SECONDS=1800)"
    key: tpu7x_gemma_4_31B_it_perf_timeout_check
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: google/gemma-4-31B-it
      TENSOR_PARALLEL_SIZE: 8
      MINIMUM_THROUGHPUT_THRESHOLD: 1.80
    commands:
      - .buildkite/scripts/run_in_docker.sh bash -c 'TIMEOUT_SECONDS=1800 USE_BATCHED_RPA_KERNEL=1 JITTED_MM_MODULE_KEYS="model.vision_tower.encoder" REGISTER_MM_MODULE_CUSTOM_PYTREE_CLASSES="transformers.modeling_outputs.BaseModelOutputWithPast" /workspace/tpu_inference/tests/e2e/benchmarking/mm_bench_recipe.sh'
