steps:
  - label: ":docker: Build base image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "tpu7x dense_gather_reduce kernel correctness (fix)"
    key: tpu7x_dgr
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_2_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash -c 'python3 -m pytest -s -v /workspace/tpu_inference/tests/kernels/dense_gather_reduce_test.py'

  - label: "tpu7x Qwen3-30B-A3B accuracy (fix validation)"
    key: tpu7x_qwen3_accuracy
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: Qwen/Qwen3-30B-A3B
      TENSOR_PARALLEL_SIZE: "8"
      MINIMUM_ACCURACY_THRESHOLD: "0.89"
      MODEL_IMPL_TYPE: vllm
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/test_accuracy.sh
