# Dev verification for PR #3121 (vLLM-qualified multi-host image tag).
# Runs ONLY the Ray-based multi-host test, as a 3x matrix so it spreads across
# the multi-host machines (and past the known-bad one). A 30-min step timeout
# reaps any stalled run instead of squatting the 2h internal health timeout.
# run_multihost.sh builds its own image, so NO USE_PREBUILT_IMAGE / depends_on.
steps:
  - label: "tpu7x Ray multi-host verify #3121 (run {{matrix}})"
    key: tpu7x_ray_multihost_verify
    agents:
      queue: tpu_v7x_16_queue
    env:
      TPU_VERSION: "tpu7x"
    timeout_in_minutes: 30
    matrix: ["1", "2", "3"]
    commands:
      - |
        MODEL="gs://tpu-commons-ci/qwen/models--Qwen--Qwen3-30B-A3B/snapshots/ad44e777bcd18fa416d9da3bd8f70d33ebb85d39"
        .buildkite/scripts/run_multihost.sh \
          "vllm serve \${MODEL} \
            --port 8000 \
            --tensor-parallel-size 16 \
            --trust-remote-code \
            --max-model-len 1024 \
            --no-async-scheduling \
            --load-format=runai_streamer \
            --no-enable-prefix-caching" \
          "curl http://localhost:8000/v1/completions \
            -X POST \
            -H 'Content-Type: application/json' \
            -d '{\"model\": \"${MODEL}\", \"prompt\": \"San Francisco is a\", \"max_tokens\": 50}'
          "
