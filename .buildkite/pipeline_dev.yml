# Gemma-4 E2B integration on rebased #2572 + merged #2632.
# Runs on both v6e (TP=1) and v7x_2 (TP=2), each with default RPA
# and USE_BATCHED_RPA_KERNEL=1.

steps:
  - label: ":docker: Build and Push Base Image (tpu6e)"
    key: tpu6e_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu6e"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "tpu6e E2B default RPA"
    key: tpu6e_e2b_default
    depends_on: tpu6e_build_docker
    soft_fail: true
    agents:
      queue: tpu_v6e_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu6e"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/.buildkite/scripts/e2b_probe.sh

  - label: "tpu6e E2B + USE_BATCHED_RPA_KERNEL=1"
    key: tpu6e_e2b_batched_rpa
    depends_on: tpu6e_build_docker
    soft_fail: true
    agents:
      queue: tpu_v6e_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu6e"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/.buildkite/scripts/e2b_probe_batched.sh

  - label: "tpu7x E2B default RPA (TP=2)"
    key: tpu7x_e2b_default
    depends_on: tpu7x_build_docker
    soft_fail: true
    agents:
      queue: tpu_v7x_2_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/.buildkite/scripts/e2b_probe_tpu7x.sh

  - label: "tpu7x E2B + USE_BATCHED_RPA_KERNEL=1 (TP=2)"
    key: tpu7x_e2b_batched_rpa
    depends_on: tpu7x_build_docker
    soft_fail: true
    agents:
      queue: tpu_v7x_2_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/.buildkite/scripts/e2b_probe_tpu7x_batched.sh
