# Dev pipeline for tpu-inference-dev.
# Demo/sample steps showing how to run custom tests on tpu7x.
# Copy and adapt any step for your own experiments.
#
# HOW TO TRIGGER THIS PIPELINE
# ─────────────────────────────
# Option A — Buildkite UI:
#   Go to https://buildkite.com/tpu-commons/tpu-inference-dev
#   Click "New Build", set branch to your branch, click "Create Build".
#
# Option B — Buildkite API (requires BUILDKITE_API_TOKEN in your env):
#   curl -s -X POST \
#     -H "Authorization: Bearer $BUILDKITE_API_TOKEN" \
#     -H "Content-Type: application/json" \
#     "https://api.buildkite.com/v2/organizations/tpu-commons/pipelines/tpu-inference-dev/builds" \
#     -d "{\"commit\": \"$(git rev-parse HEAD)\", \"branch\": \"$(git rev-parse --abbrev-ref HEAD)\", \"message\": \"my test\"}"
#
# HOW TO CUSTOMIZE
# ─────────────────
# 1. On your branch, edit this file — use any demo step below as a starting point.
# 2. Change the command, model, env vars, or queue as needed.
# 3. Trigger the pipeline — only your branch's file is used.

steps:

  # -----------------------------------------------------------------
  # Build Step (required by all steps below)
  # -----------------------------------------------------------------
  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  # -----------------------------------------------------------------
  # lm_eval raw run: Qwen3-Coder-480B-A35B-Instruct-FP8
  # Runs the lm_eval harness directly with mmlu_llama task.
  # -----------------------------------------------------------------
  - label: "tpu7x lm_eval Qwen3-Coder-480B-A35B-Instruct-FP8"
    key: tpu7x_lm_eval_qwen3_coder_480b
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    agents:
      queue: tpu_v7x_8_queue
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash -c '
          lm_eval --model vllm \
            --model_args pretrained=Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8,tensor_parallel_size=8,dtype=auto,max_num_seqs=512,max_num_batched_tokens=4096,gpu_memory_utilization=0.9,max_model_len=8192,enable_prefix_caching=False,enable_expert_parallel=True,download_dir=/mnt/disks/persist \
            --tasks mmlu_llama \
            --num_fewshot 0 \
            --apply_chat_template \
            --batch_size auto \
            --output_path ./results/_Qwen-Qwen3-Coder-480B-A35B-Instruct-FP8.json \
            --limit 100'

  # -----------------------------------------------------------------
  # Accuracy test: Qwen3-Coder-480B-A35B-Instruct-FP8
  # Uses check_lm_eval.sh with thresholds from the model YAML.
  # -----------------------------------------------------------------
  - label: "tpu7x accuracy Qwen3-Coder-480B-A35B-Instruct-FP8"
    key: tpu7x_accuracy_qwen3_coder_480b
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    agents:
      queue: tpu_v7x_8_queue
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/check_lm_eval.sh \
          --model_name "Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8" \
          --use_moe_ep_kernel 0 \
          --tensor_parallel_size 8 \
          --max_model_len 2048 \
          --max_num_batched_tokens 2048 \
          --max_gen_toks 256 \
          --enable_expert_parallel 1 \
          --flex_threshold 0.85 \
          --strict_threshold 0.70
