steps:

  # -----------------------------------------------------------------
  # Build Step (required to build the base image)
  # -----------------------------------------------------------------
  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  # -----------------------------------------------------------------
  # Gemma4-31B Benchmark Step
  # -----------------------------------------------------------------
  - label: "tpu7x Gemma4-31B-1k/1f512x512/500-GBS256"
    key: tpu7x_gemma4_31b_bench
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    agents:
      queue: tpu_v7x_2_queue
    commands:
      - bash .buildkite/benchmark/scripts/run_job.sh .buildkite/benchmark/cases/daily/Gemma4-31B-dataset_custom-inlen_1024-outlen_500.json Gemma4-31B-1k/1f512x512/500-GBS256