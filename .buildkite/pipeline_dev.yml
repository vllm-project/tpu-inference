# Dev pipeline for tpu-inference-dev.
#
# NOTE (branch-local): the upstream demo steps (offline_inference, serve+bench,
# disaggregation, multi-host) have been removed on this branch so that only the
# Gemma3-4B MaxText inference smoke test runs. Restore them from main before
# merging -- this file is a shared starting point for other people's dev runs.
#
# HOW TO TRIGGER THIS PIPELINE
# ─────────────────────────────
# Option A — Buildkite UI:
#   Go to https://buildkite.com/tpu-commons/tpu-inference-dev
#   Click "New Build", set branch to your branch, click "Create Build".
#
# Option B — Buildkite API (requires BUILDKITE_API_TOKEN in your env):
#   curl -s -X POST \
#     -H "Authorization: Bearer $BUILDKITE_API_TOKEN" \
#     -H "Content-Type: application/json" \
#     "https://api.buildkite.com/v2/organizations/tpu-commons/pipelines/tpu-inference-dev/builds" \
#     -d "{\"commit\": \"$(git rev-parse HEAD)\", \"branch\": \"$(git rev-parse --abbrev-ref HEAD)\", \"message\": \"my test\"}"
#
# HOW TO CUSTOMIZE
# ─────────────────
# 1. On your branch, edit this file — use the step below as a starting point.
# 2. Change the command, model, env vars, or queue as needed.
# 3. Trigger the pipeline — only your branch's file is used.

steps:

  # -----------------------------------------------------------------
  # Build Step (required by the test step below)
  # -----------------------------------------------------------------
  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  # -----------------------------------------------------------------
  # Gemma3-4B MaxText inference smoke test (dev trial of .buildkite/rl/gemma3_maxtext_inference.yml)
  # Runs the same script the nightly rl/ matrix runs, but on tpu7x here.
  # Requires: HF_TOKEN in the agent env, and read access to GEMMA3_MT_CKPT.
  # This step is a dev-only trial; remove it before merging the rl/ entry.
  # -----------------------------------------------------------------
  - label: "tpu7x [dev] gemma3 maxtext inference smoke test"
    key: tpu7x_dev_gemma3_maxtext_inference
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    agents:
      queue: tpu_v7x_2_queue
    commands:
      # run_in_docker.sh forwards HF_TOKEN into the container but not arbitrary
      # env, so to override the checkpoint, set GEMMA3_MT_CKPT *inside* the
      # command, e.g.:
      #   ... bash -c 'GEMMA3_MT_CKPT=gs://.../items bash /workspace/tpu_inference/tests/e2e/test_gemma3_maxtext_inference.sh'
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/test_gemma3_maxtext_inference.sh

