steps:
  - label: ":docker: Build base image (tpu6e)"
    key: tpu6e_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu6e"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "tpu6e JAX unit tests - kernels (libtpu 0.0.43)"
    key: tpu6e_kernels_libtpu043
    depends_on: tpu6e_build_docker
    timeout_in_minutes: 180
    agents:
      queue: tpu_v6e_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu6e"
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh \
          bash -c 'echo "== host: $(hostname)" \
          && python3 -c "import os; d=os.environ.get(\"JAX_COMPILATION_CACHE_DIR\",\"UNSET\"); print(\"cache dir:\", d); print(\"entries:\", len(os.listdir(d)) if os.path.isdir(d) else \"NO DIR\")" \
          && echo "=== ARM A: libtpu 0.0.42.1, persistent cache DISABLED ===" \
          && pip install --no-deps libtpu==0.0.42.1 2>&1 | tail -1 \
          && JAX_ENABLE_COMPILATION_CACHE=false python3 -m pytest -q --durations=15 /workspace/tpu_inference/tests/kernels/transpose_test.py /workspace/tpu_inference/tests/kernels/gmm_test.py \
          && echo "=== ARM B: libtpu 0.0.43, persistent cache DISABLED ===" \
          && pip install --no-deps libtpu==0.0.43 2>&1 | tail -1 \
          && JAX_ENABLE_COMPILATION_CACHE=false python3 -m pytest -q --durations=15 /workspace/tpu_inference/tests/kernels/transpose_test.py /workspace/tpu_inference/tests/kernels/gmm_test.py \
          && echo "=== PROBE: cache ON, transpose twice (2nd should be fast if cache works) ===" \
          && python3 -m pytest -q /workspace/tpu_inference/tests/kernels/transpose_test.py \
          && python3 -c "import os; d=os.environ[\"JAX_COMPILATION_CACHE_DIR\"]; print(\"entries after probe1:\", len(os.listdir(d)))" \
          && python3 -m pytest -q /workspace/tpu_inference/tests/kernels/transpose_test.py'
