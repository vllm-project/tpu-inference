# Verify the Kimi-K2.6 fixes on current main (#2836 OOM condition):
#   - gpu-memory-utilization 0.977 -> 0.95  (fixes CompileTimeHbmOom)
#   - mmlu.sh client --trust-remote-code    (fixes Accuracy tokenizer load)
# Runs BOTH the Unit test (mlperf.sh) and Accuracy (mmlu.sh) Kimi jobs.
steps:
  - label: ":docker: Build base image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "tpu7x Kimi-K2.6 UNIT test (mlperf.sh)"
    key: tpu7x_kimi_unit
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      NEW_MODEL_DESIGN: "1"
      SKIP_ACCURACY_TESTS: "False"
      VLLM_MLA_DISABLE: "0"
      MOE_REQUANTIZE_BLOCK_SIZE: "512"
      MOE_REQUANTIZE_WEIGHT_DTYPE: "fp4"
      MODEL_IMPL_TYPE: "vllm"
      USE_V7X8_QUEUE: "True"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mlperf.sh -m "gs://tpu-commons-ci/moonshootai/kimi/2.6" -t 2750

  - label: "tpu7x Kimi-K2.6 ACCURACY (mmlu.sh)"
    key: tpu7x_kimi_acc
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      NEW_MODEL_DESIGN: "1"
      SKIP_ACCURACY_TESTS: "False"
      VLLM_MLA_DISABLE: "0"
      MOE_REQUANTIZE_BLOCK_SIZE: "512"
      MOE_REQUANTIZE_WEIGHT_DTYPE: "fp4"
      DEVICE_COUNT: "8"
      MODEL_IMPL_TYPE: "vllm"
      MINIMUM_ACCURACY_THRESHOLD: "0.86"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mmlu.sh -m "gs://tpu-commons-ci/moonshootai/kimi/2.6" -n 1000 -l 4
