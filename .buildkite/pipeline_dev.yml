# Gemma-4 E4B-it: full hardware × kernel matrix. Six parallel chains —
# 3 topologies (v6e TP=1, v6e_8 TP=8, v7x_2 TP=2) × 2 RPA kernels
# (default v3, experimental batched). Goal: pick the right
# (topology, kernel) pair for the production nightly.
#
# Each chain: UnitTest (offline_inference) → Accuracy (gsm8k chat-templated
# lm_eval) → Benchmark (text-only `vllm bench serve` random 1024/128).
# Batched kernel is toggled per chain via USE_BATCHED_RPA_KERNEL=1 in the
# step env (whitelisted in run_in_docker.sh).

steps:
  - label: ":docker: Build and Push Base Image (tpu6e)"
    key: tpu6e_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu6e"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  # ============== default RPA chains ==============

  # -------- v6e TP=1 / default RPA --------
  - label: "[v6e TP=1 / default] Unit test for google/gemma-4-E4B-it"
    key: e4b_v6e_default_unit
    depends_on: tpu6e_build_docker
    soft_fail: true
    agents:
      queue: tpu_v6e_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu6e"
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh \
          bash -c 'JITTED_MM_MODULE_KEYS="model.vision_tower.encoder" REGISTER_MM_MODULE_CUSTOM_PYTREE_CLASSES="transformers.modeling_outputs.BaseModelOutputWithPast" SKIP_JAX_PRECOMPILE=1 VLLM_XLA_CHECK_RECOMPILATION=0 python /workspace/tpu_inference/examples/offline_inference.py --model google/gemma-4-E4B-it --tensor-parallel-size 1 --max-num-batched-tokens 4096 --max-model-len 4096 --use-chat-template'

  - label: "[v6e TP=1 / default] gsm8k accuracy for google/gemma-4-E4B-it"
    key: e4b_v6e_default_accuracy
    depends_on: e4b_v6e_default_unit
    soft_fail: true
    agents:
      queue: tpu_v6e_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu6e"
      TEST_MODEL: google/gemma-4-E4B-it
      TENSOR_PARALLEL_SIZE: 1
      USE_CHAT_TEMPLATE: "1"
      MINIMUM_ACCURACY_THRESHOLD: 0.05
    commands:
      - .buildkite/scripts/run_in_docker.sh bash -c 'bash /workspace/tpu_inference/tests/e2e/benchmarking/test_accuracy.sh'

  - label: "[v6e TP=1 / default] text-only bench for google/gemma-4-E4B-it"
    key: e4b_v6e_default_bench
    depends_on: e4b_v6e_default_accuracy
    soft_fail: true
    agents:
      queue: tpu_v6e_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu6e"
      TEST_MODEL: google/gemma-4-E4B-it
      TENSOR_PARALLEL_SIZE: 1
      BENCH_DATASET: "text"
      INPUT_LEN: "1024"
      OUTPUT_LEN: "128"
      MAX_MODEL_LEN: "4096"
      MAX_NUM_SEQS: "64"
      GPU_MEMORY_UTILIZATION: "0.85"
      MINIMUM_THROUGHPUT_THRESHOLD: 0.0
    commands:
      - .buildkite/scripts/run_in_docker.sh bash -c 'TIMEOUT_SECONDS=960 JITTED_MM_MODULE_KEYS="model.vision_tower.encoder" REGISTER_MM_MODULE_CUSTOM_PYTREE_CLASSES="transformers.modeling_outputs.BaseModelOutputWithPast" /workspace/tpu_inference/tests/e2e/benchmarking/mm_bench_recipe.sh'

