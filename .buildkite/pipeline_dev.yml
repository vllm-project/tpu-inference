# Dev pipeline: verify #2915 (explicit engine_core.shutdown() instead of del+sleep)
# resolves the "TPU already in use / libtpu lockfile" contention seen in nightlies.
# Each contention-affected e2e test runs in its own step/container, mirroring how the
# nightly runs them (one `pytest -s -v -x <file>` per job).

steps:
  - label: ":docker: Build base image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "tpu7x verify #2915 — DP"
    key: tpu7x_verify_2915_dp
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash -c 'python3 -m pytest -s -v -x /workspace/tpu_inference/tests/e2e/test_data_parallel.py'

  - label: "tpu7x verify #2915 — EP"
    key: tpu7x_verify_2915_ep
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash -c 'python3 -m pytest -s -v -x /workspace/tpu_inference/tests/e2e/test_expert_parallel.py'

  - label: "tpu7x verify #2915 — TP"
    key: tpu7x_verify_2915_tp
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash -c 'python3 -m pytest -s -v -x /workspace/tpu_inference/tests/e2e/test_tensor_parallel.py'

  - label: "tpu7x verify #2915 — SP"
    key: tpu7x_verify_2915_sp
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash -c 'python3 -m pytest -s -v -x /workspace/tpu_inference/tests/e2e/test_sequence_parallelism.py'

  - label: "tpu7x verify #2915 — async scheduler"
    key: tpu7x_verify_2915_async
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_2_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash -c 'python3 -m pytest -s -v -x /workspace/tpu_inference/tests/e2e/test_async_scheduler.py'

  - label: "tpu7x verify #2915 — LoRA_Torch perf"
    key: tpu7x_verify_2915_lora
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_2_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash -c 'MODEL_IMPL_TYPE=vllm TPU_BACKEND_TYPE=jax python3 -m pytest -s -v -x /workspace/tpu_inference/tests/lora/test_lora_perf.py'
