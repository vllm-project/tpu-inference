# A/B for the Ray multi-host hang: does it hang under the Ray Executor V2
# (default, migrated in #2893) but pass under the V1 executor? Same model /
# machines / image (off #3121, so the correct vLLM is distributed); the only
# variable is VLLM_USE_RAY_V2_EXECUTOR_BACKEND (0=V1, 1=V2), forwarded into the
# head+worker containers by run_multihost.sh. V1 x2 + V2 x1 = 3 jobs for the 3
# multi-host machines. 30-min timeout reaps any stall (internal is 7200s).
steps:
  - label: "tpu7x Ray multi-host EXECUTOR-V1 (run {{matrix}})"
    key: tpu7x_ray_executor_v1
    agents:
      queue: tpu_v7x_16_queue
    env:
      TPU_VERSION: "tpu7x"
      VLLM_USE_RAY_V2_EXECUTOR_BACKEND: "0"
    timeout_in_minutes: 30
    matrix: ["1", "2"]
    commands:
      - |
        MODEL="gs://tpu-commons-ci/qwen/models--Qwen--Qwen3-30B-A3B/snapshots/ad44e777bcd18fa416d9da3bd8f70d33ebb85d39"
        .buildkite/scripts/run_multihost.sh \
          "vllm serve \${MODEL} \
            --port 8000 \
            --tensor-parallel-size 16 \
            --trust-remote-code \
            --max-model-len 1024 \
            --no-async-scheduling \
            --load-format=runai_streamer \
            --no-enable-prefix-caching" \
          "curl http://localhost:8000/v1/completions \
            -X POST \
            -H 'Content-Type: application/json' \
            -d '{\"model\": \"${MODEL}\", \"prompt\": \"San Francisco is a\", \"max_tokens\": 50}'
          "

  - label: "tpu7x Ray multi-host EXECUTOR-V2 (control)"
    key: tpu7x_ray_executor_v2
    agents:
      queue: tpu_v7x_16_queue
    env:
      TPU_VERSION: "tpu7x"
      VLLM_USE_RAY_V2_EXECUTOR_BACKEND: "1"
    timeout_in_minutes: 30
    commands:
      - |
        MODEL="gs://tpu-commons-ci/qwen/models--Qwen--Qwen3-30B-A3B/snapshots/ad44e777bcd18fa416d9da3bd8f70d33ebb85d39"
        .buildkite/scripts/run_multihost.sh \
          "vllm serve \${MODEL} \
            --port 8000 \
            --tensor-parallel-size 16 \
            --trust-remote-code \
            --max-model-len 1024 \
            --no-async-scheduling \
            --load-format=runai_streamer \
            --no-enable-prefix-caching" \
          "curl http://localhost:8000/v1/completions \
            -X POST \
            -H 'Content-Type: application/json' \
            -d '{\"model\": \"${MODEL}\", \"prompt\": \"San Francisco is a\", \"max_tokens\": 50}'
          "
