# Prebuilt-image POC #2: torchtpu-vllm image built locally, pushed to CI
# registry, executed on v6e-1. No CPU-builder step needed.

steps:
  - label: "tpu6e [poc] torchtpu-vllm prebuilt — offline_inference"
    key: tpu6e_poc_torchtpu_vllm
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu6e"
      MODEL_IMPL_TYPE: "vllm"
    agents:
      queue: tpu_v6e_queue
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash -c '
          cd /root/tpu_inference &&
          python3 -c "import vllm, jax; print(\"vllm\", vllm.__version__, \"jax\", jax.__version__)" &&
          python3 examples/offline_inference.py \
            --model Qwen/Qwen3-0.6B \
            --max-model-len 256 \
            --max-tokens 32'
