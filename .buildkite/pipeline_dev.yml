steps:

  # -----------------------------------------------------------------
  # Build Step (required by all demo steps below)
  # -----------------------------------------------------------------
  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "tpu7x disagg test"
    key: tpu7x_disagg
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      NIGHTLY: "1"
      MODEL_IMPL_TYPE: "vllm"
      TEST_MODE: 1
    agents:
      queue: tpu_v7x_8_queue
    commands:
      - |
        if [[ "tpu7x" == "tpu7x" ]]; then
          .buildkite/scripts/run_in_docker.sh \
            python3 -m pytest -s -v /workspace/tpu_inference/tests/e2e/test_local_disagg.py::test_disaggregated_serving \
            /workspace/tpu_inference/tests/e2e/test_local_disagg.py::test_disaggregated_serving_correctness          
        else
          echo "Skipping: Step requires TPU v7x."
          exit 0
        fi
