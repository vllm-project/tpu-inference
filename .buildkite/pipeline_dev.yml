# Minimal pipeline for prebuilt-image proof-of-concept.
# Image was built locally (outside CI) and pushed to the CI registry
# under the tag matching this commit. CI just pulls and runs it.

steps:
  - label: "tpu6e [poc] prebuilt image — dump OS, confirm no vllm"
    key: tpu6e_poc_prebuilt
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu6e"
    agents:
      queue: tpu_v6e_queue
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash -c '
          echo "=== /etc/os-release ===" &&
          cat /etc/os-release &&
          echo "=== uname -a ===" &&
          uname -a &&
          echo "=== python3 --version ===" &&
          python3 --version &&
          echo "=== jax version ===" &&
          python3 -c "import jax; print(jax.__version__)" &&
          echo "=== vllm import (expect failure) ===" &&
          python3 -c "
        try:
            import vllm
            print(\"FAIL: vllm IS installed:\", vllm.__version__)
            exit(1)
        except ImportError as e:
            print(\"PASS: vllm not installed —\", e)
        "'
