# Reproduce Jacob's TP=2 HBM "Init model" numbers from PR #2503 description
# for Qwen3-Coder-30B-A3B-Instruct in FP8 and NVFP4 variants.

steps:

  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "tpu7x Accuracy for Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8 (TP=2)"
    key: tpu7x_qwen3_coder_30b_fp8_accuracy
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      # Plumb DISABLE_WEIGHT_REQUANTIZATION=1 into the container (matches
      # Jacob's local run); run_in_docker.sh does not propagate this var
      # by default.
      BENCHMARK_DOCKER_ARGS_STR: |-
        -e
        DISABLE_WEIGHT_REQUANTIZATION=1
    agents:
      queue: tpu_v7x_2_queue
    timeout_in_minutes: 120
    soft_fail: true
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/check_lm_eval.sh \
          --model_name "Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8" \
          --use_moe_ep_kernel 0 \
          --tensor_parallel_size 2 \
          --max_model_len 2048 \
          --max_num_batched_tokens 2048 \
          --max_gen_toks 256 \
          --enable_expert_parallel 1 \
          --flex_threshold 0.50 \
          --strict_threshold 0.50 \
          --limit 50

  - label: "tpu7x Accuracy for NVFP4/Qwen3-Coder-30B-A3B-Instruct-FP4 (TP=2)"
    key: tpu7x_qwen3_coder_30b_nvfp4_accuracy
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      BENCHMARK_DOCKER_ARGS_STR: |-
        -e
        DISABLE_WEIGHT_REQUANTIZATION=1
    agents:
      queue: tpu_v7x_2_queue
    timeout_in_minutes: 120
    soft_fail: true
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/check_lm_eval.sh \
          --model_name "NVFP4/Qwen3-Coder-30B-A3B-Instruct-FP4" \
          --use_moe_ep_kernel 0 \
          --tensor_parallel_size 2 \
          --max_model_len 2048 \
          --max_num_batched_tokens 2048 \
          --max_gen_toks 256 \
          --enable_expert_parallel 1 \
          --flex_threshold 0.50 \
          --strict_threshold 0.50 \
          --limit 50
