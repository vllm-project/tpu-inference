# Flakiness repro: run tpu7x DP correctness test 10 times.
# Mirrors the step from .buildkite/parallelism/DP.yml that failed in
# https://buildkite.com/tpu-commons/tpu-inference-ci/builds/15073

steps:

  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "tpu7x DP correctness repro #1"
    key: tpu7x_dp_correctness_1
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      NEW_MODEL_DESIGN: "1"
    agents:
      queue: tpu_v7x_8_queue
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh \
          bash -c 'python3 -m pytest -s -v -x /workspace/tpu_inference/tests/e2e/test_data_parallel.py::test_dp_correctness'

  - label: "tpu7x DP correctness repro #2"
