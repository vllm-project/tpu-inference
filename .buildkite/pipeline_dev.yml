steps:
  - label: ":docker: Build base image (tpu6e)"
    key: tpu6e_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu6e"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "tpu6e Qwen3-30B-A3B accuracy (bisect)"
    key: tpu6e_qwen3_accuracy
    depends_on: tpu6e_build_docker
    agents:
      queue: tpu_v6e_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu6e"
      TEST_MODEL: Qwen/Qwen3-30B-A3B
      TENSOR_PARALLEL_SIZE: "8"
      MINIMUM_ACCURACY_THRESHOLD: "0.89"
      MODEL_IMPL_TYPE: vllm
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/test_accuracy.sh

  - label: "tpu6e Multimodal Inputs (bisect)"
    key: tpu6e_multimodal
    depends_on: tpu6e_build_docker
    agents:
      queue: tpu_v6e_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu6e"
    commands:
      - .buildkite/scripts/run_in_docker.sh python3 -m pytest -s -v /workspace/tpu_inference/tests/e2e/test_multi_modal_inference.py
