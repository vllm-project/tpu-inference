# NVFP4 perf collection for the two large models. Accuracy was already
# validated in build #380. Thresholds set to nominal values (~0) so the
# gate passes regardless of perf — purpose is to *collect* the numbers.

steps:

  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  # Perf: nvidia/Qwen3-Coder-480B-A35B-Instruct-NVFP4
  # ~240GB at NVFP4 — needs long timeout for download + load + benchmark.
  - label: "tpu7x Performance for nvidia/Qwen3-Coder-480B-A35B-Instruct-NVFP4"
    key: tpu7x_qwen3_coder_480b_nvfp4_benchmark
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    agents:
      queue: tpu_v7x_8_queue
    timeout_in_minutes: 240
    soft_fail: true
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/bm_qwen3_coder.sh \
          --model nvidia/Qwen3-Coder-480B-A35B-Instruct-NVFP4 \
          --tp 8 \
          --req_tput_limit 0.001 \
          --output_token_tput_limit 1 \
          --total_token_tput_limit 1 \
          --input_len 1024 \
          --output_len 8192 \
          --use_moe_ep_kernel 0

  # Perf: nvidia/Qwen3.5-397B-A17B-NVFP4
  - label: "tpu7x Performance for nvidia/Qwen3.5-397B-A17B-NVFP4"
    key: tpu7x_qwen3_5_397b_nvfp4_benchmark
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    agents:
      queue: tpu_v7x_8_queue
    timeout_in_minutes: 240
    soft_fail: true
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/bm_qwen3_coder.sh \
          --model nvidia/Qwen3.5-397B-A17B-NVFP4 \
          --tp 8 \
          --req_tput_limit 0.001 \
          --output_token_tput_limit 1 \
          --total_token_tput_limit 1 \
          --input_len 1024 \
          --output_len 8192 \
          --use_moe_ep_kernel 0 \
          --limit_mm_per_prompt '{"image": 0, "video": 0}' \
          --block_size 256 \
          --num_prompts 64 \
          --timeout 52 \
          --gpu-memory-utilization 0.9
