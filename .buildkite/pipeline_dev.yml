steps:
  - label: ":docker: Build base image (tpu6e)"
    key: tpu6e_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu6e"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "tpu6e JAX unit tests - kernels (libtpu 0.0.43)"
    key: tpu6e_kernels_libtpu043
    depends_on: tpu6e_build_docker
    timeout_in_minutes: 180
    agents:
      queue: tpu_v6e_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu6e"
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh \
          bash -c 'echo "== cache diag: host=$(hostname) dir=$JAX_COMPILATION_CACHE_DIR" \
          && echo "== cache entries visible in container: $(ls "$JAX_COMPILATION_CACHE_DIR" 2>/dev/null | wc -l)" \
          && echo "== env flags ==" && (env | grep -iE "LIBTPU|XLA_FLAGS|^TPU_|JAX_" || true) \
          && pip install --no-deps libtpu==0.0.43 \
          && python3 -c "import libtpu, os; print(\"libtpu dir:\", os.path.dirname(libtpu.__file__))" \
          && pip list 2>/dev/null | grep -iE "^(jax|jaxlib|libtpu) " \
          && JAX_DEBUG_LOG_MODULES=jax._src.compilation_cache,jax._src.compiler \
          python3 -m pytest -s -v -x /workspace/tpu_inference/tests/kernels/transpose_test.py /workspace/tpu_inference/tests/kernels/gmm_test.py \
          && echo "== cache entries after: $(ls "$JAX_COMPILATION_CACHE_DIR" 2>/dev/null | wc -l)"'
