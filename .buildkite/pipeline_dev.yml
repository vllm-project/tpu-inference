# Dev pipeline: search gpu-memory-utilization for Qwen3.5-397B-A17B-FP8 on tpu7x @ jax 0.10.2.
steps:
  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "tpu7x 397B-FP8 gmu={{matrix}}"
    key: tpu7x_gmu_search
    depends_on: tpu7x_build_docker
    soft_fail: true
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    agents:
      queue: tpu_v7x_8_queue
    matrix:
      - "0.89"
      - "0.88"
      - "0.86"
      - "0.84"
      - "0.80"
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/bm_qwen3_coder.sh --model Qwen/Qwen3.5-397B-A17B-FP8 --tp 8 --req_tput_limit 0.04 --output_token_tput_limit 300 --total_token_tput_limit 345 --input_len 1024 --output_len 8192 --use_moe_ep_kernel 0 --limit_mm_per_prompt '{"image": 0, "video": 0}' --block_size 256 --num_prompts 64 --timeout 52 --gpu-memory-utilization {{matrix}}
