#
# Dev pipeline scoped to gemma-4 PLE Stage 2 de-risk spike.
# Runs _spike_ple_tpu.py inside the docker on a TPU agent. Validates:
#   - jax.sharding.Mesh + nnx.with_partitioning plumbing
#   - bfloat16 numerics on TPU MXU
#   - the four math/shape tests from the CPU spike, on real hardware
#
# This file replaces upstream demos for the duration of the Stage 2 spike.
# It will be reverted before opening any production PR.

steps:

  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "tpu7x PLE spike: 8-chip sharding + BF16"
    key: tpu7x_ple_spike_8chip
    depends_on: tpu7x_build_docker
    soft_fail: true
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh \
          bash -c 'python3 /workspace/tpu_inference/_spike_ple_tpu.py'
