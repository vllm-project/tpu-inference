# Verify whether the torchax model-impl path (MODEL_IMPL_TYPE=vllm) supports
# speculative decoding by re-running the existing SD correctness tests under
# torchax routing. One step per method (ngram, eagle3).
steps:

  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "tpu7x SD verify (ngram, MODEL_IMPL_TYPE=vllm)"
    key: tpu7x_sd_torchax_verify_ngram
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      MODEL_IMPL_TYPE: "vllm"
    agents:
      queue: tpu_v7x_2_queue
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/.buildkite/scripts/sd_torchax_verify.sh tests/e2e/test_speculative_decoding.py::test_ngram_correctness_greedy

  - label: "tpu7x SD verify (eagle3, MODEL_IMPL_TYPE=vllm)"
    key: tpu7x_sd_torchax_verify_eagle3
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      MODEL_IMPL_TYPE: "vllm"
    agents:
      queue: tpu_v7x_2_queue
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/.buildkite/scripts/sd_torchax_verify.sh tests/e2e/test_speculative_decoding.py::test_eagle3_correctness
