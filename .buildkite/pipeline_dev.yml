# Baseline check: does the Ray multi-host test pass at pre-#3093 (80fcf6a2,
# LKG fa4321de)? Same test as CI, run 2x across the multi-host machines, with a
# 30-min timeout so any stall is reaped (internal is 7200s). Default executor.
steps:
  - label: "tpu7x Ray multi-host PRE-3093 (run {{matrix}})"
    key: tpu7x_ray_pre3093
    agents:
      queue: tpu_v7x_16_queue
    env:
      TPU_VERSION: "tpu7x"
    timeout_in_minutes: 30
    matrix: ["1", "2"]
    commands:
      - |
        MODEL="gs://tpu-commons-ci/qwen/models--Qwen--Qwen3-30B-A3B/snapshots/ad44e777bcd18fa416d9da3bd8f70d33ebb85d39"
        .buildkite/scripts/run_multihost.sh \
          "vllm serve \${MODEL} \
            --port 8000 \
            --tensor-parallel-size 16 \
            --trust-remote-code \
            --max-model-len 1024 \
            --no-async-scheduling \
            --load-format=runai_streamer \
            --no-enable-prefix-caching" \
          "curl http://localhost:8000/v1/completions \
            -X POST \
            -H 'Content-Type: application/json' \
            -d '{\"model\": \"${MODEL}\", \"prompt\": \"San Francisco is a\", \"max_tokens\": 50}'
          "
