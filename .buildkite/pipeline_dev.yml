steps:
  - label: ":docker: Build base image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "tpu7x Llama-Guard-4 accuracy text-only (rope fix validation)"
    key: tpu7x_lg4_text
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_2_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: meta-llama/Llama-Guard-4-12B
      TENSOR_PARALLEL_SIZE: "2"
      MINIMUM_ACCURACY_THRESHOLD: "0.31"
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/safety_model_benchmark.sh --mode accuracy --benchmark text-only

  - label: "tpu7x Llama-Guard-4 accuracy multimodal (rope fix validation)"
    key: tpu7x_lg4_mm
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_2_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: meta-llama/Llama-Guard-4-12B
      TENSOR_PARALLEL_SIZE: "2"
      MINIMUM_ACCURACY_THRESHOLD: "0.02"
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/safety_model_benchmark.sh --mode accuracy --benchmark multimodal
