# Dev pipeline for tpu-inference-dev.
# Reproduces tpu7x test_34 (Single Host DCN-based P/D disaggregation) timeout.

steps:

  # Build Step (required by the test step below)
  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  # Single Host DCN-based P/D disaggregation — mirrors test_34.
  - label: "tpu7x E2E test for Single Host DCN-based P/D disaggregation"
    key: tpu7x_demo_disagg_single_host
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      MODEL: "Qwen/Qwen3-0.6B"
      INPUT_LEN: 512
      OUTPUT_LEN: 128
      NUM_PROMPTS: 200
      REQUEST_RATE: 4
    agents:
      queue: tpu_v7x_8_queue
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/examples/disagg/run_disagg_single_host.sh
