# NVFP4 model test pipeline — nvidia/Qwen3-30B-A3B-NVFP4

steps:

  # Build Step
  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  # 1. Smoke test (serve + simple completion)
  - label: "tpu7x Smoke test for nvidia/Qwen3-30B-A3B-NVFP4"
    key: tpu7x_nvfp4_smoke
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    agents:
      queue: tpu_v7x_8_queue
    timeout_in_minutes: 60
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/.buildkite/scripts/test_nvfp4_serve.sh

  # 2. Accuracy test (lm_eval)
  - label: "tpu7x Accuracy for nvidia/Qwen3-30B-A3B-NVFP4"
    key: tpu7x_nvfp4_accuracy
    depends_on: tpu7x_nvfp4_smoke
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: "nvidia/Qwen3-30B-A3B-NVFP4"
      TENSOR_PARALLEL_SIZE: "8"
      MINIMUM_ACCURACY_THRESHOLD: "0.80"
      MODEL_IMPL_TYPE: "vllm"
    agents:
      queue: tpu_v7x_8_queue
    timeout_in_minutes: 120
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/test_accuracy.sh

  # 3. Performance benchmark
  - label: "tpu7x Performance for nvidia/Qwen3-30B-A3B-NVFP4"
    key: tpu7x_nvfp4_benchmark
    depends_on: tpu7x_nvfp4_accuracy
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: "nvidia/Qwen3-30B-A3B-NVFP4"
      TENSOR_PARALLEL_SIZE: "8"
      MINIMUM_THROUGHPUT_THRESHOLD: "5.00"
      INPUT_LEN: "1800"
      OUTPUT_LEN: "128"
      PREFIX_LEN: "0"
      MAX_MODEL_LEN: "2048"
      MAX_NUM_SEQS: "16"
      MAX_NUM_BATCHED_TOKENS: "2048"
      MODEL_IMPL_TYPE: "vllm"
    agents:
      queue: tpu_v7x_8_queue
    timeout_in_minutes: 120
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/benchmark.sh
