# NVFP4 model test — v7x runs tests, v6e skips (FP4 MoE kernel not supported)

steps:

  # ---- Build Steps ----
  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: ":docker: Build and Push Base Image (tpu6e)"
    key: tpu6e_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu6e"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  # ---- tpu7x: Accuracy ----
  - label: "tpu7x Accuracy for nvidia/Qwen3-30B-A3B-NVFP4"
    key: tpu7x_nvfp4_accuracy
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: "nvidia/Qwen3-30B-A3B-NVFP4"
      TENSOR_PARALLEL_SIZE: "8"
      MINIMUM_ACCURACY_THRESHOLD: "0.80"
      MODEL_IMPL_TYPE: "vllm"
    agents:
      queue: tpu_v7x_8_queue
    timeout_in_minutes: 120
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/test_accuracy.sh

  # ---- tpu7x: Performance ----
  - label: "tpu7x Performance for nvidia/Qwen3-30B-A3B-NVFP4"
    key: tpu7x_nvfp4_benchmark
    depends_on: tpu7x_nvfp4_accuracy
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: "nvidia/Qwen3-30B-A3B-NVFP4"
      TENSOR_PARALLEL_SIZE: "8"
      MINIMUM_THROUGHPUT_THRESHOLD: "5.00"
      INPUT_LEN: "1800"
      OUTPUT_LEN: "128"
      PREFIX_LEN: "0"
      MAX_MODEL_LEN: "2048"
      MAX_NUM_SEQS: "16"
      MAX_NUM_BATCHED_TOKENS: "2048"
      MODEL_IMPL_TYPE: "vllm"
    agents:
      queue: tpu_v7x_8_queue
    timeout_in_minutes: 120
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/benchmark.sh

  # ---- tpu6e: Accuracy (skip — FP4 MoE kernel not supported on v6e) ----
  - label: "tpu6e Accuracy for nvidia/Qwen3-30B-A3B-NVFP4"
    key: tpu6e_nvfp4_accuracy
    depends_on: tpu6e_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu6e"
      TEST_MODEL: "nvidia/Qwen3-30B-A3B-NVFP4"
      TENSOR_PARALLEL_SIZE: "8"
      MINIMUM_ACCURACY_THRESHOLD: "0.80"
      MODEL_IMPL_TYPE: "vllm"
    agents:
      queue: tpu_v6e_8_queue
    timeout_in_minutes: 10
    commands:
      - |
        echo "Skipping NVFP4 on tpu6e — FP8xFP4 MoE kernel not supported"
        buildkite-agent meta-data set "tpu6e_nvfp4_accuracy" "not enough HBM"
