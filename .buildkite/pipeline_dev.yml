# Validate PR #2276 fix: install transformers==5.5.0 before gemma4 tests.

steps:

  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "tpu7x Unit tests for google/gemma-4-26B-A4B-it (PR #2276)"
    key: tpu7x_gemma4_26B_unit
    depends_on: tpu7x_build_docker
    soft_fail: true
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    agents:
      queue: tpu_v7x_8_queue
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh \
          bash -c 'pip install transformers==5.5.0 && JITTED_MM_MODULE_KEYS="model.vision_tower.encoder" REGISTER_MM_MODULE_CUSTOM_PYTREE_CLASSES="transformers.modeling_outputs.BaseModelOutputWithPast" SKIP_JAX_PRECOMPILE=1 VLLM_XLA_CHECK_RECOMPILATION=0 python /workspace/tpu_inference/examples/offline_inference.py --model google/gemma-4-26B-A4B-it --tensor-parallel-size 8 --max-num-batched-tokens 4096 --max-model-len 4096'

  - label: "tpu7x Unit tests for google/gemma-4-31B-it (PR #2276)"
    key: tpu7x_gemma4_31B_unit
    depends_on: tpu7x_build_docker
    soft_fail: true
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    agents:
      queue: tpu_v7x_8_queue
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh \
          bash -c 'pip install transformers==5.5.0 && JITTED_MM_MODULE_KEYS="model.vision_tower.encoder" REGISTER_MM_MODULE_CUSTOM_PYTREE_CLASSES="transformers.modeling_outputs.BaseModelOutputWithPast" SKIP_JAX_PRECOMPILE=1 VLLM_XLA_CHECK_RECOMPILATION=0 python /workspace/tpu_inference/examples/offline_inference.py --model google/gemma-4-31B-it --tensor-parallel-size 8 --max-num-batched-tokens 4096 --max-model-len 4096'
