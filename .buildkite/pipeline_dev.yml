steps:
  - label: ":docker: Build base image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "tpu7x mm_bench XET=1 cold-cache (run {{matrix}})"
    key: tpu7x_mm_xet
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_2_queue
    matrix: ["1","2"]
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash -c 'export HF_HUB_DISABLE_XET=1; export HF_HOME=$(mktemp -d /tmp/hf_fresh_XXXXXX); echo "HF_HUB_DISABLE_XET=$HF_HUB_DISABLE_XET HF_HOME=$HF_HOME"; bash /workspace/tpu_inference/tests/e2e/benchmarking/mm_bench.sh'
