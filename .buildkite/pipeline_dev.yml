# Dev pipeline: jax 0.10.2 kernel-failure scan.
# Runs every tests/kernels file WITHOUT -x (and as parallel matrix jobs) so we
# enumerate ALL failures jax 0.10.2 introduces — not just the first one -x stops on.
steps:
  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "tpu7x kernels-scan {{matrix}}"
    key: tpu7x_kernels_scan
    depends_on: tpu7x_build_docker
    soft_fail: true
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    agents:
      queue: tpu_v7x_2_queue
    matrix:
      - "causal_conv1d_test.py"
      - "collectives/all_gather_matmul_kernel_test.py"
      - "fused_gdn_kernel_test.py"
      - "fused_moe_v1_test.py"
      - "gather_reduce_test.py"
      - "gdn_decode_kernel_test.py"
      - "gmm_test.py"
      - "mla_tuned_vs_baseline_test.py"
      - "mla_v2_test.py"
      - "quantized_matmul_kernel_test.py"
      - "ragged_gather_reduce_test.py"
      - "ragged_gather_reduce_v2_test.py"
      - "ragged_gather_test.py"
      - "ragged_gather_v2_test.py"
      - "ragged_kv_cache_update_v2_test.py"
      - "ragged_paged_attention_kernel_v2_test.py"
      - "ragged_paged_attention_kernel_v3_hd64_test.py"
      - "ragged_paged_attention_kernel_v3_test.py"
      - "ragged_scatter_test.py"
      - "recurrent_scan_test.py"
      - "spmm_v1_test.py"
      - "transpose_test.py"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash -c 'python3 -m pytest -rN --no-header -p no:cacheprovider /workspace/tpu_inference/tests/kernels/{{matrix}}'
