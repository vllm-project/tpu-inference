# Verifies vllm-project/vllm#44476 fix for the
# `torch.ops._C.per_token_group_fp8_quant` module-load AttributeError.
# Builds the image against QiliangCui/vllm@47598960 (LKG bdbf08fc + the fix
# cherry-picked on top) and runs the SP correctness test that was failing
# on tpu-inference-ci#19283.

steps:
  - label: ":docker: Build base image (tpu7x) — QiliangCui/vllm fork + fix"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "tpu7x Correctness tests for SP (single-host) — fix verification"
    key: tpu7x_SP_CorrectnessTest_Single_Host
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh \
          bash -c 'python3 -m pytest -s -v -x /workspace/tpu_inference/tests/e2e/test_sequence_parallelism.py::test_sp_correctness'
