# Perf-regression probe for the reverted #2601 — runs Gemma4-31B 1k/1f512x512/500
# on v7x-2 (TP=2). All bash lives in scripts/perf_probe_gemma4_31b_v7x2.sh so
# Buildkite's pipeline-interpolation doesn't try to expand $VAR / $(...) / $((...)).

steps:
  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "tpu7x Gemma4-31B 1k/1f512x512/500 perf probe (TP=2)"
    key: tpu7x_gemma4_31b_perf_probe
    depends_on: tpu7x_build_docker
    soft_fail: true
    agents:
      queue: tpu_v7x_2_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/.buildkite/scripts/perf_probe_gemma4_31b_v7x2.sh
