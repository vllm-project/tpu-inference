# H100 POC — pull vllm/vllm-openai from Docker Hub, serve Qwen on 8x H100, query.
# Bypasses run_in_docker.sh (which is hardcoded to the CI Artifact Registry).

steps:
  - label: "h100 [poc] vllm/vllm-openai — serve Qwen2.5-7B + query"
    key: h100_poc_vllm_openai
    agents:
      queue: h100_8_queue
    commands:
      - |
        set -e
        IMG=vllm/vllm-openai:latest-cu129-ubuntu2404
        CONT=vllm-bk-poc
        docker rm -f $CONT 2>/dev/null || true
        echo "=== pull ==="
        docker pull $IMG
        echo "=== run ==="
        docker run -d --name $CONT \
          --gpus all --ipc=host --shm-size=32g \
          -p 8000:8000 \
          $IMG \
          Qwen/Qwen2.5-7B-Instruct \
          --seed 42 \
          --tensor-parallel-size 8 \
          --max-model-len 1024 \
          --no-enable-prefix-caching
        echo "=== wait for server (up to 20 min) ==="
        UP=0
        for i in $(seq 1 120); do
          if curl -sf http://localhost:8000/v1/models >/dev/null 2>&1; then
            echo "[ready @ ${i}0s]"
            UP=1
            break
          fi
          sleep 10
        done
        if [ "$UP" -ne 1 ]; then
          echo "=== server never came up — last 80 log lines ==="
          docker logs --tail 80 $CONT || true
          docker rm -f $CONT 2>/dev/null || true
          exit 1
        fi
        echo "=== query ==="
        curl -s http://localhost:8000/v1/chat/completions \
          -H "Content-Type: application/json" \
          -d '{"model":"Qwen/Qwen2.5-7B-Instruct","messages":[{"role":"user","content":"What is the capital of France?"}],"max_tokens":50}' \
          | python3 -m json.tool
        echo "=== cleanup ==="
        docker rm -f $CONT 2>/dev/null || true
