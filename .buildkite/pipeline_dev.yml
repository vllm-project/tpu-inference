steps:
  - label: ":docker: Build base image (tpu6e)"
    key: tpu6e_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu6e"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: ":docker: Build base image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "tpu6e SparseCore probe"
    key: tpu6e_sc_probe
    depends_on: tpu6e_build_docker
    agents:
      queue: tpu_v6e_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu6e"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash -c 'python3 /workspace/tpu_inference/sc_probe.py'

  - label: "tpu7x SparseCore probe"
    key: tpu7x_sc_probe
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash -c 'python3 /workspace/tpu_inference/sc_probe.py'
