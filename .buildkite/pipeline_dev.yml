# Dev pipeline scoped to gemma-4 E2B bringup (Stage 1 — torchax).
# Per CLAUDE.md "Dev Pipeline Testing": demos stripped, only the steps
# needed for this bringup remain.
#
# Sanity: a single 31B torchax unit-test step verifies the vllm-native
# (torchax) path still works for Gemma-4 on the current LKG (last
# exercised Apr 18, 2026). Runs in parallel with E2B steps.
#
# This file will be reverted to upstream demos before opening the PR.

steps:

  # -----------------------------------------------------------------
  # Build base docker image for tpu6e
  # -----------------------------------------------------------------
  - label: ":docker: Build and Push Base Image (tpu6e)"
    key: tpu6e_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu6e"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  # -----------------------------------------------------------------
  # Sanity: Qwen3-4B torchax (isolates bridge health from Gemma-4 issue)
  # If this produces coherent output, the torchax bridge is fine and the
  # Gemma-4 garbage is model-specific. If this also produces garbage,
  # the bridge itself is broken and we need to fix vllm_model_wrapper.
  # -----------------------------------------------------------------
  - label: "tpu6e Sanity: torchax Qwen3-4B unit (MODEL_IMPL_TYPE=vllm)"
    key: tpu6e_qwen3_4b_torchax_sanity
    depends_on: tpu6e_build_docker
    soft_fail: true
    agents:
      queue: tpu_v6e_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu6e"
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh \
          bash -c 'MODEL_IMPL_TYPE=vllm SKIP_JAX_PRECOMPILE=1 VLLM_XLA_CHECK_RECOMPILATION=0 python3 /workspace/tpu_inference/examples/offline_inference.py --model=Qwen/Qwen3-4B --tensor-parallel-size=1 --max-model-len=4096 --max-num-batched-tokens=4096'

  # -----------------------------------------------------------------
  # Sanity: 31B torchax (Phase 0 step 3)
  # Confirms vllm-native gemma-4 still works on TPU after vllm LKG drift
  # since Apr 18, 2026 (when 26B/31B switched to flax_nnx).
  # -----------------------------------------------------------------
  - label: "tpu6e Sanity: torchax 31B unit + chat-template (MODEL_IMPL_TYPE=vllm)"
    key: tpu6e_gemma4_31B_torchax_sanity
    depends_on: tpu6e_build_docker
    soft_fail: true
    agents:
      queue: tpu_v6e_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu6e"
    commands:
      - |
        if pip install "transformers>=5.5.0" --dry-run | grep -q "Would install transformers-"; then
          echo "transformers version too low; skipping"
          exit 0
        fi
        .buildkite/scripts/run_in_docker.sh \
          bash -c 'MODEL_IMPL_TYPE=vllm SKIP_JAX_PRECOMPILE=1 VLLM_XLA_CHECK_RECOMPILATION=0 python3 /workspace/tpu_inference/examples/offline_inference.py --model=google/gemma-4-31B-it --tensor-parallel-size=8 --max-model-len=4096 --max-num-batched-tokens=4096 --use-chat-template'

  # -----------------------------------------------------------------
  # 31B Accuracy via torchax (validates lm_eval + chat template fix on
  # a model with PLE off). If this passes ≥ 0.5, we know gemma-4 works
  # on torchax for the non-PLE path; remaining work is E2B-specific PLE.
  # -----------------------------------------------------------------
  - label: "tpu6e Sanity: torchax 31B accuracy (MODEL_IMPL_TYPE=vllm, chat-template)"
    key: tpu6e_gemma4_31B_torchax_accuracy
    depends_on: tpu6e_gemma4_31B_torchax_sanity
    soft_fail: true
    agents:
      queue: tpu_v6e_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu6e"
      TEST_MODEL: google/gemma-4-31B-it
      TENSOR_PARALLEL_SIZE: 8
      MINIMUM_ACCURACY_THRESHOLD: 0.4
      MODEL_IMPL_TYPE: vllm
    commands:
      - |
        if pip install "transformers>=5.5.0" --dry-run | grep -q "Would install transformers-"; then
          echo "transformers version too low; skipping"
          exit 0
        fi
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/test_accuracy.sh

  # -----------------------------------------------------------------
  # E2B Unit test (Phase 1 step 1)
  # -----------------------------------------------------------------
  - label: "tpu6e E2B Unit + chat-template (MODEL_IMPL_TYPE=vllm, TP=1)"
    key: tpu6e_gemma4_E2B_unit
    depends_on: tpu6e_build_docker
    soft_fail: true
    agents:
      queue: tpu_v6e_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu6e"
    commands:
      - |
        if pip install "transformers>=5.5.0" --dry-run | grep -q "Would install transformers-"; then
          echo "transformers version too low; skipping"
          exit 0
        fi
        .buildkite/scripts/run_in_docker.sh \
          bash -c 'MODEL_IMPL_TYPE=vllm SKIP_JAX_PRECOMPILE=1 VLLM_XLA_CHECK_RECOMPILATION=0 python3 /workspace/tpu_inference/examples/offline_inference.py --model=google/gemma-4-E2B-it --tensor-parallel-size=1 --max-model-len=4096 --max-num-batched-tokens=4096 --use-chat-template'

  # -----------------------------------------------------------------
  # E2B Diagnostic: TP=2 on v6e_8 queue. If output is coherent, the
  # bug is TP=1-specific (maybe single-chip + KV-shared layers issue).
  # If still garbage, rule out TP and look elsewhere.
  # -----------------------------------------------------------------
  - label: "tpu6e E2B DIAG: TP=2 on v6e_8 + chat-template (MODEL_IMPL_TYPE=vllm)"
    key: tpu6e_gemma4_E2B_unit_tp2
    depends_on: tpu6e_build_docker
    soft_fail: true
    agents:
      queue: tpu_v6e_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu6e"
    commands:
      - |
        if pip install "transformers>=5.5.0" --dry-run | grep -q "Would install transformers-"; then
          echo "transformers version too low; skipping"
          exit 0
        fi
        .buildkite/scripts/run_in_docker.sh \
          bash -c 'MODEL_IMPL_TYPE=vllm SKIP_JAX_PRECOMPILE=1 VLLM_XLA_CHECK_RECOMPILATION=0 python3 /workspace/tpu_inference/examples/offline_inference.py --model=google/gemma-4-E2B-it --tensor-parallel-size=2 --max-model-len=4096 --max-num-batched-tokens=4096 --use-chat-template'

  # -----------------------------------------------------------------
  # E2B Accuracy
  # -----------------------------------------------------------------
  - label: "tpu6e E2B Accuracy (MODEL_IMPL_TYPE=vllm, TP=1)"
    key: tpu6e_gemma4_E2B_accuracy
    depends_on: tpu6e_gemma4_E2B_unit
    soft_fail: true
    agents:
      queue: tpu_v6e_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu6e"
      TEST_MODEL: google/gemma-4-E2B-it
      TENSOR_PARALLEL_SIZE: 1
      MINIMUM_ACCURACY_THRESHOLD: 0.5
      MODEL_IMPL_TYPE: vllm
    commands:
      - |
        if pip install "transformers>=5.5.0" --dry-run | grep -q "Would install transformers-"; then
          echo "transformers version too low; skipping"
          exit 0
        fi
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/test_accuracy.sh

  # -----------------------------------------------------------------
  # E2B Performance benchmark
  # -----------------------------------------------------------------
  - label: "tpu6e E2B Benchmark (MODEL_IMPL_TYPE=vllm, TP=1)"
    key: tpu6e_gemma4_E2B_benchmark
    depends_on: tpu6e_gemma4_E2B_accuracy
    soft_fail: true
    agents:
      queue: tpu_v6e_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu6e"
      TEST_MODEL: google/gemma-4-E2B-it
      TENSOR_PARALLEL_SIZE: 1
      MINIMUM_THROUGHPUT_THRESHOLD: 0.1
      INPUT_LEN: 1800
      OUTPUT_LEN: 128
      PREFIX_LEN: 0
      MAX_MODEL_LEN: 2048
      MAX_NUM_SEQS: 64
      MAX_NUM_BATCHED_TOKENS: 4096
      MODEL_IMPL_TYPE: vllm
    commands:
      - |
        if pip install "transformers>=5.5.0" --dry-run | grep -q "Would install transformers-"; then
          echo "transformers version too low; skipping"
          exit 0
        fi
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/benchmark.sh
