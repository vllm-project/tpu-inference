# Dev pipeline: verify the mmlu.sh --trust-remote-code fix.
#  - Kimi-K2.6 (custom-code model): must now get PAST the client tokenizer load
#    (previously failed with "contains custom code ... trust_remote_code=True").
#  - Llama-3.1-8B (standard model, no custom code): no-op safety check — must still pass.
# mmlu.sh args: -m model, -n num-prompts, -l mmlu-output-len. Device count via DEVICE_COUNT.

steps:
  - label: ":docker: Build base image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "tpu7x verify trust-remote-code — Kimi-K2.6 (the fix)"
    key: tpu7x_verify_trc_kimi
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      NEW_MODEL_DESIGN: "1"
      SKIP_ACCURACY_TESTS: "False"
      VLLM_MLA_DISABLE: "0"
      MOE_REQUANTIZE_BLOCK_SIZE: "512"
      MOE_REQUANTIZE_WEIGHT_DTYPE: "fp4"
      DEVICE_COUNT: "8"
      MODEL_IMPL_TYPE: "vllm"
      MINIMUM_ACCURACY_THRESHOLD: "0.86"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mmlu.sh -m "gs://tpu-commons-ci/moonshootai/kimi/2.6" -n 1000 -l 4

  - label: "tpu7x verify trust-remote-code — Llama-3.1-8B (no-op safety)"
    key: tpu7x_verify_trc_llama
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      NEW_MODEL_DESIGN: "1"
      SKIP_ACCURACY_TESTS: "False"
      MODEL_IMPL_TYPE: "vllm"
      DEVICE_COUNT: "8"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mmlu.sh -m "meta-llama/Llama-3.1-8B-Instruct" -n 1000 -l 1
