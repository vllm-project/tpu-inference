# Dev pipeline for tpu-inference-dev.
# Demo/sample steps showing how to run custom tests on tpu7x.
# Copy and adapt any step for your own experiments.
#
# HOW TO TRIGGER THIS PIPELINE
# ─────────────────────────────
# Option A — Buildkite UI:
#   Go to https://buildkite.com/tpu-commons/tpu-inference-dev
#   Click "New Build", set branch to your branch, click "Create Build".
#
# Option B — Buildkite API (requires BUILDKITE_API_TOKEN in your env):
#   curl -s -X POST \
#     -H "Authorization: Bearer $BUILDKITE_API_TOKEN" \
#     -H "Content-Type: application/json" \
#     "https://api.buildkite.com/v2/organizations/tpu-commons/pipelines/tpu-inference-dev/builds" \
#     -d "{\"commit\": \"$(git rev-parse HEAD)\", \"branch\": \"$(git rev-parse --abbrev-ref HEAD)\", \"message\": \"my test\"}"
#
# HOW TO CUSTOMIZE
# ─────────────────
# 1. On your branch, edit this file — use any demo step below as a starting point.
# 2. Change the command, model, env vars, or queue as needed.
# 3. Trigger the pipeline — only your branch's file is used.

steps:

  # -----------------------------------------------------------------
  # Build Step (required by all demo steps below)
  # -----------------------------------------------------------------
  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  # -----------------------------------------------------------------
  # JAX unit tests split validation
  # Testing the 5-part split of JAX unit tests
  # -----------------------------------------------------------------
  - label: "tpu7x JAX unit tests part1"
    key: tpu7x_test_7_1
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    agents:
      queue: tpu_v7x_2_queue
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash -c "python3 -m pytest -s -v -x /workspace/tpu_inference/tests/layers/vllm/backends/test_flash_attn.py /workspace/tpu_inference/tests/layers/vllm/test_awq.py /workspace/tpu_inference/tests/layers/vllm/test_compressed_tensors_moe.py /workspace/tpu_inference/tests/layers/vllm/test_compressed_tensors_w8a8_fp8.py /workspace/tpu_inference/tests/layers/vllm/test_compressed_tensors_w8a8_int8.py"

  - label: "tpu7x JAX unit tests part2"
    key: tpu7x_test_7_2
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    agents:
      queue: tpu_v7x_2_queue
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash -c "python3 -m pytest -s -v -x /workspace/tpu_inference/tests/layers/vllm/test_unquantized.py"

  - label: "tpu7x JAX unit tests part3"
    key: tpu7x_test_7_3
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    agents:
      queue: tpu_v7x_2_queue
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash -c "python3 -m pytest -s -v -x /workspace/tpu_inference/tests/layers/vllm/test_fp8.py /workspace/tpu_inference/tests/layers/jax/quantization/test_fp8.py"

  - label: "tpu7x JAX unit tests part4"
    key: tpu7x_test_7_4
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    agents:
      queue: tpu_v7x_2_queue
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash -c "python3 -m pytest -s -v -x /workspace/tpu_inference/tests/models/jax/test_qwen3.py /workspace/tpu_inference/tests/models/jax/test_qwen3_moe.py /workspace/tpu_inference/tests/models/jax/test_gemma4.py /workspace/tpu_inference/tests/models/jax/test_llama3.py /workspace/tpu_inference/tests/models/jax/test_qwen2.py"

  - label: "tpu7x JAX unit tests part5"
    key: tpu7x_test_7_5
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    agents:
      queue: tpu_v7x_2_queue
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash -c "python3 -m pytest -s -v -x /workspace/tpu_inference/tests/ --ignore=/workspace/tpu_inference/tests/layers/vllm/backends/test_flash_attn.py --ignore=/workspace/tpu_inference/tests/layers/vllm/test_awq.py --ignore=/workspace/tpu_inference/tests/layers/vllm/test_compressed_tensors_moe.py --ignore=/workspace/tpu_inference/tests/layers/vllm/test_compressed_tensors_w8a8_fp8.py --ignore=/workspace/tpu_inference/tests/layers/vllm/test_compressed_tensors_w8a8_int8.py --ignore=/workspace/tpu_inference/tests/layers/vllm/test_unquantized.py --ignore=/workspace/tpu_inference/tests/layers/vllm/test_fp8.py --ignore=/workspace/tpu_inference/tests/layers/jax/quantization/test_fp8.py --ignore=/workspace/tpu_inference/tests/models/jax/test_qwen3.py --ignore=/workspace/tpu_inference/tests/models/jax/test_qwen3_moe.py --ignore=/workspace/tpu_inference/tests/models/jax/test_gemma4.py --ignore=/workspace/tpu_inference/tests/models/jax/test_llama3.py --ignore=/workspace/tpu_inference/tests/models/jax/test_qwen2.py --ignore=/workspace/tpu_inference/tests/kernels --ignore=/workspace/tpu_inference/tests/lora --ignore=/workspace/tpu_inference/tests/e2e --ignore=/workspace/tpu_inference/tpu_inference/mock --ignore=/workspace/tpu_inference/tests/models/jax/test_deepseek_v3.py"
