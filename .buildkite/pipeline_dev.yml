  #         "vllm serve \${MODEL} \
  #           --port 8000 \
  #           --tensor-parallel-size 16 \
  #           --trust-remote-code \
  #           --max-model-len 1024 \
  #           --no-async-scheduling \
  #           --load-format=runai_streamer \
  #           --no-enable-prefix-caching" \
  #         "curl http://localhost:8000/v1/completions \
