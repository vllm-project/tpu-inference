steps:
  - label: ":docker: Build base image (tpu6e)"
    key: tpu6e_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu6e"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "tpu6e JAX unit tests - kernels (libtpu 0.0.43)"
    key: tpu6e_kernels_libtpu043
    depends_on: tpu6e_build_docker
    timeout_in_minutes: 180
    agents:
      queue: tpu_v6e_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu6e"
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh \
          bash -c 'pip install --no-deps libtpu==0.0.43 \
          && python3 -c "import libtpu, os; print(\"libtpu dir:\", os.path.dirname(libtpu.__file__))" \
          && pip list 2>/dev/null | grep -iE "^(jax|jaxlib|libtpu) " \
          && python3 -m pytest -s -v -x /workspace/tpu_inference/tests/kernels \
          --ignore=/workspace/tpu_inference/tests/kernels/ragged_paged_attention_kernel_v2_test.py \
          --ignore=/workspace/tpu_inference/tests/kernels/ragged_kv_cache_update_v2_test.py \
          --ignore=/workspace/tpu_inference/tests/kernels/collectives \
          --ignore=/workspace/tpu_inference/tests/kernels/spmm_v1_test.py'
