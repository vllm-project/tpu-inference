steps:
  - label: "Kernel AutoTune Main"
    key: kernel_autotune_main
    agents:
      queue: cpu
    priority: 200
    depends_on: build_docker
    command: |
      # export KERNEL_AUTOTUNE_ID=KERNEL_AUTOTUNE_$$(date +%Y-%m-%d-%H-%M)
      export KERNEL_AUTOTUNE_ID="KERNEL_AUTOTUNE_2026-06-20-06-21"
      
      cat <<EOF | buildkite-agent pipeline upload
      env:
        KERNEL_AUTOTUNE_ID: "$$KERNEL_AUTOTUNE_ID"
      steps:
        # - label: ":pipeline: Run Benchmarks and Collect Kernel Cases"
        #   agents:
        #     queue: cpu
        #   priority: 200
        #   key: kernel_cases_collection
        #   depends_on: kernel_autotune_main
        #   env:
        #     KERNEL_AUTOTUNE_ID: "$$KERNEL_AUTOTUNE_ID"
        #   command: |
        #     bash .buildkite/benchmark/scripts/benchmark_bootstrap.sh
          
        - label: "Invoke Kernel Tuners"
          key: invoke_kernel_tuners
          priority: 200
          depends_on:
            - "kernel_cases_collection"
          env:
            USE_PREBUILT_IMAGE: "1"
            TPU_VERSION: "tpu6e"
            KERNEL_AUTOTUNE_ID: "$$KERNEL_AUTOTUNE_ID"
          agents:
            queue: tpu_v6e_queue
          commands:
            - |
              .buildkite/scripts/run_in_docker.sh bash -c 'pip install --upgrade google-cloud-spanner google-api-core google-auth absl-py && python3 -m tools.kernel.tuner.v1.autotune.kernel_auto_tune_invoker'
      EOF