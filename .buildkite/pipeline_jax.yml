steps:
  - group: "${TESTS_GROUP_LABEL:-[jax] TPU6e Tests Group}"
    steps:

      # -----------------------------------------------------------------
      # Centralized Build Step (Runs on the CPU queue)
      # -----------------------------------------------------------------
      - label: ":docker: Build and Push Base Image (${TPU_VERSION:-tpu6e})"
        key: "${TPU_VERSION:-tpu6e}_build_docker"
        agents:
          queue: cpu_64_core
        env:
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        commands:
          - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

      # -----------------------------------------------------------------
      # MMMU-pro Accuracy Tests
      # -----------------------------------------------------------------
      - label: "${TPU_VERSION:-tpu6e} MMMU-pro accuracy for Qwen/Qwen3-VL-8B-Instruct"
        key: ${TPU_VERSION:-tpu6e}_test_37
        depends_on: "${TPU_VERSION:-tpu6e}_build_docker"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        soft_fail: true
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        commands:
          - |
            .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/check_mmmu_pro_accuracy.sh \
              --model "Qwen/Qwen3-VL-8B-Instruct" --threshold 0.15 --tp_size 8 --limit 50

      - label: "${TPU_VERSION:-tpu6e} MMMU-pro accuracy for Qwen/Qwen2.5-VL-7B-Instruct"
        key: ${TPU_VERSION:-tpu6e}_test_38
        depends_on: "${TPU_VERSION:-tpu6e}_build_docker"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        soft_fail: true
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        commands:
          - |
            .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/check_mmmu_pro_accuracy.sh \
              --model "Qwen/Qwen2.5-VL-7B-Instruct" --threshold 0.15 --tp_size 4 --limit 50

      # -----------------------------------------------------------------
      # NOTIFICATION STEP
      # -----------------------------------------------------------------
      - label: "${TPU_VERSION:-tpu6e} TPU Test Notification"
        key: ${TPU_VERSION:-tpu6e}_tpu_test_notification
        depends_on:
          - ${TPU_VERSION:-tpu6e}_test_37
          - ${TPU_VERSION:-tpu6e}_test_38
        agents:
          queue: cpu
        commands:
          - |
            .buildkite/scripts/check_results.sh \
              "TPU JAX Tests Failed" ${TPU_VERSION:-tpu6e}_test_37 ${TPU_VERSION:-tpu6e}_test_38
