notify:
  - email: "ullm-test-notifications-external@google.com"
    if: build.state == "failed" && build.branch == "main"
  - slack: "vllm#tpu-ci-notifications"
    if: build.state == "failed" && build.branch == "main"

steps:
  # -----------------------------------------------------------------
  # TEST STEPS - Calling wrapper
  # -----------------------------------------------------------------
   - label: "${TEST_LABEL_PREFIX} E2E MLPerf tests for JAX models"
     key: "${TEST_KEY_PREFIX}test_0"
     soft_fail: true
     agents:
       queue: "${TPU_SMALL_CORE_QUEUE}"
     env:
       IS_FOR_V7X: "${IS_FOR_V7X}"
     commands:
       - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mlperf.sh

   - label: "${TEST_LABEL_PREFIX} E2E MLPerf tests for JAX models with quantization"
     key: "${TEST_KEY_PREFIX}test_1"
     soft_fail: true
     env:
       IS_FOR_V7X: "${IS_FOR_V7X}"
       QUANTIZATION: "True"
     agents:
       queue: "${TPU_SMALL_CORE_QUEUE}"
     commands:
       - |
         if [[ "$$NIGHTLY" == "1" ]]; then
           .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mlperf.sh
         else
           echo "Skipping: NIGHTLY environment variable not set"
           exit 0
         fi

   - label: "${TEST_LABEL_PREFIX} E2E MLPerf tests for JAX new models"
     key: "${TEST_KEY_PREFIX}test_2"
     soft_fail: true
     env:
       IS_FOR_V7X: "${IS_FOR_V7X}"
       NEW_MODEL_DESIGN: "1"
     agents:
       queue: "${TPU_SMALL_CORE_QUEUE}"
     commands:
       - |
         if [[ "$$NIGHTLY" == "1" ]]; then
           .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mlperf.sh
         else
           echo "Skipping: NIGHTLY environment variable not set"
           exit 0
         fi

   - label: "${TEST_LABEL_PREFIX} E2E MLPerf tests for JAX + vLLM models on single chip"
     key: "${TEST_KEY_PREFIX}test_3"
     soft_fail: true
     env:
       IS_FOR_V7X: "${IS_FOR_V7X}"
       MODEL_IMPL_TYPE: "vllm"
     agents:
       queue: "${TPU_SMALL_CORE_QUEUE}"
     commands:
       - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mlperf.sh

   - label: "${TEST_LABEL_PREFIX} E2E MLperf tests for Llama4 models"
     key: "${TEST_KEY_PREFIX}test_4"
     soft_fail: true
     env:
       IS_FOR_V7X: "${IS_FOR_V7X}"
       NEW_MODEL_DESIGN: "1"
       USE_V6E8_QUEUE: "True"
     agents:
       queue: "${TPU_LARGE_CORE_QUEUE}"
     commands:
       - |
         if [[ "$$NIGHTLY" == "1" ]]; then
           .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mlperf.sh
         else
           echo "Skipping: NIGHTLY environment variable not set"
           exit 0
         fi


   - label: "${TEST_LABEL_PREFIX} E2E multi modality test"
     key: "${TEST_KEY_PREFIX}test_5"
     soft_fail: true
     agents:
       queue: "${TPU_SMALL_CORE_QUEUE}"
     env:
       IS_FOR_V7X: "${IS_FOR_V7X}"
     commands:
       - |
         if [[ "$$NIGHTLY" == "1" ]]; then
           .buildkite/scripts/run_in_docker.sh \
             bash -c 'python3 -m pytest -s -v -x /workspace/tpu_inference/tests/e2e/test_multi_modal_inference.py && \
              bash /workspace/tpu_inference/tests/e2e/benchmarking/mm_bench.sh'
         else
           echo "Skipping: NIGHTLY environment variable not set"
           exit 0
         fi

   - label: "${TEST_LABEL_PREFIX} E2E speculative decoding test"
     key: "${TEST_KEY_PREFIX}test_6"
     soft_fail: true
     agents:
       queue: "${TPU_SMALL_CORE_QUEUE}"
     env:
       IS_FOR_V7X: "${IS_FOR_V7X}"
     commands:
       - |
           .buildkite/scripts/run_in_docker.sh \
             bash -c 'python3 -m pytest -s -v -x /workspace/tpu_inference/tests/e2e/test_speculative_decoding.py'

   - label: "${TEST_LABEL_PREFIX} JAX unit tests"
     key: "${TEST_KEY_PREFIX}test_7"
     soft_fail: true
     agents:
       queue: "${TPU_SMALL_CORE_QUEUE}"
     env:
       IS_FOR_V7X: "${IS_FOR_V7X}"
     commands:
       - |
         .buildkite/scripts/run_in_docker.sh \
           python3 -m pytest -s -v -x /workspace/tpu_inference/tests/ \
           --ignore=/workspace/tpu_inference/tests/kernels \
           --ignore=/workspace/tpu_inference/tests/lora \
           --ignore=/workspace/tpu_inference/tests/e2e \
           --ignore=/workspace/tpu_inference/tpu_inference/mock \
           --ignore=/workspace/tpu_inference/tests/layers/vllm/test_compressed_tensors_moe.py \
           --ignore=/workspace/tpu_inference/tests/models/jax/test_deepseek_v3.py \
           --cov-config=/workspace/tpu_inference/.coveragerc --cov tpu_inference --cov-report term-missing --cov-fail-under=69

   - label: "${TEST_LABEL_PREFIX} JAX unit tests - kernels"
     key: "${TEST_KEY_PREFIX}test_8"
     soft_fail: true
     agents:
       queue: "${TPU_SMALL_CORE_QUEUE}"
     env:
       IS_FOR_V7X: "${IS_FOR_V7X}"
     commands:
       - |
         if [[ "$$NIGHTLY" == "1" ]] || git diff --name-only HEAD~1 | grep -qE '^(tpu_inference/kernels|tests/kernels|requirements\.txt)'; then
           .buildkite/scripts/run_in_docker.sh \
             python3 -m pytest -s -v -x /workspace/tpu_inference/tests/kernels \
             --ignore=/workspace/tpu_inference/tests/kernels/ragged_paged_attention_kernel_v2_test.py \
             --ignore=/workspace/tpu_inference/tests/kernels/ragged_kv_cache_update_v2_test.py \
             --ignore=/workspace/tpu_inference/tests/kernels/collectives \
             --ignore=/workspace/tpu_inference/tests/kernels/fused_moe_v1_test.py
         else
           echo "Skipping: no changes detected in kernels, tests/kernels, or requirements.txt"
           exit 0
         fi

   - label: "${TEST_LABEL_PREFIX} JAX unit tests - collective kernels"
     key: "${TEST_KEY_PREFIX}test_9"
     soft_fail: true
     agents:
       queue: "${TPU_LARGE_CORE_QUEUE}"
     env:
       IS_FOR_V7X: "${IS_FOR_V7X}"
     commands:
       - |
         if [[ "$$NIGHTLY" == "1" ]] || git diff --name-only HEAD~1 | grep -qE '^(tpu_inference/kernels/collectives|tests/kernels/collectives|requirements\.txt)'; then
           .buildkite/scripts/run_in_docker.sh \
             python3 -m pytest -s -v -x /workspace/tpu_inference/tests/kernels/collectives
         else
           echo "Skipping: no changes detected in kernels/collectives, tests/kernels/collectives, or requirements.txt"
           exit 0
         fi

   - label: "${TEST_LABEL_PREFIX} lora e2e tests for JAX + vLLM models single chip"
     key: "${TEST_KEY_PREFIX}test_10"
     soft_fail: true
     agents:
       queue: "${TPU_SMALL_CORE_QUEUE}"
     env:
       IS_FOR_V7X: "${IS_FOR_V7X}"
     commands:
       - |
         if [[ "$$NIGHTLY" == "1" ]]; then
           .buildkite/scripts/run_in_docker.sh \
             bash -c 'MODEL_IMPL_TYPE=vllm TPU_BACKEND_TYPE=jax python3 -m pytest -s -v -x /workspace/tpu_inference/tests/lora/test_lora.py'
         else
           echo "Skipping: NIGHTLY environment variable not set"
           exit 0
         fi

   - label: "${TEST_LABEL_PREFIX} E2E MLPerf tests for JAX + vLLM models on multiple chips"
     key: "${TEST_KEY_PREFIX}test_11"
     soft_fail: true
     env:
       IS_FOR_V7X: "${IS_FOR_V7X}"
       MODEL_IMPL_TYPE: "vllm"
     agents:
       queue: "${TPU_LARGE_CORE_QUEUE}"
     commands:
       - |
         if [[ "$$NIGHTLY" == "1" ]]; then
           .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mlperf.sh
         else
           echo "Skipping: NIGHTLY environment variable not set"
           exit 0
         fi

  # TODO (jacobplatin): re-enable this after b/467105149 is fixed
  #  - label: "${TEST_LABEL_PREFIX} E2E MLperf tests for DeepSeek-R1 (no accuracy, 12-decoder layers only)"
  #    key: "${TEST_KEY_PREFIX}test_12"
  #    soft_fail: true
  #    env:
  #      IS_FOR_V7X: "${IS_FOR_V7X}"
  #      NEW_MODEL_DESIGN: "1"
  #      USE_V6E8_QUEUE: "True"
  #      SKIP_ACCURACY_TESTS: "True"
  #      VLLM_MLA_DISABLE: "1"
  #    agents:
  #      queue: "${TPU_LARGE_CORE_QUEUE}"
  #    commands:
  #      - |
  #        if [[ "$$NIGHTLY" == "1" ]]; then
  #          .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mlperf.sh -m jrplatin/DeepSeek-R1-1D-Subchannel-256  --use-dummy-weights
  #        else
  #          echo "Skipping: NIGHTLY environment variable not set"
  #          exit 0
  #        fi

   - label: "${TEST_LABEL_PREFIX} lora e2e tests for JAX + vLLM models multi chips"
     key: "${TEST_KEY_PREFIX}test_13"
     soft_fail: true
     env:
       TEST_LORA_TP: "True"
       IS_FOR_V7X: "${IS_FOR_V7X}"
       VLLM_LOG_LEVEL: "INFO"
     agents:
       queue: "${TPU_LARGE_CORE_QUEUE}"
     commands:
       - |
         if [[ "$$NIGHTLY" == "1" ]]; then
           .buildkite/scripts/run_in_docker.sh \
             bash -c 'MODEL_IMPL_TYPE=vllm TPU_BACKEND_TYPE=jax python3 -m pytest -s -v -x /workspace/tpu_inference/tests/lora/test_lora.py'
         else
           echo "Skipping: NIGHTLY environment variable not set"
           exit 0
         fi


   - label: "${TEST_LABEL_PREFIX} lora unit tests on single chip"
     key: "${TEST_KEY_PREFIX}test_15"
     soft_fail: true
     agents:
       queue: "${TPU_SMALL_CORE_QUEUE}"
     env:
       IS_FOR_V7X: "${IS_FOR_V7X}"
     commands:
       - |
         .buildkite/scripts/run_in_docker.sh \
           bash -c ' python3 -m pytest -s -v -x /workspace/tpu_inference/tests/lora/test_bgmv.py && \
           python3 -m pytest -s -v -x /workspace/tpu_inference/tests/lora/test_layers.py'

   - label: "${TEST_LABEL_PREFIX} lora unit tests on multi chips"
     key: "${TEST_KEY_PREFIX}test_16"
     soft_fail: true
     env:
       IS_FOR_V7X: "${IS_FOR_V7X}"
       USE_V6E8_QUEUE: "True"
       VLLM_LOG_LEVEL: "INFO"
     agents:
       queue: "${TPU_LARGE_CORE_QUEUE}"
     commands:
       - |
         if [[ "$$NIGHTLY" == "1" ]]; then
           .buildkite/scripts/run_in_docker.sh \
             bash -c 'python3 -m pytest -s -v -x /workspace/tpu_inference/tests/lora/test_layers.py'
         else
           echo "Skipping: NIGHTLY environment variable not set"
           exit 0
         fi
  # -----------------------------------------------------------------
  # NOTIFICATION STEP
  # -----------------------------------------------------------------
   - label: "${TEST_LABEL_PREFIX} TPU Test Notification"
     key: "${TEST_KEY_PREFIX}tpu_test_notification"
     depends_on:
       - "${TEST_KEY_PREFIX}test_0"
       - "${TEST_KEY_PREFIX}test_1"
       - "${TEST_KEY_PREFIX}test_2"
       - "${TEST_KEY_PREFIX}test_3"
       - "${TEST_KEY_PREFIX}test_4"
       - "${TEST_KEY_PREFIX}test_5"
       - "${TEST_KEY_PREFIX}test_6"
       - "${TEST_KEY_PREFIX}test_7"
       - "${TEST_KEY_PREFIX}test_8"
       - "${TEST_KEY_PREFIX}test_9"
       - "${TEST_KEY_PREFIX}test_10"
       - "${TEST_KEY_PREFIX}test_11"
      # TODO (jacobplatin): re-enable this after b/467105149 is fixed
      # - "${TEST_KEY_PREFIX}test_12"
       - "${TEST_KEY_PREFIX}test_13"
       - "${TEST_KEY_PREFIX}test_15"
       - "${TEST_KEY_PREFIX}test_16"
     agents:
       queue: cpu
      # TODO (jacobplatin): re-enable test12 this after b/467105149 is fixed
     commands:
       - |
         .buildkite/scripts/check_results.sh \
           "TPU JAX Tests Failed" "${TEST_KEY_PREFIX}test_0" "${TEST_KEY_PREFIX}test_1" "${TEST_KEY_PREFIX}test_2" "${TEST_KEY_PREFIX}test_3" "${TEST_KEY_PREFIX}test_4" "${TEST_KEY_PREFIX}test_5" "${TEST_KEY_PREFIX}test_6" "${TEST_KEY_PREFIX}test_7" "${TEST_KEY_PREFIX}test_8" "${TEST_KEY_PREFIX}test_9" "${TEST_KEY_PREFIX}test_10" "${TEST_KEY_PREFIX}test_11" "${TEST_KEY_PREFIX}test_13" "${TEST_KEY_PREFIX}test_15" "${TEST_KEY_PREFIX}test_16"
