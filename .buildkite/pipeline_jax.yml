x-tests-plugin-defaults: &tests_plugin_defaults
  suite-slug: tests
  test-runner: pytest
  install-client: false
  oidc-lifetime: 7200
  test-cmd: "bash -c 'python3 -m pytest -s -v -x --junit-xml={{resultPath}} {{testExamples}}'"

steps:
  - group: "${TESTS_GROUP_LABEL:-[jax] TPU6e Tests Group}"
    depends_on: "build_docker"
    steps:

      # -----------------------------------------------------------------
      # TEST STEPS - Calling wrapper
      # -----------------------------------------------------------------
      - label: "${TPU_VERSION:-tpu6e} E2E MLPerf tests for JAX models"
        key: "${TPU_VERSION:-tpu6e}_test_0"
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_SINGLE:-tpu_v6e_queue}
        commands:
          - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mlperf.sh

      - label: "${TPU_VERSION:-tpu6e} E2E MLPerf tests for JAX models with quantization"
        key: ${TPU_VERSION:-tpu6e}_test_1
        env:
          QUANTIZATION: "True"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_SINGLE:-tpu_v6e_queue}
        if: build.env("NIGHTLY") == "1"
        commands:
          - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mlperf.sh

      - label: "${TPU_VERSION:-tpu6e} E2E MLPerf tests for JAX new models"
        key: ${TPU_VERSION:-tpu6e}_test_2
        env:
          NEW_MODEL_DESIGN: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_SINGLE:-tpu_v6e_queue}
        if: build.env("NIGHTLY") == "1"
        commands:
          - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mlperf.sh

      - label: "${TPU_VERSION:-tpu6e} E2E MLPerf tests for JAX + vLLM models on single chip"
        key: ${TPU_VERSION:-tpu6e}_test_3
        env:
          USE_PREBUILT_IMAGE: "1"
          MODEL_IMPL_TYPE: "vllm"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_SINGLE:-tpu_v6e_queue}
        commands:
          - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mlperf.sh

      - label: "${TPU_VERSION:-tpu6e} E2E MLperf tests for Llama4 models"
        key: ${TPU_VERSION:-tpu6e}_test_4
        env:
          NEW_MODEL_DESIGN: "1"
          USE_V6E8_QUEUE: "True"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        if: build.env("NIGHTLY") == "1"
        commands:
          - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mlperf.sh

      # Per-push runs the BVT smoke subset; nightly (NIGHTLY=1) runs the full
      # matrix. The conftest collection gate narrows to @pytest.mark.bvt cases
      # only when BVT_ONLY=1, so set BVT_ONLY=1 iff this is NOT a nightly build.
      # Other consumers (feature pipelines, release-tag, local) never set
      # BVT_ONLY and therefore always run the full set.
      - label: "${TPU_VERSION:-tpu6e} E2E speculative decoding test"
        key: ${TPU_VERSION:-tpu6e}_test_6
        # TODO: Look into the latency of precompilation of the e2e spec decoding test
        timeout_in_minutes: 180
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_SINGLE:-tpu_v6e_queue}
        commands:
          - |
              if [ "$${NIGHTLY:-0}" = "1" ]; then export BVT_ONLY=; else export BVT_ONLY=1; fi
              .buildkite/scripts/run_in_docker.sh bktec run
        plugins:
          - tests#v1.0.0:
              <<: *tests_plugin_defaults
              test-file-pattern: "/workspace/tpu_inference/tests/e2e/test_speculative_decoding.py"

      - label: "${TPU_VERSION:-tpu6e} Unified JAX unit tests"
        key: ${TPU_VERSION:-tpu6e}_test_7
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_SINGLE:-tpu_v6e_queue}
        parallelism: 2
        artifact_paths: ".coverage.part*.${TPU_VERSION:-tpu6e}"
        commands:
          - rm -f .coverage.part_$$BUILDKITE_PARALLEL_JOB.${TPU_VERSION:-tpu6e}
          - .buildkite/scripts/run_in_docker.sh bktec run
          - cp /mnt/disks/persist/models/.coverage.part_$$BUILDKITE_PARALLEL_JOB.${TPU_VERSION:-tpu6e} ./ 2>/dev/null || true
        plugins:
          - tests#v1.0.0:
              <<: *tests_plugin_defaults
              test-file-pattern: "/workspace/tpu_inference/tests/{**/test_*.py,**/*_test.py}"
              test-file-exclude-pattern: "/workspace/tpu_inference/{\
                scripts/**/*.py,\
                tests/kernels/**/*.py,\
                tests/lora/**/*.py,\
                tests/e2e/**/*.py,\
                tests/models/jax/test_deepseek_v3.py,\
                tests/offload/tpu_offload_multi_request_accuracy_test.py,\
                tests/offload/tpu_offload_accuracy_test.py,\
                tests/offload/tpu_offload_performance_test.py,\
                tests/core/test_dp_group_sampling_prefix_cache.py,\
                tests/runner/test_async_logprobs.py,\
                tests/runner/test_processed_logprobs.py,\
                tests/runner/test_moe_expert_ids.py\
                }"
              test-cmd: "bash -c 'python3 -m pytest -s -v -x --cov-config=/workspace/tpu_inference/.coveragerc --cov tpu_inference --junit-xml={{resultPath}} {{testExamples}}; if [ -f .coverage ]; then cp .coverage /tmp/hf_home/.coverage.part_$$BUILDKITE_PARALLEL_JOB.${TPU_VERSION:-tpu6e}; else exit 1; fi'"

      - label: "${TPU_VERSION:-tpu6e} JAX unit tests combine and report"
        depends_on:
          - "${TPU_VERSION:-tpu6e}_test_7"
        key: ${TPU_VERSION:-tpu6e}_test_7_combine
        agents:
          queue: cpu
        commands:
          - "buildkite-agent artifact download \".coverage.part*\" ."
          - curl -L https://github.com/pantsbuild/pex/releases/download/v2.1.151/pex -o pex
          - chmod +x pex
          - python3 ./pex coverage -c coverage -o coverage.pex
          - |
            echo "[paths]" > .coveragerc
            echo "source =" >> .coveragerc
            echo "    ." >> .coveragerc
            echo "    /workspace/tpu_inference/" >> .coveragerc
          - |
            python3 ./coverage.pex combine .coverage.part*.${TPU_VERSION:-tpu6e}
            python3 ./coverage.pex report --fail-under=${COV_FAIL_UNDER:-68}
            EXIT_CODE=$?
            rm -f .coverage.part* .coveragerc pex coverage.pex .coverage
            exit $EXIT_CODE

      - label: "${TPU_VERSION:-tpu6e} JAX unit tests - kernels"
        key: ${TPU_VERSION:-tpu6e}_test_8
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_SINGLE:-tpu_v6e_queue}
        parallelism: 2
        if: build.env("NIGHTLY") == "1" || "${RUN_KERNEL_TESTS:-0}" == "1"
        commands:
          - .buildkite/scripts/run_in_docker.sh bktec run
        plugins:
          - tests#v1.0.0:
              <<: *tests_plugin_defaults
              test-file-pattern: "/workspace/tpu_inference/tests/kernels/{*.py,*/*.py}"
              test-file-exclude-pattern: "/workspace/tpu_inference/tests/kernels/{\
                ragged_paged_attention_kernel_v2_test.py,\
                ragged_kv_cache_update_v2_test.py,\
                collectives/*.py,\
                spmm_v1_test.py\
                }"

      - label: "${TPU_VERSION:-tpu6e} JAX unit tests - collective kernels"
        key: ${TPU_VERSION:-tpu6e}_test_9
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        if: build.env("NIGHTLY") == "1" || "${RUN_KERNEL_COLLECTIVES_TESTS:-0}" == "1"
        commands:
          - .buildkite/scripts/run_in_docker.sh bktec run
        plugins:
          - tests#v1.0.0:
              <<: *tests_plugin_defaults
              test-file-pattern: "/workspace/tpu_inference/tests/kernels/collectives/*.py"

      - label: "${TPU_VERSION:-tpu6e} lora e2e tests for JAX + vLLM models single chip"
        key: ${TPU_VERSION:-tpu6e}_test_10
        agents:
          queue: ${TPU_QUEUE_SINGLE:-tpu_v6e_queue}
        if: build.env("NIGHTLY") == "1"
        commands:
          - .buildkite/scripts/run_in_docker.sh bktec run
        plugins:
          - tests#v1.0.0:
              <<: *tests_plugin_defaults
              test-file-pattern: "/workspace/tpu_inference/tests/lora/{test_lora,test_lora_adapter}.py"
              test-cmd: "bash -c 'MODEL_IMPL_TYPE=vllm TPU_BACKEND_TYPE=jax python3 -m pytest -s -v -x --junit-xml={{resultPath}} {{testExamples}}'"

      - label: "${TPU_VERSION:-tpu6e} E2E MLPerf tests for JAX + vLLM models on multiple chips"
        key: ${TPU_VERSION:-tpu6e}_test_11
        env:
          MODEL_IMPL_TYPE: "vllm"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        if: build.env("NIGHTLY") == "1"
        commands:
          - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mlperf.sh

      # TODO (jacobplatin): re-enable this after b/467105149 is fixed
      - label: "${TPU_VERSION:-tpu6e} E2E MLperf tests for DeepSeek-R1 (no accuracy, 5-decoder layers only)"
        key: ${TPU_VERSION:-tpu6e}_test_12
        env:
          USE_PREBUILT_IMAGE: "1"
          NEW_MODEL_DESIGN: "1"
          USE_V6E8_QUEUE: "False"
          SKIP_ACCURACY_TESTS: "True"
          VLLM_MLA_DISABLE: "0"
          MOE_REQUANTIZE_BLOCK_SIZE: "512"
          MOE_REQUANTIZE_WEIGHT_DTYPE: "fp4"
          MODEL_IMPL_TYPE: "flax_nnx"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_SINGLE:-tpu_v6e_queue}
        if: '"${TPU_VERSION:-tpu6e}" == "tpu7x"'
        commands:
          - |
            .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mlperf.sh -m "gs://tpu-commons-ci/deepseek/r1"

      - label: "${TPU_VERSION:-tpu6e} E2E MMLU for DeepSeek-R1 torchax backend"
        key: ${TPU_VERSION:-tpu6e}_test_14
        env:
          USE_PREBUILT_IMAGE: "1"
          NEW_MODEL_DESIGN: "1"
          SKIP_ACCURACY_TESTS: "False"
          VLLM_MLA_DISABLE: "0"
          MOE_REQUANTIZE_BLOCK_SIZE: "512"
          MOE_REQUANTIZE_WEIGHT_DTYPE: "fp4"
          MODEL_IMPL_TYPE: "vllm"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        if: '"${TPU_VERSION:-tpu6e}" == "tpu7x"'
        commands:
          - |
            .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mmlu.sh -m  "gs://tpu-commons-ci/deepseek/r1" -n 14042 -l 4

      - label: "${TPU_VERSION:-tpu6e} E2E MMLU for DeepSeek-V4-Flash torchax backend"
        key: ${TPU_VERSION:-tpu6e}_test_37
        env:
          USE_PREBUILT_IMAGE: "1"
          NEW_MODEL_DESIGN: "1"
          SKIP_ACCURACY_TESTS: "False"
          VLLM_MLA_DISABLE: "0"
          MOE_REQUANTIZE_BLOCK_SIZE: "512"
          MOE_REQUANTIZE_WEIGHT_DTYPE: "fp4"
          MODEL_IMPL_TYPE: "vllm"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        if: build.env("NIGHTLY") == "1" && "${TPU_VERSION:-tpu6e}" == "tpu7x"
        commands:
          - |
            .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mmlu.sh -m  "gs://tpu-commons-ci/deepseek-v4-flash" -n 14042 -l 4



      - label: "${TPU_VERSION:-tpu6e} lora e2e tests for JAX + vLLM models multi chips"
        key: ${TPU_VERSION:-tpu6e}_test_13
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
          TEST_LORA_TP: "True"
          VLLM_LOG_LEVEL: "INFO"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        commands:
          - .buildkite/scripts/run_in_docker.sh bktec run
        plugins:
          - tests#v1.0.0:
              <<: *tests_plugin_defaults
              test-file-pattern: "/workspace/tpu_inference/tests/lora/test_lora.py"
              test-cmd: "bash -c 'MODEL_IMPL_TYPE=vllm TPU_BACKEND_TYPE=jax python3 -m pytest -s -v -x --junit-xml={{resultPath}} {{testExamples}}'"

      - label: "${TPU_VERSION:-tpu6e} lora unit tests on single chip"
        key: ${TPU_VERSION:-tpu6e}_test_15
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_SINGLE:-tpu_v6e_queue}
        commands:
          - .buildkite/scripts/run_in_docker.sh bktec run
        plugins:
          - tests#v1.0.0:
              <<: *tests_plugin_defaults
              test-file-pattern: "/workspace/tpu_inference/tests/lora/{test_bgmv.py,test_layers.py}"

      - label: "${TPU_VERSION:-tpu6e} lora unit tests on multi chips"
        key: ${TPU_VERSION:-tpu6e}_test_16
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
          USE_V6E8_QUEUE: "True"
          VLLM_LOG_LEVEL: "INFO"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        commands:
          - .buildkite/scripts/run_in_docker.sh bktec run
        plugins:
          - tests#v1.0.0:
              <<: *tests_plugin_defaults
              test-file-pattern: "/workspace/tpu_inference/tests/lora/test_layers.py"

      - label: "${TPU_VERSION:-tpu6e} E2E lm_eval accuracy check qwen3 coder with fused moe."
        key: ${TPU_VERSION:-tpu6e}_test_17
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        if: '"${TPU_VERSION:-tpu6e}" == "tpu7x"'
        commands:
          - |
            .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/check_lm_eval.sh  --model_name "Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8" --use_moe_ep_kernel 1 --tensor_parallel_size 8 --max_model_len 2048 --max_num_batched_tokens 2048 --max_gen_toks 256 --enable_expert_parallel 1 --flex_threshold 0.85 --strict_threshold 0.70

      - label: "${TPU_VERSION:-tpu6e} E2E lm_eval accuracy check qwen3 coder with gmm kernel."
        key: ${TPU_VERSION:-tpu6e}_test_18
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        if: '"${TPU_VERSION:-tpu6e}" == "tpu7x"'
        commands:
          - |
            .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/check_lm_eval.sh  --model_name "Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8" --use_moe_ep_kernel 0 --tensor_parallel_size 8 --max_model_len 2048 --max_num_batched_tokens 2048 --max_gen_toks 256 --enable_expert_parallel 1 --flex_threshold 0.85 --strict_threshold 0.70

      - label: "${TPU_VERSION:-tpu6e} E2E lm_eval accuracy check gpt oss."
        key: ${TPU_VERSION:-tpu6e}_test_19
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        # The strict-match is failing due to pattern mismatch, see #2318 for details.
        # TODO(#2318): set proper strict-match threshold.
        if: '"${TPU_VERSION:-tpu6e}" == "tpu7x"'
        commands:
          - |
            .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/check_lm_eval.sh  --model_name "openai/gpt-oss-120b" --use_moe_ep_kernel 1 --tensor_parallel_size 8 --max_model_len 2048 --max_num_batched_tokens 2048 --max_gen_toks 256 --enable_expert_parallel 1 --flex_threshold 0.50 --strict_threshold 0.0

      - label: "${TPU_VERSION:-tpu6e} Perf regression test for qwen3 coder 1k 8k with fused moe kernel."
        key: ${TPU_VERSION:-tpu6e}_test_20
        env:
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        if: build.env("NIGHTLY") == "1" && "${TPU_VERSION:-tpu6e}" == "tpu7x"
        commands:
          - |
            .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/bm_qwen3_coder.sh --model Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8 --tp 8 --req_tput_limit 0.15  --output_token_tput_limit 1170 --total_token_tput_limit 1314 --input_len 1024 --output_len 8192 --use_moe_ep_kernel 1

      - label: "${TPU_VERSION:-tpu6e} Perf regression test for qwen3 coder 8k 1k with fused moe kernel."
        key: ${TPU_VERSION:-tpu6e}_test_21
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        if: build.env("NIGHTLY") == "1" && "${TPU_VERSION:-tpu6e}" == "tpu7x"
        commands:
          - |
            .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/bm_qwen3_coder.sh --model Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8 --tp 8 --req_tput_limit 0.4  --output_token_tput_limit 381 --total_token_tput_limit 3421 --input_len 8192 --output_len 1024 --use_moe_ep_kernel 1

      - label: "${TPU_VERSION:-tpu6e} Perf regression test for qwen3 coder 1k 8k with gmm kernel."
        key: ${TPU_VERSION:-tpu6e}_test_22
        env:
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        if: build.env("NIGHTLY") == "1" && "${TPU_VERSION:-tpu6e}" == "tpu7x"
        commands:
          - |
            .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/bm_qwen3_coder.sh --model Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8 --tp 8 --req_tput_limit 0.16  --output_token_tput_limit 1673 --total_token_tput_limit 1881 --input_len 1024 --output_len 8192 --use_moe_ep_kernel 0

      - label: "${TPU_VERSION:-tpu6e} Perf regression test for qwen3 coder 8k 1k with gmm kernel."
        key: ${TPU_VERSION:-tpu6e}_test_23
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        if: build.env("NIGHTLY") == "1" && "${TPU_VERSION:-tpu6e}" == "tpu7x"
        commands:
          - |
            .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/bm_qwen3_coder.sh --model Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8 --tp 8 --req_tput_limit 0.63  --output_token_tput_limit 645 --total_token_tput_limit 5781 --input_len 8192 --output_len 1024 --use_moe_ep_kernel 0

      - label: "${TPU_VERSION:-tpu6e} Test EP recompilation."
        key: ${TPU_VERSION:-tpu6e}_test_24
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        if: '"${TPU_VERSION:-tpu6e}" == "tpu7x"'
        commands:
          - |
            .buildkite/scripts/run_in_docker.sh bash -c 'SKIP_JAX_PRECOMPILE=0 USE_MOE_EP_KERNEL=1 VLLM_XLA_CHECK_RECOMPILATION=1  MODEL_IMPL_TYPE=vllm python examples/offline_inference.py --model Qwen/Qwen1.5-MoE-A2.7B  --tensor-parallel-size 4 --enable-expert-parallel --no-async-scheduling --max-model-len 32 --max-num-batched-tokens 32 --max-num-seqs 8'

      - label: "${TPU_VERSION:-tpu6e} E2E test for Multihost DCN-based P/D disaggregation"
        key: ${TPU_VERSION:-tpu6e}_test_25
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
          MODEL: "Qwen/Qwen3-0.6B"
          INPUT_LEN: 1024
          OUTPUT_LEN: 1024
          NUM_PROMPTS: 100
          RANDOM_SEED: 10
          MAX_CONCURRENCY: 10
          TEST_MODE: 1
        agents:
          queue: "${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}"
        commands:
          - |
            .buildkite/scripts/run_disagg.sh

      - label: "${TPU_VERSION:-tpu6e} E2E test for Ray-based multi-host"
        key: "${TPU_VERSION:-tpu6e}_test_26"
        # Temporarily disabled: consistently times out (~2h) and squats the
        # scarce tpu_v7x_16_queue. Two independent causes -- (1) the multi-host
        # image tag omitted the vLLM commit so workers could pull a clobbered
        # image (fixed separately), and (2) a bad multi-host machine whose Runai
        # weight-streamer stalls at ~50%. Re-enable once both are resolved.
        skip: "Times out ~2h; re-enable after bad-machine fix"
        agents:
