apiVersion: v1
kind: ServiceAccount
metadata:
  name: buildkite-resource-pvc-manager
  namespace: buildkite
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: buildkite-resource-pvc-manager
  namespace: buildkite
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: buildkite-resource-pvc-manager
  namespace: buildkite
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: buildkite-resource-pvc-manager
subjects:
  - kind: ServiceAccount
    name: buildkite-resource-pvc-manager
    namespace: buildkite
