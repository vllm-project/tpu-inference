# Upload only after Gate 1 through Gate 3 in README.md pass.
# KUBE_BUILDKITE_QUEUE is expanded when the pipeline is uploaded. It defaults
# to kube for the selected direct cutover; upload only after the original
# ci-dev controller is stopped. The generated Kubernetes Job uses
# the internal Kueue LocalQueue v6e-1 through namespace defaulting/admission.
steps:
  - label: ":kubernetes: MultiKueue v6e-1 Buildkite smoke"
    key: "multikueue_v6e1_smoke"
    timeout_in_minutes: 20
    agents:
      queue: "${KUBE_BUILDKITE_QUEUE:-kube}"
    command: |
      set -euo pipefail
      echo "Buildkite MultiKueue smoke running on $${HOSTNAME}"
      sleep 30
    plugins:
      - kubernetes:
          # This deliberately replaces the POC's indefinite pending timeout.
          # Increase only if measured cold TPU provisioning requires it.
          pendingTimeout: 900
          podSpec:
            terminationGracePeriodSeconds: 5
            containers:
              - name: vllm-tpu-runner
                image: "${KUEUE_SMOKE_IMAGE}"
                resources:
                  requests:
                    google.com/tpu: "1"
                  limits:
                    google.com/tpu: "1"
