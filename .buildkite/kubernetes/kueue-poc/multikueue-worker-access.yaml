# POC-only, namespace-scoped identity used by the manager Kueue controller to
# create and observe Workloads and batch Jobs on one worker. Compare this with
# the RBAC shipped by the pinned Kueue release before applying it. Use the
# release's official MultiKueue kubeconfig helper when available.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: multikueue-manager
  namespace: buildkite-v6e-1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: multikueue-manager
  namespace: buildkite-v6e-1
rules:
  - apiGroups:
      - kueue.x-k8s.io
    resources:
      - workloads
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: multikueue-manager
  namespace: buildkite-v6e-1
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: multikueue-manager
subjects:
  - kind: ServiceAccount
    name: multikueue-manager
    namespace: buildkite-v6e-1
