# First-worker POC resources for ci-test-southamerica-west1-worker.
# Quota is intentionally one chip until end-to-end dispatch and cleanup pass.
# Before applying, complete AUTOPILOT_HANDOFF.md Phase 1.5. If this GKE version
# requires a ComputeClass or other supported selector to consume reservation
# cloudtpu-20250327121501-861300654, add that verified selector under the
# ResourceFlavor nodeLabels below. The reservation name itself is not assumed
# to be a Kubernetes label.
apiVersion: v1
kind: Namespace
metadata:
  name: buildkite-v6e-1
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: v6e-1
spec:
  nodeLabels:
    cloud.google.com/gke-tpu-accelerator: tpu-v6e-slice
    cloud.google.com/gke-tpu-topology: 1x1
    topology.kubernetes.io/zone: southamerica-west1-a
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: v6e-1
spec:
  namespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: buildkite-v6e-1
  resourceGroups:
    - coveredResources:
        - google.com/tpu
      flavors:
        - name: v6e-1
          resources:
            - name: google.com/tpu
              nominalQuota: 1
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  name: v6e-1
  namespace: buildkite-v6e-1
spec:
  clusterQueue: v6e-1
