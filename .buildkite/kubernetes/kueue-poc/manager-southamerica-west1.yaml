# First-manager POC resources for ci-test-controller with one worker.
# The kubeconfig Secret referenced below must exist in the manager Kueue
# controller namespace before this file is applied.
apiVersion: v1
kind: Namespace
metadata:
  name: buildkite-v6e-1
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: MultiKueueCluster
metadata:
  name: ci-test-southamerica-west1-worker
spec:
  kubeConfig:
    locationType: Secret
    location: ci-test-southamerica-west1-worker-kubeconfig
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: MultiKueueConfig
metadata:
  name: v6e-1-workers
spec:
  clusters:
    - ci-test-southamerica-west1-worker
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: AdmissionCheck
metadata:
  name: multikueue-dispatch
spec:
  controllerName: kueue.x-k8s.io/multikueue
  parameters:
    apiGroup: kueue.x-k8s.io
    kind: MultiKueueConfig
    name: v6e-1-workers
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: v6e-1
spec:
  nodeLabels:
    cloud.google.com/gke-tpu-accelerator: tpu-v6e-slice
    cloud.google.com/gke-tpu-topology: 1x1
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: v6e-1
spec:
  namespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: buildkite-v6e-1
  admissionChecks:
    - multikueue-dispatch
  resourceGroups:
    - coveredResources:
        - google.com/tpu
      flavors:
        - name: v6e-1
          resources:
            - name: google.com/tpu
              nominalQuota: 1
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  name: v6e-1
  namespace: buildkite-v6e-1
spec:
  clusterQueue: v6e-1
