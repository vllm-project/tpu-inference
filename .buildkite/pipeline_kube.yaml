# ==============================================================================
# Common Reusable Anchors
# ==============================================================================

.kube_common_env: &kube_common_env
  PYTHONUNBUFFERED: "1"
  VLLM_NO_USAGE_STATS: "1"
  TPU_VERSION: "tpu6e"
  HF_HOME: "/cache/hf_home"
  NLTK_DATA: "/cache/nltk_data"
  VLLM_XLA_CACHE_PATH: "/cache/tpu_jax_cache"
  JAX_COMPILATION_CACHE_DIR: "/cache/tpu_jax_cache"

.kube_common_tolerations: &kube_common_tolerations
  - key: "google.com/tpu"
    operator: "Equal"
    value: "present"
    effect: "NoSchedule"

.kube_common_affinity: &kube_common_affinity
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: "app"
              operator: "In"
              values:
                - "vllm-tpu-runner"
        topologyKey: "kubernetes.io/hostname"

# Match the currently usable project quota. These Buildkite-side gates keep
# Agent Stack from creating pods that cannot possibly be scheduled, and also
# coordinate overlapping POC builds that target the same scarce pools.
.kube_v6e_1chip_concurrency: &kube_v6e_1chip_concurrency
  concurrency: 8
  concurrency_group: "kube-dev/v6e-1chip"

.kube_v6e_8chip_concurrency: &kube_v6e_8chip_concurrency
  concurrency: 1
  concurrency_group: "kube-dev/v6e-8chip"

.kube_common_volume_mounts: &kube_common_volume_mounts
  - name: dshm
    mountPath: /dev/shm
  - name: cache-volume
    mountPath: /cache

.kube_common_volumes: &kube_common_volumes
  - name: dshm
    emptyDir:
      medium: Memory
      sizeLimit: 16Gi
  - name: cache-volume
    ephemeral:
      volumeClaimTemplate:
        spec:
          accessModes: [ "ReadWriteOnce" ]
          storageClassName: "premium-rwo"
          dataSource:
            name: tpu-cache-golden-pvc
            kind: PersistentVolumeClaim
          resources:
            requests:
              storage: 500Gi

.kube_named_cache_volumes: &kube_named_cache_volumes
  - name: dshm
    emptyDir:
      medium: Memory
      sizeLimit: 16Gi
  - name: cache-volume
    persistentVolumeClaim:
      claimName: "bk-${BUILDKITE_BUILD_NUMBER}-resource-poc"

# ==============================================================================
# Topology Specific Anchors
# ==============================================================================

.kube_tpu_v6e_1chip_plugin: &kube_tpu_v6e_1chip_plugin
  kubernetes:
    pendingTimeout: 0  # Disables pending timeout (indefinite waiting for TPU node)
    podSpec:
      terminationGracePeriodSeconds: 5  # Immediately releases TPU resources when pod exits
      affinity: *kube_common_affinity
      metadata:
        labels:
          app: "vllm-tpu-runner"
      nodeSelector:
        cloud.google.com/gke-tpu-accelerator: "tpu-v6e-slice"
        cloud.google.com/gke-tpu-topology: "1x1"
      tolerations: *kube_common_tolerations
      containers:
        - name: vllm-tpu-runner
          image: "us-central1-docker.pkg.dev/cloud-ullm-inference-ci-cd/tpu-inference-ci/vllm-tpu:kube-${BUILDKITE_COMMIT}"
          resources:
            limits:
              google.com/tpu: "1"
            requests:
              google.com/tpu: "1"
          volumeMounts: *kube_common_volume_mounts
      volumes: *kube_common_volumes

.kube_tpu_v6e_8chip_plugin: &kube_tpu_v6e_8chip_plugin
  kubernetes:
    pendingTimeout: 0  # Disables pending timeout (indefinite waiting for TPU node)
    podSpec:
      terminationGracePeriodSeconds: 5  # Immediately releases TPU resources when pod exits
      affinity: *kube_common_affinity
      metadata:
        labels:
          app: "vllm-tpu-runner"
      nodeSelector:
        cloud.google.com/gke-tpu-accelerator: "tpu-v6e-slice"
        cloud.google.com/gke-tpu-topology: "2x4"
      tolerations: *kube_common_tolerations
      containers:
        - name: vllm-tpu-runner
          image: "us-central1-docker.pkg.dev/cloud-ullm-inference-ci-cd/tpu-inference-ci/vllm-tpu:kube-${BUILDKITE_COMMIT}"
          resources:
            limits:
              google.com/tpu: "8"
            requests:
              google.com/tpu: "8"
          volumeMounts: *kube_common_volume_mounts
      volumes: *kube_common_volumes

# Opt-in proof that preparation can use an ordinary CPU node while handing the
# same named, zonal PVC to a later TPU job. The control pod intentionally has no
# selector; the prep pod is pinned to the TPU/PV zone but requests no TPU.
.kube_resource_control_plugin: &kube_resource_control_plugin
  kubernetes:
    podSpec:
      terminationGracePeriodSeconds: 5
      metadata:
        labels:
          app: "vllm-resource-control"
      containers:
        - name: vllm-tpu-runner
          image: "us-central1-docker.pkg.dev/cloud-ullm-inference-ci-cd/tpu-inference-ci/vllm-tpu:kube-${BUILDKITE_COMMIT}"

.kube_resource_cpu_plugin: &kube_resource_cpu_plugin
  kubernetes:
    pendingTimeout: 0
    podSpec:
      terminationGracePeriodSeconds: 5
      metadata:
        labels:
          app: "vllm-resource-prep"
      nodeSelector:
        topology.kubernetes.io/zone: "southamerica-west1-a"
      containers:
        - name: vllm-tpu-runner
          image: "us-central1-docker.pkg.dev/cloud-ullm-inference-ci-cd/tpu-inference-ci/vllm-tpu:kube-${BUILDKITE_COMMIT}"
          volumeMounts: *kube_common_volume_mounts
      volumes: *kube_named_cache_volumes

.kube_resource_tpu_v6e_1chip_plugin: &kube_resource_tpu_v6e_1chip_plugin
  kubernetes:
    pendingTimeout: 0
    podSpec:
      terminationGracePeriodSeconds: 5
      affinity: *kube_common_affinity
      metadata:
        labels:
          app: "vllm-tpu-runner"
      nodeSelector:
        cloud.google.com/gke-tpu-accelerator: "tpu-v6e-slice"
        cloud.google.com/gke-tpu-topology: "1x1"
        topology.kubernetes.io/zone: "southamerica-west1-a"
      tolerations: *kube_common_tolerations
      containers:
        - name: vllm-tpu-runner
          image: "us-central1-docker.pkg.dev/cloud-ullm-inference-ci-cd/tpu-inference-ci/vllm-tpu:kube-${BUILDKITE_COMMIT}"
          resources:
            limits:
              google.com/tpu: "1"
            requests:
              google.com/tpu: "1"
          volumeMounts: *kube_common_volume_mounts
      volumes: *kube_named_cache_volumes

# ==============================================================================
# Pipeline Steps
# ==============================================================================

steps:
  # Build the exact checkout + vLLM LKG used by this build. The commit-specific
  # alias lets the Kubernetes plugin resolve the image before this dependency
  # finishes without falling back to a stale, manually maintained image tag.
  - label: ":docker: Build and push Kubernetes test image"
    key: "kube_build_image"
    timeout_in_minutes: 60
    agents:
      queue: "cpu"
    env:
      BM_INFRA: "false"
      TPU_VERSION: "tpu6e"
      CI_IMAGE_ALIAS_TAG: "kube-${BUILDKITE_COMMIT}"
      KEEP_IMAGE_AFTER_PUSH: "true"
    commands:
      - buildkite-agent meta-data set VLLM_COMMIT_HASH "$$(tr -d '[:space:]' < .buildkite/vllm_lkg.version)"
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  # Shadow-run the explicit CPU-safe allowlist in the exact test image. Keep
  # these tests in their TPU shards until repeated CPU runs establish that the
  # classification is stable. Disabling networking catches hidden downloads.
  - label: ":cpu: CPU-safe unit tests (shadow)"
    key: "kube_cpu_safe_tests"
    depends_on: "kube_build_image"
    timeout_in_minutes: 15
    agents:
      queue: "cpu"
    commands:
      - |
        docker run --rm \
          --network none \
          --user "$$(id -u):$$(id -g)" \
          -e HOME=/tmp \
          -e LOGNAME=buildkite \
          -e USER=buildkite \
          -e HF_HOME=/tmp/hf_home \
          -e XDG_CACHE_HOME=/tmp/.cache \
          -e JAX_PLATFORMS=cpu \
          -e TPU_NAME=cpu-safe \
          -v "$$PWD:/workspace/build/buildkite" \
          -w /workspace/build/buildkite \
          "us-central1-docker.pkg.dev/cloud-ullm-inference-ci-cd/tpu-inference-ci/vllm-tpu:kube-${BUILDKITE_COMMIT}" \
          python3 .buildkite/scripts/run_cpu_safe_tests.py -q

  - label: ":floppy_disk: Create resource-prep cache clone"
    key: "kube_resource_pvc_create"
    depends_on: "kube_build_image"
    if: build.env("KUBE_RESOURCE_PREP_POC") == "1"
    agents:
      queue: "kube"
    commands:
      - |
        python3 .buildkite/scripts/manage_kube_cache_pvc.py create \
          --name "bk-${BUILDKITE_BUILD_NUMBER}-resource-poc" \
          --source-pvc tpu-cache-golden-pvc \
          --storage-class premium-rwo \
          --size 500Gi \
          --zone southamerica-west1-a
    plugins:
      - <<: *kube_resource_control_plugin

  - label: ":package: Prepare cache, models, and dataset on CPU"
    key: "kube_resource_cpu_prepare"
    depends_on: "kube_resource_pvc_create"
    if: build.env("KUBE_RESOURCE_PREP_POC") == "1"
    agents:
      queue: "kube"
    secrets:
      - HF_TOKEN
    env:
      <<: *kube_common_env
    commands:
      - |
        python3 .buildkite/scripts/prepare_kube_resources.py \
          --model Qwen/Qwen2.5-1.5B-Instruct \
          --model Qwen/Qwen2.5-0.5B-Instruct \
          --model meta-llama/Llama-3.1-8B-Instruct \
          --dataset mlperf
      - test -s /cache/.buildkite/prepared-resources.json
    plugins:
      - <<: *kube_resource_cpu_plugin

  - label: ":kubernetes: Prepared MLPerf JAX + vLLM handoff"
    key: "kube_e2e_mlperf_jax_vllm_prepared"
    <<: *kube_v6e_1chip_concurrency
    depends_on: "kube_resource_cpu_prepare"
    soft_fail: true
    if: build.env("KUBE_RESOURCE_PREP_POC") == "1"
    agents:
      queue: "kube"
    secrets:
      - HF_TOKEN
    env:
      <<: *kube_common_env
      MODEL_IMPL_TYPE: "vllm"
      MLPERF_DATASET_PATH: "/cache/datasets/open_orca/open_orca_gpt4_tokenized_llama.sampled_24576.pkl"
      # Prove that CPU preparation is complete. A missing model must fail here
      # rather than quietly downloading while a TPU is allocated.
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    commands:
      - test -s /cache/.buildkite/prepared-resources.json
      - bash tests/e2e/benchmarking/mlperf.sh
    plugins:
      - <<: *kube_resource_tpu_v6e_1chip_plugin

  - label: ":outbox_tray: Finalize compilation cache on CPU"
    key: "kube_resource_cpu_finalize"
    depends_on: "kube_e2e_mlperf_jax_vllm_prepared"
    allow_dependency_failure: true
    if: build.env("KUBE_RESOURCE_PREP_POC") == "1"
    agents:
      queue: "kube"
    env:
      <<: *kube_common_env
    commands:
      - |
        outcome="$$(buildkite-agent step get outcome --step kube_e2e_mlperf_jax_vllm_prepared)"
        if [ "$$outcome" != "passed" ]; then
          echo "Skipping cache publication because TPU outcome is $$outcome"
          exit 0
        fi
        if [ -n "$${KUBE_CACHE_WRITE_PREFIX:-}" ]; then
          python3 .buildkite/scripts/prepare_kube_resources.py \
            --publish-cache \
            --cache-write-prefix "$$KUBE_CACHE_WRITE_PREFIX"
        else
          echo "KUBE_CACHE_WRITE_PREFIX is unset; reporting the delta without uploading"
          python3 .buildkite/scripts/prepare_kube_resources.py --publish-cache
        fi
    plugins:
      - <<: *kube_resource_cpu_plugin

  - label: ":wastebasket: Delete resource-prep cache clone"
    key: "kube_resource_pvc_cleanup"
    depends_on:
      - "kube_resource_pvc_create"
      - "kube_resource_cpu_prepare"
      - "kube_e2e_mlperf_jax_vllm_prepared"
      - "kube_resource_cpu_finalize"
    allow_dependency_failure: true
    if: build.env("KUBE_RESOURCE_PREP_POC") == "1"
    agents:
      queue: "kube"
    commands:
      - python3 .buildkite/scripts/manage_kube_cache_pvc.py delete --name "bk-${BUILDKITE_BUILD_NUMBER}-resource-poc"
    plugins:
      - <<: *kube_resource_control_plugin

  # pipeline_jax.yml test_0.
  - label: ":kubernetes: E2E MLPerf tests for JAX models"
    key: "kube_e2e_mlperf_jax"
    <<: *kube_v6e_1chip_concurrency
    depends_on: "kube_build_image"
    soft_fail: true
    if: build.env("KUBE_CPU_ONLY") != "1"
    agents:
      queue: "kube"
    secrets:
      - HF_TOKEN
    env:
      <<: *kube_common_env
    commands:
      - bash tests/e2e/benchmarking/mlperf.sh
    plugins:
      - <<: *kube_tpu_v6e_1chip_plugin

  # pipeline_jax.yml test_1. Opt in because the bare-metal counterpart is
  # nightly-only and this POC has limited TPU quota.
  - label: ":kubernetes: E2E MLPerf tests for JAX models with quantization"
    key: "kube_e2e_mlperf_quantized"
    <<: *kube_v6e_1chip_concurrency
    depends_on: "kube_build_image"
    soft_fail: true
    if: build.env("KUBE_CPU_ONLY") != "1" && build.env("KUBE_FULL_MATRIX") == "1"
    agents:
      queue: "kube"
    secrets:
      - HF_TOKEN
    env:
      <<: *kube_common_env
      QUANTIZATION: "True"
    commands:
      - bash tests/e2e/benchmarking/mlperf.sh
    plugins:
      - <<: *kube_tpu_v6e_1chip_plugin

  # pipeline_jax.yml test_2.
  - label: ":kubernetes: E2E MLPerf tests for JAX new models"
    key: "kube_e2e_mlperf_new_models"
    <<: *kube_v6e_1chip_concurrency
    depends_on: "kube_build_image"
    soft_fail: true
    if: build.env("KUBE_CPU_ONLY") != "1" && build.env("KUBE_FULL_MATRIX") == "1"
    agents:
      queue: "kube"
    secrets:
      - HF_TOKEN
    env:
      <<: *kube_common_env
      NEW_MODEL_DESIGN: "1"
    commands:
      - bash tests/e2e/benchmarking/mlperf.sh
    plugins:
      - <<: *kube_tpu_v6e_1chip_plugin

  # pipeline_jax.yml test_3.
  - label: ":kubernetes: E2E MLPerf tests for JAX + vLLM models on single chip"
    key: "kube_e2e_mlperf_jax_vllm"
    <<: *kube_v6e_1chip_concurrency
    depends_on: "kube_build_image"
    soft_fail: true
    if: build.env("KUBE_CPU_ONLY") != "1" && build.env("KUBE_RESOURCE_PREP_POC") != "1"
    agents:
      queue: "kube"
    secrets:
      - HF_TOKEN
    env:
      <<: *kube_common_env
      MODEL_IMPL_TYPE: "vllm"
    commands:
      - bash tests/e2e/benchmarking/mlperf.sh
    plugins:
      - <<: *kube_tpu_v6e_1chip_plugin

  # pipeline_jax.yml test_4.
  - label: ":kubernetes: E2E MLPerf tests for Llama4 models"
    key: "kube_e2e_mlperf_llama4"
    <<: *kube_v6e_8chip_concurrency
    depends_on: "kube_build_image"
    soft_fail: true
    if: build.env("KUBE_CPU_ONLY") != "1" && build.env("KUBE_FULL_MATRIX") == "1"
    agents:
      queue: "kube"
    secrets:
      - HF_TOKEN
    env:
      <<: *kube_common_env
      NEW_MODEL_DESIGN: "1"
      USE_V6E8_QUEUE: "True"
    commands:
      - bash tests/e2e/benchmarking/mlperf.sh
    plugins:
      - <<: *kube_tpu_v6e_8chip_plugin

  - label: ":kubernetes: E2E speculative decoding test"
    key: "kube_e2e_speculative_decoding"
    <<: *kube_v6e_1chip_concurrency
    depends_on: "kube_build_image"
    soft_fail: true
    timeout_in_minutes: 180
    if: build.env("KUBE_CPU_ONLY") != "1"
    agents:
      queue: "kube"
    secrets:
      - HF_TOKEN
    env:
      <<: *kube_common_env
    commands:
      - |
        if [ "$${KUBE_FULL_MATRIX:-0}" = "1" ]; then
          export BVT_ONLY=
        else
          export BVT_ONLY=1
        fi
        python3 -m pytest -s -v -x tests/e2e/test_speculative_decoding.py
    plugins:
      - <<: *kube_tpu_v6e_1chip_plugin

  - label: ":kubernetes: JAX unit tests part1"
    key: "kube_jax_unit_tests_part1"
    <<: *kube_v6e_1chip_concurrency
    depends_on: "kube_build_image"
    soft_fail: true
    artifact_paths: ".coverage.part1.tpu6e"
    if: build.env("KUBE_CPU_ONLY") != "1"
    agents:
      queue: "kube"
    secrets:
      - HF_TOKEN
    env:
      <<: *kube_common_env
    commands:
      - rm -f .coverage .coverage.part1.tpu6e
      - python3 -m pytest -s -v -x tests/layers/vllm/backends/test_flash_attn.py tests/layers/vllm/test_awq.py tests/layers/vllm/test_compressed_tensors_moe.py tests/layers/vllm/test_compressed_tensors_w8a8_fp8.py tests/layers/vllm/test_compressed_tensors_w8a8_int8.py --cov-config=.coveragerc --cov tpu_inference
      - mv .coverage .coverage.part1.tpu6e
    plugins:
      - <<: *kube_tpu_v6e_1chip_plugin

  - label: ":kubernetes: JAX unit tests part2"
    key: "kube_jax_unit_tests_part2"
    <<: *kube_v6e_1chip_concurrency
    depends_on: "kube_build_image"
    soft_fail: true
    artifact_paths: ".coverage.part2.tpu6e"
    if: build.env("KUBE_CPU_ONLY") != "1"
    agents:
      queue: "kube"
    secrets:
      - HF_TOKEN
    env:
      <<: *kube_common_env
    commands:
      - rm -f .coverage .coverage.part2.tpu6e
      - env -u TPU_ACCELERATOR_TYPE python3 -m pytest -s -v -x tests/test_envs.py --cov-config=.coveragerc --cov tpu_inference
      - python3 -m pytest -s -v -x tests/ --ignore=tests/test_envs.py --ignore=tests/layers/vllm/backends/test_flash_attn.py --ignore=tests/layers/vllm/test_awq.py --ignore=tests/layers/vllm/test_compressed_tensors_moe.py --ignore=tests/layers/vllm/test_compressed_tensors_w8a8_fp8.py --ignore=tests/layers/vllm/test_compressed_tensors_w8a8_int8.py --ignore=tests/kernels --ignore=tests/lora --ignore=tests/e2e --ignore=tpu_inference/mock --ignore=tests/models/jax/test_deepseek_v3.py --ignore=tests/offload/tpu_offload_multi_request_accuracy_test.py --ignore=tests/offload/tpu_offload_accuracy_test.py --ignore=tests/offload/tpu_offload_performance_test.py --ignore=tests/core/test_dp_group_sampling_prefix_cache.py --ignore=tests/runner/test_async_logprobs.py --ignore=tests/runner/test_processed_logprobs.py --ignore=tests/runner/test_moe_expert_ids.py --cov-config=.coveragerc --cov-append --cov tpu_inference
      - mv .coverage .coverage.part2.tpu6e
    plugins:
      - <<: *kube_tpu_v6e_1chip_plugin

  # pipeline_jax.yml test_7_3. This is CPU-only but is part of the behavioral
  # parity check for the two TPU unit-test shards above.
  - label: ":bar_chart: JAX unit tests combine and report"
    key: "kube_jax_unit_tests_report"
    depends_on:
      - "kube_jax_unit_tests_part1"
      - "kube_jax_unit_tests_part2"
    soft_fail: true
    if: build.env("KUBE_CPU_ONLY") != "1"
    agents:
      queue: "cpu"
    commands:
      - buildkite-agent artifact download ".coverage.part*" .
      - |
        # The CPU builder currently runs Python 3.14, while the old pinned Pex
        # bootstrap only supports Python <3.13. Use the same Python 3.12 base
        # and coverage.py version that produced these data files.
        docker run --rm \
          --user "$$(id -u):$$(id -g)" \
          -e HOME=/tmp \
          -v "$$PWD:/workspace/tpu_inference" \
          -w /workspace/tpu_inference \
          python:3.12-slim-bookworm@sha256:d50fb7611f86d04a3b0471b46d7557818d88983fc3136726336b2a4c657aa30 \
          sh -euc '
            python3 -m pip install --quiet --target /tmp/coverage coverage==7.15.2
            export PYTHONPATH=/tmp/coverage
            export COVERAGE_RCFILE=.buildkite/coverage_kube.rc
            python3 -m coverage combine .coverage.part1.tpu6e .coverage.part2.tpu6e
            python3 -m coverage report --fail-under=68
          '

  - label: ":kubernetes: JAX unit tests - kernels"
    key: "kube_jax_unit_tests_kernels"
    <<: *kube_v6e_1chip_concurrency
    depends_on: "kube_build_image"
    soft_fail: true
    if: build.env("KUBE_CPU_ONLY") != "1"
    agents:
      queue: "kube"
    secrets:
      - HF_TOKEN
    env:
      <<: *kube_common_env
    commands:
      - python3 -m pytest -s -v -x tests/kernels --ignore=tests/kernels/ragged_paged_attention_kernel_v2_test.py --ignore=tests/kernels/ragged_kv_cache_update_v2_test.py --ignore=tests/kernels/collectives --ignore=tests/kernels/spmm_v1_test.py
    plugins:
      - <<: *kube_tpu_v6e_1chip_plugin

  # pipeline_jax.yml test_9.
  - label: ":kubernetes: JAX unit tests - collective kernels"
    key: "kube_jax_unit_tests_collectives"
    <<: *kube_v6e_8chip_concurrency
    depends_on: "kube_build_image"
    soft_fail: true
    if: build.env("KUBE_CPU_ONLY") != "1" && build.env("KUBE_FULL_MATRIX") == "1"
    agents:
      queue: "kube"
    secrets:
      - HF_TOKEN
    env:
      <<: *kube_common_env
    commands:
      - python3 -m pytest -s -v -x tests/kernels/collectives
    plugins:
      - <<: *kube_tpu_v6e_8chip_plugin

  - label: ":kubernetes: LoRA unit tests on single chip"
    key: "kube_lora_unit_tests"
    <<: *kube_v6e_1chip_concurrency
    depends_on: "kube_build_image"
    soft_fail: true
    if: build.env("KUBE_CPU_ONLY") != "1"
    agents:
      queue: "kube"
    secrets:
      - HF_TOKEN
    env:
      <<: *kube_common_env
    commands:
