  - label: ":kubernetes: E2E test for MPMD data parallelism"
    key: "kube_mpmd_data_parallelism"
    <<: *kube_v6e_8chip_concurrency
    depends_on: "kube_build_image"
    soft_fail: true
    if: build.env("KUBE_CPU_ONLY") != "1"
    agents:
      queue: "kube"
    secrets:
      - HF_TOKEN
    env:
      <<: *kube_common_env
      NEW_MODEL_DESIGN: "1"
    commands:
      - |
        set -eu
        MODEL=meta-llama/Llama-3.1-8B-Instruct
        TPU_MULTIPROCESS_DP=1 \
          VLLM_ENGINE_READY_TIMEOUT_S=60000 \
          MODEL_IMPL_TYPE=flax_nnx \
          vllm serve $$MODEL \
            --port 8000 \
            --data-parallel-size 4 \
            --tensor-parallel-size 1 \
            --max-model-len 1024 \
            --no-enable-prefix-caching \
            --gpu-memory-utilization 0.9 &
        trap "kill %1 2>/dev/null || true" EXIT
        for _ in $$(seq 1 180); do
          curl -fs localhost:8000/health > /dev/null && break || sleep 10
        done
        curl -fsS http://localhost:8000/v1/completions \
          -X POST \
          -H "Content-Type: application/json" \
          -d "{\"model\": \"$$MODEL\", \"prompt\": \"San Francisco is a\", \"max_tokens\": 50}"
    plugins:
      - <<: *kube_tpu_v6e_8chip_plugin

