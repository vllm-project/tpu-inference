# Qwen/Qwen3-Omni-30B-A3B-Instruct
# multimodal
steps:
  - label: "${TEST_LABEL_PREFIX} Unit tests for Qwen/Qwen3-Omni-30B-A3B-Instruct"
    key: "${TEST_KEY_PREFIX}Qwen_Qwen3-Omni-30B-A3B-Instruct_UnitTest"
    agents:
      queue: "${TPU_LARGE_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    soft_fail: true
    commands:
      - |
        buildkite-agent meta-data set "${TEST_KEY_PREFIX}Qwen_Qwen3-Omni-30B-A3B-Instruct_UnitTest" "unverified"
  - label: "${TEST_LABEL_PREFIX} Record unit test result for Qwen/Qwen3-Omni-30B-A3B-Instruct"
    key: "${TEST_KEY_PREFIX}record_Qwen_Qwen3-Omni-30B-A3B-Instruct_UnitTest"
    depends_on: "${TEST_KEY_PREFIX}Qwen_Qwen3-Omni-30B-A3B-Instruct_UnitTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX}Qwen/Qwen3-Omni-30B-A3B-Instruct"
      CI_STAGE: "UnitTest"
      CI_CATEGORY: "multimodal"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}Qwen_Qwen3-Omni-30B-A3B-Instruct_UnitTest

  - label: "${TEST_LABEL_PREFIX} Integration tests for Qwen/Qwen3-Omni-30B-A3B-Instruct"
    key: "${TEST_KEY_PREFIX}Qwen_Qwen3-Omni-30B-A3B-Instruct_IntegrationTest"
    depends_on: "${TEST_KEY_PREFIX}record_Qwen_Qwen3-Omni-30B-A3B-Instruct_UnitTest"
    agents:
      queue: "${TPU_LARGE_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    soft_fail: true
    commands:
      - |
        buildkite-agent meta-data set "${TEST_KEY_PREFIX}Qwen_Qwen3-Omni-30B-A3B-Instruct_IntegrationTest" "unverified"
  - label: "${TEST_LABEL_PREFIX} Record integration test result for Qwen/Qwen3-Omni-30B-A3B-Instruct"
    key: "${TEST_KEY_PREFIX}record_Qwen_Qwen3-Omni-30B-A3B-Instruct_IntegrationTest"
    depends_on: "${TEST_KEY_PREFIX}Qwen_Qwen3-Omni-30B-A3B-Instruct_IntegrationTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX}Qwen/Qwen3-Omni-30B-A3B-Instruct"
      CI_STAGE: "IntegrationTest"
      CI_CATEGORY: "multimodal"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}Qwen_Qwen3-Omni-30B-A3B-Instruct_IntegrationTest

  - label: "${TEST_LABEL_PREFIX} Performance benchmarks for Qwen/Qwen3-Omni-30B-A3B-Instruct"
    key: "${TEST_KEY_PREFIX}Qwen_Qwen3-Omni-30B-A3B-Instruct_Benchmark"
    depends_on: "${TEST_KEY_PREFIX}record_Qwen_Qwen3-Omni-30B-A3B-Instruct_IntegrationTest"
    agents:
      queue: "${TPU_LARGE_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    soft_fail: true
    commands:
      - |
        buildkite-agent meta-data set "${TEST_KEY_PREFIX}Qwen_Qwen3-Omni-30B-A3B-Instruct_Benchmark" "unverified"
  - label: "${TEST_LABEL_PREFIX} Record performance benchmark result for Qwen/Qwen3-Omni-30B-A3B-Instruct"
    key: "${TEST_KEY_PREFIX}record_Qwen_Qwen3-Omni-30B-A3B-Instruct_Benchmark"
    depends_on: "${TEST_KEY_PREFIX}Qwen_Qwen3-Omni-30B-A3B-Instruct_Benchmark"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX}Qwen/Qwen3-Omni-30B-A3B-Instruct"
      CI_STAGE: "Benchmark"
      CI_CATEGORY: "multimodal"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}Qwen_Qwen3-Omni-30B-A3B-Instruct_Benchmark
