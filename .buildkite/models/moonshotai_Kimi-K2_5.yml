# pipeline-name: moonshotai/Kimi-K2.5
# pipeline-type: multimodal
steps:
  - label: "${TPU_VERSION:-tpu6e} Unit tests for moonshotai/Kimi-K2.5"
    key: "${TPU_VERSION:-tpu6e}_moonshotai_Kimi-K2_5_UnitTest"
    soft_fail: true
    agents:
      queue: cpu  # TODO: replace with execution environment
    commands:
      - |
        buildkite-agent meta-data set "${TPU_VERSION:-tpu6e}_moonshotai_Kimi-K2_5_UnitTest" "unverified"
  - label: "${TPU_VERSION:-tpu6e} Record unit test result for moonshotai/Kimi-K2.5"
    key: "${TPU_VERSION:-tpu6e}_record_moonshotai_Kimi-K2_5_UnitTest"
    depends_on: "${TPU_VERSION:-tpu6e}_moonshotai_Kimi-K2_5_UnitTest"
    env:
      CI_TPU_VERSION: "${TPU_VERSION:-tpu6e}"
      CI_TARGET: "moonshotai/Kimi-K2.5"
      CI_STAGE: "UnitTest"
      CI_CATEGORY: "multimodal"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TPU_VERSION:-tpu6e}_moonshotai_Kimi-K2_5_UnitTest

  - label: "${TPU_VERSION:-tpu6e} Accuracy for moonshotai/Kimi-K2.5"
    key: "${TPU_VERSION:-tpu6e}_moonshotai_Kimi-K2_5_Accuracy"
    depends_on: "${TPU_VERSION:-tpu6e}_record_moonshotai_Kimi-K2_5_UnitTest"
    soft_fail: true
    agents:
      queue: cpu  # TODO: replace with execution environment
    env:
      TEST_MODEL: moonshotai/Kimi-K2.5
      TENSOR_PARALLEL_SIZE: 1
      MINIMUM_ACCURACY_THRESHOLD: 0  # TODO : replace 0 with your accuracy threshold
    commands:
      - |
        buildkite-agent meta-data set "${TPU_VERSION:-tpu6e}_moonshotai_Kimi-K2_5_Accuracy" "unverified"
  - label: "${TPU_VERSION:-tpu6e} Record accuracy result for moonshotai/Kimi-K2.5"
    key: "${TPU_VERSION:-tpu6e}_record_moonshotai_Kimi-K2_5_Accuracy"
    depends_on: "${TPU_VERSION:-tpu6e}_moonshotai_Kimi-K2_5_Accuracy"
    env:
      CI_TPU_VERSION: "${TPU_VERSION:-tpu6e}"
      CI_TARGET: "moonshotai/Kimi-K2.5"
      CI_STAGE: "Accuracy/Correctness"
      CI_CATEGORY: "multimodal"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TPU_VERSION:-tpu6e}_moonshotai_Kimi-K2_5_Accuracy

  - label: "${TPU_VERSION:-tpu6e} Performance benchmarks for moonshotai/Kimi-K2.5"
    key: "${TPU_VERSION:-tpu6e}_moonshotai_Kimi-K2_5_Benchmark"
    depends_on: "${TPU_VERSION:-tpu6e}_record_moonshotai_Kimi-K2_5_Accuracy"
    soft_fail: true
    agents:
      queue: cpu  # TODO: replace with execution environment
    env:
      TEST_MODEL: moonshotai/Kimi-K2.5
      TENSOR_PARALLEL_SIZE: 1
      MINIMUM_THROUGHPUT_THRESHOLD: 0  # TODO : replace 0 with your performance threshold
    commands:
      - |
        buildkite-agent meta-data set "${TPU_VERSION:-tpu6e}_moonshotai_Kimi-K2_5_Benchmark" "unverified"
  - label: "${TPU_VERSION:-tpu6e} Record performance benchmark result for moonshotai/Kimi-K2.5"
    key: "${TPU_VERSION:-tpu6e}_record_moonshotai_Kimi-K2_5_Benchmark"
    depends_on: "${TPU_VERSION:-tpu6e}_moonshotai_Kimi-K2_5_Benchmark"
    env:
      CI_TPU_VERSION: "${TPU_VERSION:-tpu6e}"
      CI_TARGET: "moonshotai/Kimi-K2.5"
      CI_STAGE: "Benchmark"
      CI_CATEGORY: "multimodal"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TPU_VERSION:-tpu6e}_moonshotai_Kimi-K2_5_Benchmark
