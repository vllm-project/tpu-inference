# pipeline-name: Qwen/Qwen2.5-VL-7B-Instruct
# pipeline-type: multimodal
steps:
  - label: "${TEST_LABEL_PREFIX} Unit tests for Qwen/Qwen2.5-VL-7B-Instruct"
    key: "${TEST_KEY_PREFIX}Qwen_Qwen2_5-VL-7B-Instruct_UnitTest"
    agents:
      queue: "${TPU_SMALL_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    soft_fail: true
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh \
          bash -c 'python3 -m pytest -s -v -x /workspace/tpu_inference/tests/models/jax/test_qwen2_5_vl.py'
  - label: "${TEST_LABEL_PREFIX} Record unit test result for Qwen/Qwen2.5-VL-7B-Instruct"
    key: "${TEST_KEY_PREFIX}record_Qwen_Qwen2_5-VL-7B-Instruct_UnitTest"
    depends_on: "${TEST_KEY_PREFIX}Qwen_Qwen2_5-VL-7B-Instruct_UnitTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX}Qwen/Qwen2.5-VL-7B-Instruct"
      CI_STAGE: "UnitTest"
      CI_CATEGORY: "multimodal"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}Qwen_Qwen2_5-VL-7B-Instruct_UnitTest

  - label: "${TEST_LABEL_PREFIX} Integration tests for Qwen/Qwen2.5-VL-7B-Instruct"
    key: "${TEST_KEY_PREFIX}Qwen_Qwen2_5-VL-7B-Instruct_IntegrationTest"
    depends_on: "${TEST_KEY_PREFIX}record_Qwen_Qwen2_5-VL-7B-Instruct_UnitTest"
    agents:
      queue: "${TPU_LARGE_CORE_QUEUE}"
    soft_fail: true
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
      TEST_MODEL: Qwen/Qwen2.5-VL-7B-Instruct
      TENSOR_PARALLEL_SIZE: 1
      MINIMUM_ACCURACY_THRESHOLD: 0.72
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/test_accuracy.sh
  - label: "${TEST_LABEL_PREFIX} Record integration test result for Qwen/Qwen2.5-VL-7B-Instruct"
    key: "${TEST_KEY_PREFIX}record_Qwen_Qwen2_5-VL-7B-Instruct_IntegrationTest"
    depends_on: "${TEST_KEY_PREFIX}Qwen_Qwen2_5-VL-7B-Instruct_IntegrationTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX}Qwen/Qwen2.5-VL-7B-Instruct"
      CI_STAGE: "IntegrationTest"
      CI_CATEGORY: "multimodal"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}Qwen_Qwen2_5-VL-7B-Instruct_IntegrationTest

  - label: "${TEST_LABEL_PREFIX} Performance benchmarks for Qwen/Qwen2.5-VL-7B-Instruct"
    key: "${TEST_KEY_PREFIX}Qwen_Qwen2_5-VL-7B-Instruct_Benchmark"
    depends_on: "${TEST_KEY_PREFIX}record_Qwen_Qwen2_5-VL-7B-Instruct_IntegrationTest"
    soft_fail: true
    agents:
      queue: "${TPU_SMALL_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mm_bench_recipe.sh
  - label: "${TEST_LABEL_PREFIX} Record performance benchmark result for Qwen/Qwen2.5-VL-7B-Instruct"
    key: "${TEST_KEY_PREFIX}record_Qwen_Qwen2_5-VL-7B-Instruct_Benchmark"
    depends_on: "${TEST_KEY_PREFIX}Qwen_Qwen2_5-VL-7B-Instruct_Benchmark"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX}Qwen/Qwen2.5-VL-7B-Instruct"
      CI_STAGE: "Benchmark"
      CI_CATEGORY: "multimodal"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}Qwen_Qwen2_5-VL-7B-Instruct_Benchmark
