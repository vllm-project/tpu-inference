# pipeline-name: nvidia/Qwen3-30B-A3B-NVFP4
# pipeline-type: text-only
steps:
  - label: "${TPU_VERSION:-tpu7x} Smoke test for nvidia/Qwen3-30B-A3B-NVFP4"
    key: "${TPU_VERSION:-tpu7x}_nvidia_Qwen3-30B-A3B-NVFP4_UnitTest"
    agents:
      queue: "${TPU_QUEUE_MULTI:-tpu_v7x_8_queue}"
    soft_fail: true
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh \
          bash /workspace/tpu_inference/.buildkite/scripts/test_nvfp4_serve.sh
  - label: "${TPU_VERSION:-tpu7x} Record smoke test result for nvidia/Qwen3-30B-A3B-NVFP4"
    key: "${TPU_VERSION:-tpu7x}_record_nvidia_Qwen3-30B-A3B-NVFP4_UnitTest"
    depends_on: "${TPU_VERSION:-tpu7x}_nvidia_Qwen3-30B-A3B-NVFP4_UnitTest"
    env:
      CI_TPU_VERSION: "${TPU_VERSION:-tpu7x}"
      CI_TARGET: "nvidia/Qwen3-30B-A3B-NVFP4"
      CI_STAGE: "UnitTest"
      CI_CATEGORY: "text-only"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TPU_VERSION:-tpu7x}_nvidia_Qwen3-30B-A3B-NVFP4_UnitTest

  - label: "${TPU_VERSION:-tpu7x} Accuracy for nvidia/Qwen3-30B-A3B-NVFP4"
    key: "${TPU_VERSION:-tpu7x}_nvidia_Qwen3-30B-A3B-NVFP4_Accuracy"
    depends_on: "${TPU_VERSION:-tpu7x}_record_nvidia_Qwen3-30B-A3B-NVFP4_UnitTest"
    agents:
      queue: "${TPU_QUEUE_MULTI:-tpu_v7x_8_queue}"
    soft_fail: true
    env:
      TEST_MODEL: nvidia/Qwen3-30B-A3B-NVFP4
      TENSOR_PARALLEL_SIZE: "${TENSOR_PARALLEL_SIZE_MULTI:-8}"
      MINIMUM_ACCURACY_THRESHOLD: 0.80
      MODEL_IMPL_TYPE: vllm
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/test_accuracy.sh
  - label: "${TPU_VERSION:-tpu7x} Record accuracy result for nvidia/Qwen3-30B-A3B-NVFP4"
    key: "${TPU_VERSION:-tpu7x}_record_nvidia_Qwen3-30B-A3B-NVFP4_Accuracy"
    depends_on: "${TPU_VERSION:-tpu7x}_nvidia_Qwen3-30B-A3B-NVFP4_Accuracy"
    env:
      CI_TPU_VERSION: "${TPU_VERSION:-tpu7x}"
      CI_TARGET: "nvidia/Qwen3-30B-A3B-NVFP4"
      CI_STAGE: "Accuracy/Correctness"
      CI_CATEGORY: "text-only"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TPU_VERSION:-tpu7x}_nvidia_Qwen3-30B-A3B-NVFP4_Accuracy

  - label: "${TPU_VERSION:-tpu7x} Performance benchmarks for nvidia/Qwen3-30B-A3B-NVFP4"
    key: "${TPU_VERSION:-tpu7x}_nvidia_Qwen3-30B-A3B-NVFP4_Benchmark"
    depends_on: "${TPU_VERSION:-tpu7x}_record_nvidia_Qwen3-30B-A3B-NVFP4_Accuracy"
    soft_fail: true
    agents:
      queue: "${TPU_QUEUE_MULTI:-tpu_v7x_8_queue}"
    env:
      TEST_MODEL: nvidia/Qwen3-30B-A3B-NVFP4
      TENSOR_PARALLEL_SIZE: "${TENSOR_PARALLEL_SIZE_MULTI:-8}"
      MINIMUM_THROUGHPUT_THRESHOLD: 5.00
      INPUT_LEN: 1800
      OUTPUT_LEN: 128
      PREFIX_LEN: 0
      MAX_MODEL_LEN: 2048
      MAX_NUM_SEQS: 16
      MAX_NUM_BATCHED_TOKENS: 2048
      MODEL_IMPL_TYPE: vllm
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/benchmark.sh
  - label: "${TPU_VERSION:-tpu7x} Record performance benchmark result for nvidia/Qwen3-30B-A3B-NVFP4"
    key: "${TPU_VERSION:-tpu7x}_record_nvidia_Qwen3-30B-A3B-NVFP4_Benchmark"
    depends_on: "${TPU_VERSION:-tpu7x}_nvidia_Qwen3-30B-A3B-NVFP4_Benchmark"
    env:
      CI_TPU_VERSION: "${TPU_VERSION:-tpu7x}"
      CI_TARGET: "nvidia/Qwen3-30B-A3B-NVFP4"
      CI_STAGE: "Benchmark"
      CI_CATEGORY: "text-only"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TPU_VERSION:-tpu7x}_nvidia_Qwen3-30B-A3B-NVFP4_Benchmark
