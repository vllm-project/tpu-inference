# google/gemma-3-27b-it
# text-only
steps:
  - label: "${TEST_LABEL_PREFIX} Unit tests for google/gemma-3-27b-it"
    key: "${TEST_KEY_PREFIX}google_gemma-3-27b-it_UnitTest"
    agents:
      queue: "${TPU_LARGE_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    soft_fail: true
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh \
          bash -c 'SKIP_JAX_PRECOMPILE=1 VLLM_XLA_CHECK_RECOMPILATION=0 python3 /workspace/tpu_inference/examples/offline_inference.py --model=google/gemma-3-27b-it --tensor_parallel_size=8 --task=generate --max_model_len=1024 --max_num_seqs=1'
  - label: "${TEST_LABEL_PREFIX} Record unit test result for google/gemma-3-27b-it"
    key: "${TEST_KEY_PREFIX}record_google_gemma-3-27b-it_UnitTest"
    depends_on: "${TEST_KEY_PREFIX}google_gemma-3-27b-it_UnitTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX}google/gemma-3-27b-it"
      CI_STAGE: "UnitTest"
      CI_CATEGORY: "text-only"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}google_gemma-3-27b-it_UnitTest

  - label: "${TEST_LABEL_PREFIX} Integration tests for google/gemma-3-27b-it"
    key: "${TEST_KEY_PREFIX}google_gemma-3-27b-it_IntegrationTest"
    depends_on: "${TEST_KEY_PREFIX}record_google_gemma-3-27b-it_UnitTest"
    agents:
      queue: "${TPU_LARGE_CORE_QUEUE}"
    soft_fail: true
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
      TEST_MODEL: google/gemma-3-27b-it
      TENSOR_PARALLEL_SIZE: 8
      MINIMUM_ACCURACY_THRESHOLD: 0.56
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/test_accuracy.sh
  - label: "${TEST_LABEL_PREFIX} Record integration test result for google/gemma-3-27b-it"
    key: "${TEST_KEY_PREFIX}record_google_gemma-3-27b-it_IntegrationTest"
    depends_on: "${TEST_KEY_PREFIX}google_gemma-3-27b-it_IntegrationTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX}google/gemma-3-27b-it"
      CI_STAGE: "IntegrationTest"
      CI_CATEGORY: "text-only"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}google_gemma-3-27b-it_IntegrationTest

  - label: "${TEST_LABEL_PREFIX} Performance benchmarks for google/gemma-3-27b-it"
    key: "${TEST_KEY_PREFIX}google_gemma-3-27b-it_Benchmark"
    depends_on: "${TEST_KEY_PREFIX}record_google_gemma-3-27b-it_IntegrationTest"
    agents:
      queue: "${TPU_LARGE_CORE_QUEUE}"
    soft_fail: true
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
      TEST_MODEL: google/gemma-3-27b-it
      TENSOR_PARALLEL_SIZE: 8
      MINIMUM_THROUGHPUT_THRESHOLD: 21
      INPUT_LEN: 1000
      OUTPUT_LEN: 100
      PREFIX_LEN: 0
      MAX_MODEL_LEN: 1280
      MAX_NUM_SEQS: 512
      MAX_NUM_BATCHED_TOKENS: 2048
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/benchmark.sh
  - label: "${TEST_LABEL_PREFIX} Record performance benchmark result for google/gemma-3-27b-it"
    key: "${TEST_KEY_PREFIX}record_google_gemma-3-27b-it_Benchmark"
    depends_on: "${TEST_KEY_PREFIX}google_gemma-3-27b-it_Benchmark"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX}google/gemma-3-27b-it"
      CI_STAGE: "Benchmark"
      CI_CATEGORY: "text-only"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}google_gemma-3-27b-it_Benchmark
