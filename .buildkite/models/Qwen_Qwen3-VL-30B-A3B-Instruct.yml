# pipeline-name: Qwen/Qwen3-VL-30B-A3B-Instruct
# pipeline-type: multimodal
steps:
  - label: "${TPU_VERSION:-tpu6e} Unit tests for Qwen/Qwen3-VL-30B-A3B-Instruct"
    key: "${TPU_VERSION:-tpu6e}_Qwen_Qwen3-VL-30B-A3B-Instruct_UnitTest"
    soft_fail: true
    agents:
      queue: "${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}"
    commands:
      - echo "placeholder"  # TODO: replace with your unit test command
  - label: "${TPU_VERSION:-tpu6e} Record unit test result for Qwen/Qwen3-VL-30B-A3B-Instruct"
    key: "${TPU_VERSION:-tpu6e}_record_Qwen_Qwen3-VL-30B-A3B-Instruct_UnitTest"
    depends_on: "${TPU_VERSION:-tpu6e}_Qwen_Qwen3-VL-30B-A3B-Instruct_UnitTest"
    env:
      CI_TPU_VERSION: "${TPU_VERSION:-tpu6e}"
      CI_TARGET: "Qwen/Qwen3-VL-30B-A3B-Instruct"
      CI_STAGE: "UnitTest"
      CI_CATEGORY: "multimodal"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TPU_VERSION:-tpu6e}_Qwen_Qwen3-VL-30B-A3B-Instruct_UnitTest

  - label: "${TPU_VERSION:-tpu6e} Accuracy for Qwen/Qwen3-VL-30B-A3B-Instruct"
    key: "${TPU_VERSION:-tpu6e}_Qwen_Qwen3-VL-30B-A3B-Instruct_Accuracy"
    depends_on: "${TPU_VERSION:-tpu6e}_record_Qwen_Qwen3-VL-30B-A3B-Instruct_UnitTest"
    soft_fail: true
    agents:
      queue: "${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}"
    env:
      TEST_MODEL: Qwen/Qwen3-VL-30B-A3B-Instruct
      # The default values are for tpu6e. For tpu7x, the CI procedure will export TENSOR_PARALLEL_SIZE_SINGLE=2, TENSOR_PARALLEL_SIZE_MULTI=8 automatically
      TENSOR_PARALLEL_SIZE: "${TENSOR_PARALLEL_SIZE_MULTI:-8}"
      MAX_NUM_BATCHED_TOKENS: "16384"
      MINIMUM_ACCURACY_THRESHOLD: 0.85
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/test_accuracy.sh
  - label: "${TPU_VERSION:-tpu6e} Record accuracy result for Qwen/Qwen3-VL-30B-A3B-Instruct"
    key: "${TPU_VERSION:-tpu6e}_record_Qwen_Qwen3-VL-30B-A3B-Instruct_Accuracy"
    depends_on: "${TPU_VERSION:-tpu6e}_Qwen_Qwen3-VL-30B-A3B-Instruct_Accuracy"
    env:
      CI_TPU_VERSION: "${TPU_VERSION:-tpu6e}"
      CI_TARGET: "Qwen/Qwen3-VL-30B-A3B-Instruct"
      CI_STAGE: "Accuracy/Correctness"
      CI_CATEGORY: "multimodal"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TPU_VERSION:-tpu6e}_Qwen_Qwen3-VL-30B-A3B-Instruct_Accuracy

  - label: "${TPU_VERSION:-tpu6e} Performance benchmarks for Qwen/Qwen3-VL-30B-A3B-Instruct"
    key: "${TPU_VERSION:-tpu6e}_Qwen_Qwen3-VL-30B-A3B-Instruct_Benchmark"
    depends_on: "${TPU_VERSION:-tpu6e}_record_Qwen_Qwen3-VL-30B-A3B-Instruct_Accuracy"
    soft_fail: true
    agents:
      queue: "${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}"
    env:
      TEST_MODEL: Qwen/Qwen3-VL-30B-A3B-Instruct
      # The default values are for tpu6e. For tpu7x, the CI procedure will export TENSOR_PARALLEL_SIZE_SINGLE=2, TENSOR_PARALLEL_SIZE_MULTI=8 automatically
      TENSOR_PARALLEL_SIZE: "${TENSOR_PARALLEL_SIZE_MULTI:-8}"
      MAX_NUM_BATCHED_TOKENS: "16384"
      MINIMUM_THROUGHPUT_THRESHOLD: 0  # TODO : replace 0 with your performance threshold
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/benchmark.sh
  - label: "${TPU_VERSION:-tpu6e} Record performance benchmark result for Qwen/Qwen3-VL-30B-A3B-Instruct"
    key: "${TPU_VERSION:-tpu6e}_record_Qwen_Qwen3-VL-30B-A3B-Instruct_Benchmark"
    depends_on: "${TPU_VERSION:-tpu6e}_Qwen_Qwen3-VL-30B-A3B-Instruct_Benchmark"
    env:
      CI_TPU_VERSION: "${TPU_VERSION:-tpu6e}"
      CI_TARGET: "Qwen/Qwen3-VL-30B-A3B-Instruct"
      CI_STAGE: "Benchmark"
      CI_CATEGORY: "multimodal"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TPU_VERSION:-tpu6e}_Qwen_Qwen3-VL-30B-A3B-Instruct_Benchmark
