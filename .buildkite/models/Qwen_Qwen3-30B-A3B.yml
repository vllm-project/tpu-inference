# Qwen/Qwen3-30B-A3B
# text-only
steps:
  - label: "${TEST_LABEL_PREFIX} Unit tests for Qwen/Qwen3-30B-A3B"
    key: "${TEST_KEY_PREFIX}Qwen_Qwen3-30B-A3B_UnitTest"
    agents:
      queue: "${TPU_SMALL_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    soft_fail: true
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh \
          bash -c 'python3 -m pytest -s -v -x /workspace/tpu_inference/tests/models/jax/test_qwen3.py'
  - label: "${TEST_LABEL_PREFIX} Record unit test result for Qwen/Qwen3-30B-A3B"
    key: "${TEST_KEY_PREFIX}record_Qwen_Qwen3-30B-A3B_UnitTest"
    depends_on: "${TEST_KEY_PREFIX}Qwen_Qwen3-30B-A3B_UnitTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX} Qwen/Qwen3-30B-A3B"
      CI_STAGE: "UnitTest"
      CI_CATEGORY: "text-only"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}Qwen_Qwen3-30B-A3B_UnitTest

  - label: "${TEST_LABEL_PREFIX} Integration tests for Qwen/Qwen3-30B-A3B"
    key: "${TEST_KEY_PREFIX}Qwen_Qwen3-30B-A3B_IntegrationTest"
    depends_on: "${TEST_KEY_PREFIX}record_Qwen_Qwen3-30B-A3B_UnitTest"
    agents:
      queue: "${TPU_LARGE_CORE_QUEUE}"
    soft_fail: true
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
      TEST_MODEL: Qwen/Qwen3-30B-A3B
      TENSOR_PARALLEL_SIZE: 4
      MINIMUM_ACCURACY_THRESHOLD: 0.89
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/test_accuracy.sh
  - label: "${TEST_LABEL_PREFIX} Record integration test result for Qwen/Qwen3-30B-A3B"
    key: "${TEST_KEY_PREFIX}record_Qwen_Qwen3-30B-A3B_IntegrationTest"
    depends_on: "${TEST_KEY_PREFIX}Qwen_Qwen3-30B-A3B_IntegrationTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX} Qwen/Qwen3-30B-A3B"
      CI_STAGE: "IntegrationTest"
      CI_CATEGORY: "text-only"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}Qwen_Qwen3-30B-A3B_IntegrationTest

  - label: "${TEST_LABEL_PREFIX} Performance benchmarks for Qwen/Qwen3-30B-A3B"
    key: "${TEST_KEY_PREFIX}Qwen_Qwen3-30B-A3B_Benchmark"
    depends_on: "${TEST_KEY_PREFIX}record_Qwen_Qwen3-30B-A3B_IntegrationTest"
    soft_fail: true
    agents:
      queue: "${TPU_LARGE_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
      TEST_MODEL: Qwen/Qwen3-30B-A3B
      TENSOR_PARALLEL_SIZE: 4
      MINIMUM_THROUGHPUT_THRESHOLD: 7.20
      INPUT_LEN: 1800
      OUTPUT_LEN: 128
      PREFIX_LEN: 0
      MAX_MODEL_LEN: 2048
      MAX_NUM_SEQS: 94
      MAX_NUM_BATCHED_TOKENS: 1024
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/benchmark.sh
  - label: "${TEST_LABEL_PREFIX} Record performance benchmark result for Qwen/Qwen3-30B-A3B"
    key: "${TEST_KEY_PREFIX}record_Qwen_Qwen3-30B-A3B_Benchmark"
    depends_on: "${TEST_KEY_PREFIX}Qwen_Qwen3-30B-A3B_Benchmark"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX} Qwen/Qwen3-30B-A3B"
      CI_STAGE: "Benchmark"
      CI_CATEGORY: "text-only"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}Qwen_Qwen3-30B-A3B_Benchmark
