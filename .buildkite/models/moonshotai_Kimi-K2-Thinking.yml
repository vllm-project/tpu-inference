# moonshotai/Kimi-K2-Thinking
# text-only
steps:
  - label: "${TEST_LABEL_PREFIX} Unit tests for moonshotai/Kimi-K2-Thinking"
    key: "${TEST_KEY_PREFIX}moonshotai_Kimi-K2-Thinking_UnitTest"
    agents:
      queue: "${TPU_LARGE_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    soft_fail: true
    commands:
      - |
        buildkite-agent meta-data set "${TEST_KEY_PREFIX}moonshotai_Kimi-K2-Thinking_UnitTest" "unverified"
  - label: "${TEST_LABEL_PREFIX} Record unit test result for moonshotai/Kimi-K2-Thinking"
    key: "${TEST_KEY_PREFIX}record_moonshotai_Kimi-K2-Thinking_UnitTest"
    depends_on: "${TEST_KEY_PREFIX}moonshotai_Kimi-K2-Thinking_UnitTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX}moonshotai/Kimi-K2-Thinking"
      CI_STAGE: "UnitTest"
      CI_CATEGORY: "text-only"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}moonshotai_Kimi-K2-Thinking_UnitTest

  - label: "${TEST_LABEL_PREFIX} Integration tests for moonshotai/Kimi-K2-Thinking"
    key: "${TEST_KEY_PREFIX}moonshotai_Kimi-K2-Thinking_IntegrationTest"
    depends_on: "${TEST_KEY_PREFIX}record_moonshotai_Kimi-K2-Thinking_UnitTest"
    agents:
      queue: "${TPU_LARGE_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    soft_fail: true
    commands:
      - |
        buildkite-agent meta-data set "${TEST_KEY_PREFIX}moonshotai_Kimi-K2-Thinking_IntegrationTest" "unverified"
  - label: "${TEST_LABEL_PREFIX} Record integration test result for moonshotai/Kimi-K2-Thinking"
    key: "${TEST_KEY_PREFIX}record_moonshotai_Kimi-K2-Thinking_IntegrationTest"
    depends_on: "${TEST_KEY_PREFIX}moonshotai_Kimi-K2-Thinking_IntegrationTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX}moonshotai/Kimi-K2-Thinking"
      CI_STAGE: "IntegrationTest"
      CI_CATEGORY: "text-only"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}moonshotai_Kimi-K2-Thinking_IntegrationTest

  - label: "${TEST_LABEL_PREFIX} Performance benchmarks for moonshotai/Kimi-K2-Thinking"
    key: "${TEST_KEY_PREFIX}moonshotai_Kimi-K2-Thinking_Benchmark"
    depends_on: "${TEST_KEY_PREFIX}record_moonshotai_Kimi-K2-Thinking_IntegrationTest"
    agents:
      queue: "${TPU_LARGE_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    soft_fail: true
    commands:
      - |
        buildkite-agent meta-data set "${TEST_KEY_PREFIX}moonshotai_Kimi-K2-Thinking_Benchmark" "unverified"
  - label: "${TEST_LABEL_PREFIX} Record performance benchmark result for moonshotai/Kimi-K2-Thinking"
    key: "${TEST_KEY_PREFIX}record_moonshotai_Kimi-K2-Thinking_Benchmark"
    depends_on: "${TEST_KEY_PREFIX}moonshotai_Kimi-K2-Thinking_Benchmark"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX}moonshotai/Kimi-K2-Thinking"
      CI_STAGE: "Benchmark"
      CI_CATEGORY: "text-only"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}moonshotai_Kimi-K2-Thinking_Benchmark
