# meta-llama/Llama-3.3-70B-Instruct
# text-only
steps:
  - label: "${TEST_LABEL_PREFIX} Unit tests for meta-llama/Llama-3.3-70B-Instruct"
    key: "${TEST_KEY_PREFIX}meta-llama_Llama-3_3-70B-Instruct_UnitTest"
    soft_fail: true
    agents:
      queue: "${TPU_SMALL_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh \
          bash -c 'python3 -m pytest -s -v -x /workspace/tpu_inference/tests/models/jax/test_llama3.py'
  - label: "${TEST_LABEL_PREFIX} Record unit test result for meta-llama/Llama-3.3-70B-Instruct"
    key: "${TEST_KEY_PREFIX}record_meta-llama_Llama-3_3-70B-Instruct_UnitTest"
    depends_on: "${TEST_KEY_PREFIX}meta-llama_Llama-3_3-70B-Instruct_UnitTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX} meta-llama/Llama-3.3-70B-Instruct"
      CI_STAGE: "UnitTest"
      CI_CATEGORY: "text-only"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}meta-llama_Llama-3_3-70B-Instruct_UnitTest

  - label: "${TEST_LABEL_PREFIX} Integration tests for meta-llama/Llama-3.3-70B-Instruct"
    key: "${TEST_KEY_PREFIX}meta-llama_Llama-3_3-70B-Instruct_IntegrationTest"
    depends_on: "${TEST_KEY_PREFIX}record_meta-llama_Llama-3_3-70B-Instruct_UnitTest"
    soft_fail: true
    agents:
      queue: "${TPU_LARGE_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
      TEST_MODEL: meta-llama/Llama-3.3-70B-Instruct
      TENSOR_PARALLEL_SIZE: 8
      MINIMUM_ACCURACY_THRESHOLD: 0.90
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/test_accuracy.sh
  - label: "${TEST_LABEL_PREFIX} Record integration test result for meta-llama/Llama-3.3-70B-Instruct"
    key: "${TEST_KEY_PREFIX}record_meta-llama_Llama-3_3-70B-Instruct_IntegrationTest"
    depends_on: "${TEST_KEY_PREFIX}meta-llama_Llama-3_3-70B-Instruct_IntegrationTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX} meta-llama/Llama-3.3-70B-Instruct"
      CI_STAGE: "IntegrationTest"
      CI_CATEGORY: "text-only"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}meta-llama_Llama-3_3-70B-Instruct_IntegrationTest

  - label: "${TEST_LABEL_PREFIX} Performance benchmarks for meta-llama/Llama-3.3-70B-Instruct"
    key: "${TEST_KEY_PREFIX}meta-llama_Llama-3_3-70B-Instruct_Benchmark"
    depends_on: "${TEST_KEY_PREFIX}record_meta-llama_Llama-3_3-70B-Instruct_IntegrationTest"
    soft_fail: true
    agents:
      queue: "${TPU_LARGE_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
      TEST_MODEL: meta-llama/Llama-3.3-70B-Instruct
      TENSOR_PARALLEL_SIZE: 8
      MINIMUM_THROUGHPUT_THRESHOLD: 7.0
      INPUT_LEN: 1800
      OUTPUT_LEN: 128
      PREFIX_LEN: 0
      MAX_MODEL_LEN: 2048
      MAX_NUM_SEQS: 256
      MAX_NUM_BATCHED_TOKENS: 4096
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/benchmark.sh
  - label: "${TEST_LABEL_PREFIX} Record performance benchmark result for meta-llama/Llama-3.3-70B-Instruct"
    key: "${TEST_KEY_PREFIX}record_meta-llama_Llama-3_3-70B-Instruct_Benchmark"
    depends_on: "${TEST_KEY_PREFIX}meta-llama_Llama-3_3-70B-Instruct_Benchmark"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX} meta-llama/Llama-3.3-70B-Instruct"
      CI_STAGE: "Benchmark"
      CI_CATEGORY: "text-only"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}meta-llama_Llama-3_3-70B-Instruct_Benchmark
