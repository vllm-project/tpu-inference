# pipeline-name: openai/gpt-oss-120b
# pipeline-type: text-only
steps:
  - label: "${TEST_LABEL_PREFIX} Unit tests for openai/gpt-oss-120b"
    key: "${TEST_KEY_PREFIX}openai_gpt-oss-120b_UnitTest"
    agents:
      queue: "${TPU_LARGE_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    soft_fail: true
    commands:
      - |
        buildkite-agent meta-data set "${TEST_KEY_PREFIX}openai_gpt-oss-120b_UnitTest" "unverified"
  - label: "${TEST_LABEL_PREFIX} Record unit test result for openai/gpt-oss-120b"
    key: "${TEST_KEY_PREFIX}record_openai_gpt-oss-120b_UnitTest"
    depends_on: "${TEST_KEY_PREFIX}openai_gpt-oss-120b_UnitTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX}openai/gpt-oss-120b"
      CI_STAGE: "UnitTest"
      CI_CATEGORY: "text-only"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}openai_gpt-oss-120b_UnitTest

  - label: "${TEST_LABEL_PREFIX} Integration tests for openai/gpt-oss-120b"
    key: "${TEST_KEY_PREFIX}openai_gpt-oss-120b_IntegrationTest"
    depends_on: "${TEST_KEY_PREFIX}record_openai_gpt-oss-120b_UnitTest"
    agents:
      queue: "${TPU_LARGE_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    soft_fail: true
    commands:
      - |
        buildkite-agent meta-data set "${TEST_KEY_PREFIX}openai_gpt-oss-120b_IntegrationTest" "unverified"
  - label: "${TEST_LABEL_PREFIX} Record integration test result for openai/gpt-oss-120b"
    key: "${TEST_KEY_PREFIX}record_openai_gpt-oss-120b_IntegrationTest"
    depends_on: "${TEST_KEY_PREFIX}openai_gpt-oss-120b_IntegrationTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX}openai/gpt-oss-120b"
      CI_STAGE: "IntegrationTest"
      CI_CATEGORY: "text-only"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}openai_gpt-oss-120b_IntegrationTest

  - label: "${TEST_LABEL_PREFIX} Performance benchmarks for openai/gpt-oss-120b"
    key: "${TEST_KEY_PREFIX}openai_gpt-oss-120b_Benchmark"
    depends_on: "${TEST_KEY_PREFIX}record_openai_gpt-oss-120b_IntegrationTest"
    agents:
      queue: "${TPU_LARGE_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    soft_fail: true
    commands:
      - |
        buildkite-agent meta-data set "${TEST_KEY_PREFIX}openai_gpt-oss-120b_Benchmark" "unverified"
  - label: "${TEST_LABEL_PREFIX} Record performance benchmark result for openai/gpt-oss-120b"
    key: "${TEST_KEY_PREFIX}record_openai_gpt-oss-120b_Benchmark"
    depends_on: "${TEST_KEY_PREFIX}openai_gpt-oss-120b_Benchmark"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX}openai/gpt-oss-120b"
      CI_STAGE: "Benchmark"
      CI_CATEGORY: "text-only"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}openai_gpt-oss-120b_Benchmark
