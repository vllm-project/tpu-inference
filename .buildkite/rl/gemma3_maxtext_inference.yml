# Gemma3-4B MaxText inference smoke test: exercises the inference legs of
# MaxText's Gemma3-4B RL validation flow
# (https://github.com/AI-Hypercomputer/maxtext/blob/main/tests/end_to_end/tpu/gemma3/4b/test_gemma3_rl.sh)
# by running `maxtext.inference.vllm_decode` against a pre-converted MaxText
# checkpoint through the vLLM `MaxTextForCausalLM` plugin. Guards against
# tpu-inference regressions that would break MaxText RL rollouts.
steps:
  # ------------------------------------------------------------------
  # Correctness tests
  # ------------------------------------------------------------------
  - label: "${TPU_VERSION:-tpu6e} Correctness tests for gemma3_maxtext_inference"
    key: "${TPU_VERSION:-tpu6e}_gemma3_maxtext_inference_CorrectnessTest"
    soft_fail: true
    if: build.env("NIGHTLY") == "1"
    agents:
      queue: "${TPU_QUEUE_SINGLE:-tpu_v6e_queue}"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/test_gemma3_maxtext_inference.sh
  - label: "${TPU_VERSION:-tpu6e} Record correctness test result for gemma3_maxtext_inference"
    key: "${TPU_VERSION:-tpu6e}_record_gemma3_maxtext_inference_CorrectnessTest"
    depends_on: "${TPU_VERSION:-tpu6e}_gemma3_maxtext_inference_CorrectnessTest"
    env:
      CI_TPU_VERSION: "${TPU_VERSION:-tpu6e}"
      CI_TARGET: "gemma3_maxtext_inference"
      CI_STAGE: "CorrectnessTest"
      CI_CATEGORY: "rl support matrix"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TPU_VERSION:-tpu6e}_gemma3_maxtext_inference_CorrectnessTest
