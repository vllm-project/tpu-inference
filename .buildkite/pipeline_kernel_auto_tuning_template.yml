# Orchestrator pipeline for kernel auto-tuning.
# Upload this file after substituting KERNEL_AUTOTUNE_ID_PLACEHOLDER with the actual ID:
#
#   sed "s/KERNEL_AUTOTUNE_ID_PLACEHOLDER/${KERNEL_AUTOTUNE_ID}/g" \
#       .buildkite/pipeline_kernel_auto_tuning_2.yml \
#       | buildkite-agent pipeline upload
#
# Pipeline overview:
# 1. Trigger tpu-inference-benchmark (branch: patrickji.kernel_autotune_pipeline)
#    KERNEL_AUTOTUNE_STAGE=PRE_KERNEL_AUTOTUNE_CASES_COLLECTION — collects kernel tuning cases.
# 2. Trigger tpu-inference-kernel-tuning
#    KERNEL_AUTOTUNE_STAGE=KERNEL_TUNING — tunes the collected cases and generates an evaluation pipeline.
# 3. Patch step — applies tuned results and creates branch kernel_autotune.update_tuned_params_KERNEL_AUTOTUNE_ID_PLACEHOLDER.
# 4. Trigger tpu-inference-benchmark (branch: kernel_autotune.update_tuned_params_KERNEL_AUTOTUNE_ID_PLACEHOLDER)
#    KERNEL_AUTOTUNE_STAGE=POST_KERNEL_AUTOTUNE_BM_RERUN — evaluates tuned results.
# 5. Evaluation step — compares results and optionally creates a PR.

env:
  KERNEL_AUTOTUNE_ID: "KERNEL_AUTOTUNE_ID_PLACEHOLDER"

steps:
  # ---------------------------------------------------------------------------
  # Stage 1: Collect kernel tuning cases
  # ---------------------------------------------------------------------------
  - label: "Trigger Benchmark — Collect Kernel Cases"
    key: collect_kernel_cases
    trigger: "tpu-inference-benchmark"
    build:
      branch: "patrickji.kernel_autotune_pipeline"
      env:
        KERNEL_AUTOTUNE_ID: "KERNEL_AUTOTUNE_ID_PLACEHOLDER"
        KERNEL_AUTOTUNE_STAGE: "PRE_KERNEL_AUTOTUNE_CASES_COLLECTION"
        EXTRA_ENVS: "KERNEL_AUTOTUNE_ID=KERNEL_AUTOTUNE_ID_PLACEHOLDER,KERNEL_AUTOTUNE_STAGE=PRE_KERNEL_AUTOTUNE_CASES_COLLECTION"

  # ---------------------------------------------------------------------------
  # Stage 2: Run kernel tuning
  # ---------------------------------------------------------------------------
  - label: "Trigger Kernel Tuning Pipeline"
    key: kernel_tuning
    depends_on: "collect_kernel_cases"
    trigger: "tpu-inference-kernel-tuning"
    build:
      branch: "patrickji.kernel_autotune_pipeline"
      env:
        KERNEL_AUTOTUNE_ID: "KERNEL_AUTOTUNE_ID_PLACEHOLDER"
        KERNEL_AUTOTUNE_STAGE: "KERNEL_TUNING"
        EXTRA_ENVS: "KERNEL_AUTOTUNE_ID=KERNEL_AUTOTUNE_ID_PLACEHOLDER,KERNEL_AUTOTUNE_STAGE=KERNEL_TUNING"

  # ---------------------------------------------------------------------------
  # Stage 3: Patch tuned results and create evaluation branch
  # ---------------------------------------------------------------------------
  - label: "Patch Kernel Autotune Result"
    key: patch_kernel_autotune_result
    depends_on: "kernel_tuning"
    agents:
      queue: cpu
    env:
      KERNEL_AUTOTUNE_ID: "KERNEL_AUTOTUNE_ID_PLACEHOLDER"
      KERNEL_AUTOTUNE_STAGE: "PATCH_KERNEL_AUTOTUNE_RESULT"
      EXTRA_ENVS: "KERNEL_AUTOTUNE_ID=KERNEL_AUTOTUNE_ID_PLACEHOLDER,KERNEL_AUTOTUNE_STAGE=PATCH_KERNEL_AUTOTUNE_RESULT"
    command: |
      echo "🚀 Patching kernel autotune results and creating evaluation branch."
      # bash .buildkite/scripts/patch_kernel_autotune_result.sh

  # ---------------------------------------------------------------------------
  # Stage 4: Re-run benchmarks on tuned branch for evaluation
  # ---------------------------------------------------------------------------
  - label: "Trigger Benchmark — Evaluate Tuned Results"
    key: evaluate_tuned_results
    depends_on: "patch_kernel_autotune_result"
    trigger: "tpu-inference-benchmark"
    build:
      branch: "kernel_autotune.update_tuned_params_KERNEL_AUTOTUNE_ID_PLACEHOLDER"
      env:
        KERNEL_AUTOTUNE_ID: "KERNEL_AUTOTUNE_ID_PLACEHOLDER"
        KERNEL_AUTOTUNE_STAGE: "POST_KERNEL_AUTOTUNE_BM_RERUN"
        EXTRA_ENVS: "KERNEL_AUTOTUNE_ID=KERNEL_AUTOTUNE_ID_PLACEHOLDER,KERNEL_AUTOTUNE_STAGE=POST_KERNEL_AUTOTUNE_BM_RERUN"

  # ---------------------------------------------------------------------------
  # Stage 5: Evaluate results and optionally create a PR
  # ---------------------------------------------------------------------------
  - label: "Evaluate Tuning Results and Create PR"
    key: evaluate_and_create_pr
    depends_on: "evaluate_tuned_results"
    agents:
      queue: cpu
    env:
      KERNEL_AUTOTUNE_ID: "KERNEL_AUTOTUNE_ID_PLACEHOLDER"
      KERNEL_AUTOTUNE_STAGE: "EVALUATE_AND_CREATE_PR"
      EXTRA_ENVS: "KERNEL_AUTOTUNE_ID=KERNEL_AUTOTUNE_ID_PLACEHOLDER,KERNEL_AUTOTUNE_STAGE=EVALUATE_AND_CREATE_PR"
    command: |
      echo "🚀 Evaluating tuning results and optionally creating a PR."
      # bash .buildkite/scripts/evaluate_kernel_autotune_result.sh

