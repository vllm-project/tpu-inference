  #   key: tune_collected_cases
  #   # depends_on: "collect_kernel_cases"
  #   trigger: "tpu-inference-kernel-tuning"
  #   build:
  #     branch: "patrickji.kernel_autotune_pipeline"
  #     env:
  #       BOOTSTRAP_ALL_KERNEL_TUNING: "1"
  #       KERNEL_TUNING_KERNEL_AUTOTUNE_STAGE: "BOOTSTRAP_ALL_KERNEL_TUNING"
  #       KERNEL_TUNING_EXTRA_ENVS: "KERNEL_TUNING_AUTOTUNE_ID=KERNEL_TUNING_AUTOTUNE_ID_PLACEHOLDER,KERNEL_AUTOTUNE_STAGE=BOOTSTRAP_KERNEL_TUNING"
  #       KERNEL_TUNING_AUTOTUNE_ID: "KERNEL_TUNING_AUTOTUNE_ID_PLACEHOLDER"

  # ---------------------------------------------------------------------------
  # Stage 3: Patch tuned results and create evaluation branch
  # ---------------------------------------------------------------------------
  # - label: "Patch Kernel Tuning Result"
  #   key: patch_kernel_tuning_result
  #   depends_on:
  #     # - "tune_collected_cases"
  #     - "build_docker"
  #   agents:
  #     queue: tpu_v6e_queue
  #   env:
  #     KERNEL_TUNING_AUTOTUNE_ID: "KERNEL_TUNING_AUTOTUNE_ID_PLACEHOLDER"
  #     USE_PREBUILT_IMAGE: "1"
  #     TPU_VERSION: tpu6e
  #   secrets: 
  #     - GITHUB_PAT 
  #   # priority: 200
  #   command: |
  #     echo "🚀 Patching kernel autotune results and creating evaluation branch."
  #     .buildkite/scripts/run_in_docker.sh bash -c '
  #       branch_name="kernel_autotune.update_tuned_params_$${KERNEL_TUNING_AUTOTUNE_ID}"
  #       repo_url="github.com/vllm-project/tpu-inference.git"
  #       authenticated_repo_url="https://x-access-token:$${GITHUB_PAT}@$${repo_url}"
  #       pip install --upgrade -r tools/kernel/tuner/v1/storage_management/requirements.txt
  #       apt install git -y
  #       git remote set-url origin $${authenticated_repo_url}
  #       git config user.name "Buildkite Bot"
  #       git config user.email "buildkite-bot@users.noreply.github.com"
  #       git checkout -b $${branch_name}
  #       python -m tools.kernel.tuner.v1.autotune.kernel_auto_tune_result_processing --autotune_id=$${KERNEL_TUNING_AUTOTUNE_ID} --process_step=PATCH_KERNEL_AUTOTUNE_RESULT
  #       git add -u
  #       git commit -m "Update tuned params for auto tune ID: $${KERNEL_TUNING_AUTOTUNE_ID}"
  #       git push origin $${branch_name} --force
  #     '
  
  # ---------------------------------------------------------------------------
  # Stage 4: Re-run benchmarks on tuned branch for evaluation
  # ---------------------------------------------------------------------------
  # - label: "Trigger Benchmark — Evaluate Tuned Results"
  #   key: evaluate_tuned_results
  #   # depends_on: "patch_kernel_tuning_result"
  #   trigger: "tpu-inference-benchmark"
  #   build:
  #     branch: "kernel_autotune.update_tuned_params_KERNEL_TUNING_AUTOTUNE_ID_PLACEHOLDER"
  #     env:
  #       KERNEL_TUNING_AUTOTUNE_ID: "KERNEL_TUNING_AUTOTUNE_ID_PLACEHOLDER"
  #       KERNEL_AUTOTUNE_STAGE: "POST_KERNEL_AUTOTUNE_BM_RERUN"
  #       EXTRA_ENVS: "KERNEL_TUNING_AUTOTUNE_ID=KERNEL_TUNING_AUTOTUNE_ID_PLACEHOLDER,KERNEL_AUTOTUNE_STAGE=POST_KERNEL_AUTOTUNE_BM_RERUN"

  # ---------------------------------------------------------------------------
  # Stage 5: Evaluate results and optionally create a PR
  # ---------------------------------------------------------------------------
  - label: "Evaluate Tuning Results and Create PR"
    key: evaluate_and_create_pr
    depends_on: 
      # - "evaluate_tuned_results"
      - "build_docker"
    agents:
      queue: tpu_v6e_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      KERNEL_TUNING_AUTOTUNE_ID: "KERNEL_TUNING_AUTOTUNE_ID_PLACEHOLDER"
      KERNEL_AUTOTUNE_STAGE: "EVALUATE_AND_CREATE_PR"
      EXTRA_ENVS: "KERNEL_TUNING_AUTOTUNE_ID=KERNEL_TUNING_AUTOTUNE_ID_PLACEHOLDER,KERNEL_AUTOTUNE_STAGE=EVALUATE_AND_CREATE_PR"
      GCP_PROJECT_ID: "cloud-tpu-inference-test"
      SPANNER_INSTANCE_ID: "vllm-bm-inst"
      SPANNER_DATABASE_ID: "vllm-bm-bk-runs"
    secrets: 
      - GITHUB_PAT 
    command: |
      echo "🚀 Evaluating tuning results and optionally creating a PR."
      .buildkite/scripts/run_in_docker.sh bash -c '
        set -e
        branch_name="kernel_autotune.update_tuned_params_$${KERNEL_TUNING_AUTOTUNE_ID}"
        repo_url="github.com/vllm-project/tpu-inference.git"
        authenticated_repo_url="https://x-access-token:$${GITHUB_PAT}@$${repo_url}"
        pip install --upgrade -r tools/kernel/tuner/v1/storage_management/requirements.txt
        apt install git -y
        git remote set-url origin $${authenticated_repo_url}
        git config user.name "Buildkite Bot"
        git config user.email "buildkite-bot@users.noreply.github.com"
        git checkout -b $${branch_name}
        result=$$(python -m tools.kernel.tuner.v1.autotune.kernel_auto_tune_result_processing \
          --autotune_id=$${KERNEL_TUNING_AUTOTUNE_ID} \
          --process_step=$${KERNEL_AUTOTUNE_STAGE} \
          --gcp_project_id=$${GCP_PROJECT_ID} \
          --spanner_instance_id=$${SPANNER_INSTANCE_ID} \
          --spanner_database_id=$${SPANNER_DATABASE_ID}) 

        # create pr and put result in pr body
        if [[ "$$result" == *"PR_CREATED"* ]]; then
          pr_url=$$(echo "$$result" | grep -oP 'PR_CREATED:\K.*')
          echo "PR created: $$pr_url"
        else
          echo "No PR created. Result: $$result"
        fi
      '

