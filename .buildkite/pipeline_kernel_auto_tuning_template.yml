  #       KERNEL_TUNING_AUTOTUNE_ID: "KERNEL_TUNING_AUTOTUNE_ID_PLACEHOLDER"

  # ---------------------------------------------------------------------------
  # Stage 2: Run kernel tuning
  # ---------------------------------------------------------------------------
