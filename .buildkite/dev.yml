steps:
  - label: "qwen3-4b-benchmark"
    key: "qwen3_4b_test"    
    agents:
      queue: tpu_v7x_2_queue
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/bm_qwen3_4b.sh
      - cp /mnt/disks/persist/models/vllm_server_out.txt ./
      - cp /mnt/disks/persist/models/vllm_benchmark_out.txt ./
      - buildkite-agent artifact upload "vllm_server_out.txt"
      - buildkite-agent artifact upload "vllm_benchmark_out.txt"