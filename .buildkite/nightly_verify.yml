x-run-condition: &run-on-nightly-or-tag
  if: build.env("NIGHTLY") == "1" || build.tag =~ /^v?[0-9]+(\.[a-zA-Z0-9]+)*([a-zA-Z]+[0-9]*)?$/

steps:
   - label: "Upload Tests for Models & Features (${MODEL_IMPL_TYPE:-auto})"
     <<: *run-on-nightly-or-tag
     agents:
       queue: cpu
     commands:
       - bash .buildkite/scripts/upload_models_and_features.sh

   - wait: ~
     continue_on_failure: true  # ensure we still generate support matrices even if some tests fail

   - label: "Check Metadata Health"
     key: "check_metadata_health"
     <<: *run-on-nightly-or-tag
     agents: 
       queue: cpu 
     commands: |
        if [ "$(buildkite-agent meta-data get stop_support_matrix --default 'false')" = "true" ]; then
          echo "--- 🛑 Detected critical metadata failure. Blocking support matrix generation."
          exit 1
        fi
        echo "✅ Metadata healthy. Proceeding..."

   - label: "v6 Generate support matrices"
     <<: *run-on-nightly-or-tag
     key: "v6_generate_matrices"
     depends_on: "check_metadata_health"
     agents: { queue: cpu }
     env:
       TPU_VERSION: "v6e"
     command: |
      if [ "$(buildkite-agent meta-data get run_v6_matrix --default 'false')" = "true" ]; then
          bash .buildkite/scripts/generate_support_matrices.sh
        else
          echo "--- Skipping v6 matrix generation (No v6 test data found)"
        fi

   - label: "v7 Generate support matrices"
     <<: *run-on-nightly-or-tag
     key: "v7_generate_matrices"
     depends_on: "check_metadata_health"
     agents: { queue: cpu }
     env:
      TPU_VERSION: "v7x"
     command: |
      if [ "$(buildkite-agent meta-data get run_v7_matrix --default 'false')" = "true" ]; then
        bash .buildkite/scripts/generate_support_matrices.sh
      else
        echo "--- Skipping v7 matrix generation (No v7 test data found)"
      fi
  
   - label: "Commit support matrices if is nightly build or release tag specified"
     # commit_support_matrices and record_verified_commit_hashes push to the repo via
     # GITHUB_PAT, which is only provisioned for main / release tags. Gate them off
     # release-branch nightlies (branch != main, no tag) to avoid a "secrets" failure.
     if: (build.env("NIGHTLY") == "1" && build.branch == "main") || build.tag =~ /^v?[0-9]+(\.[a-zA-Z0-9]+)*([a-zA-Z]+[0-9]*)?$/
     key: commit_support_matrices
     depends_on:
       - "v6_generate_matrices"
       - "v7_generate_matrices"
     agents:
       queue: cpu
     secrets:
      - GITHUB_PAT
     command:
       - bash .buildkite/scripts/commit_support_matrices.sh

   - label: "Notify test results"
     <<: *run-on-nightly-or-tag
     key: notify_test_results
     depends_on: 
       - "commit_support_matrices"
       - "v6_generate_matrices"
       - "v7_generate_matrices"
     agents:
       queue: cpu
     commands:
       - bash .buildkite/scripts/notify_test_results.sh

   - label: "Record verified commit hashes"
     # GITHUB_PAT is main/tag-only - see commit_support_matrices above.
     if: build.env("NIGHTLY") == "1" && build.branch == "main"
     key: record_verified_commit_hashes
     depends_on:
       - notify_test_results
       - tpu6e_tpu_test_notification
       - tpu7x_tpu_test_notification
     agents:
       queue: cpu
     secrets:
      - GITHUB_PAT
     command:
       - bash .buildkite/scripts/commit_verified_commit_hashes.sh

   - label: "Upload pytest duration artifact"
     if: build.branch == "main" && build.env("NIGHTLY") == "1" && build.env("MODEL_IMPL_TYPE") == "auto"
     key: update_unit_test_duration_file
     artifact_paths: /mnt/disks/persist/models/.test_durations
     agents:
       queue: ${TPU_QUEUE_SINGLE:-tpu_v6e_queue}
     secrets:
       - GITHUB_PAT
     commands:
       - |
         .buildkite/scripts/run_in_docker.sh bash -c "python3 -m pytest -s -v -x --store-durations --cov tpu_inference tests/ --ignore=/workspace/tpu_inference/tests/kernels --ignore=/workspace/tpu_inference/tests/lora --ignore=/workspace/tpu_inference/tests/e2e --ignore=/workspace/tpu_inference/tpu_inference/mock --ignore=/workspace/tpu_inference/tests/models/jax/test_deepseek_v3.py --ignore=/workspace/tpu_inference/tests/offload/tpu_offload_multi_request_accuracy_test.py --ignore=/workspace/tpu_inference/tests/offload/tpu_offload_accuracy_test.py --ignore=/workspace/tpu_inference/tests/offload/tpu_offload_performance_test.py --ignore=/workspace/tpu_inference/tests/core/test_dp_group_sampling_prefix_cache.py; if [ -f .test_durations ]; then cp .test_durations /tmp/hf_home/.test_durations; else exit 1; fi"
       - cp /mnt/disks/persist/models/.test_durations .buildkite/
       - bash .buildkite/scripts/commit_test_duration.sh