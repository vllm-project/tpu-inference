# pipeline-name: mla-w8a16
# pipeline-type: kernel support matrix microbenchmarks
steps:
  - label: "${TEST_LABEL_PREFIX} Correctness tests for mla-w8a16"
    key: "${TEST_KEY_PREFIX}mla-w8a16_CorrectnessTest"
    soft_fail: true
    agents:
      queue: "${TPU_SMALL_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    commands:
      - |
        buildkite-agent meta-data set "${TEST_KEY_PREFIX}mla-w8a16_CorrectnessTest" "unverified"
  - label: "${TEST_LABEL_PREFIX} Record correctness test result for mla-w8a16"
    key: "${TEST_KEY_PREFIX}record_mla-w8a16_CorrectnessTest"
    depends_on: "${TEST_KEY_PREFIX}mla-w8a16_CorrectnessTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX}mla-w8a16"
      CI_STAGE: "CorrectnessTest"
      CI_CATEGORY: "kernel support matrix microbenchmarks"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}mla-w8a16_CorrectnessTest

  - label: "${TEST_LABEL_PREFIX} Performance tests for mla-w8a16"
    key: "${TEST_KEY_PREFIX}mla-w8a16_PerformanceTest"
    depends_on: "${TEST_KEY_PREFIX}record_mla-w8a16_CorrectnessTest"
    soft_fail: true
    agents:
      queue: "${TPU_SMALL_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    commands:
      - |
        buildkite-agent meta-data set "${TEST_KEY_PREFIX}mla-w8a16_PerformanceTest" "unverified"
  - label: "${TEST_LABEL_PREFIX} Record performance test result for mla-w8a16"
    key: "${TEST_KEY_PREFIX}record_mla-w8a16_PerformanceTest"
    depends_on: "${TEST_KEY_PREFIX}mla-w8a16_PerformanceTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX}mla-w8a16"
      CI_STAGE: "PerformanceTest"
      CI_CATEGORY: "kernel support matrix microbenchmarks"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}mla-w8a16_PerformanceTest
