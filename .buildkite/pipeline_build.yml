.docker_build_template: &docker_build_template
  agents:
    queue: cpu_64_core
  commands:
    - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

steps:
  - label: ":docker: Build and Push Base Image (tpu6e)"
    key: "build_docker_tpu6e"
    <<: *docker_build_template
    env:
      BM_INFRA: "true"
      TPU_VERSION: "tpu6e"

  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: "build_docker_tpu7x"
    <<: *docker_build_template
    env:
      BM_INFRA: "true"
      TPU_VERSION: "tpu7x"

  - label: ":checkered_flag: Unified Docker Build Complete"
    key: "build_docker"
    depends_on:
      - "build_docker_tpu6e"
      - "build_docker_tpu7x"
    agents:
      queue: cpu
    commands:
      - echo "All docker builds finished successfully."
