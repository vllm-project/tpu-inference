#
# Buildkite pipeline for the XLA OFAT autotune sweep.
#
# The autotuner slices the candidate-flag list into contiguous chunks, one
# per shard, and every shard additionally runs AUTOTUNE_BASELINE_RUNS
# baselines so per-VM noise can be characterised.  To parallelise across N
# shards, list N entries in `matrix` and pass N as the slice-count arg —
# both must agree (e.g. matrix ["1","2","3","4"] with "{{matrix}} 4").
#
# See .buildkite/xla_autotune/README.md for trigger instructions.

steps:
  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "tpu7x [xla-autotune] shard {{matrix}}/1"
    key: tpu7x_xla_autotune
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      AUTOTUNE_MODEL: "Qwen/Qwen3.5-397B-A17B-FP8"
      AUTOTUNE_TARGET_METRIC: "total_token_throughput"
      AUTOTUNE_BASELINE_RUNS: "2"
      AUTOTUNE_FLAGS: ".buildkite/xla_autotune/flags.txt"
    matrix: ["1"]
    agents:
      queue: tpu_v7x_8_queue
    commands:
      - .buildkite/scripts/run_xla_autotune_shard.sh {{matrix}} 1
