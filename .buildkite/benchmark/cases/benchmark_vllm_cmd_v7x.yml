env:
  GCP_PROJECT_ID: "cloud-tpu-inference-test"
  GCP_REGION: "southamerica-west1"
  GCS_BUCKET: "vllm-cb-storage2"
  ARTIFACT_REPO: "vllm-tpu-bm-bk"
  GCP_INSTANCE_ID: "vllm-bm-inst"
  GCP_DATABASE_ID: "vllm-bm-bk-runs"

steps:
  - label: "Benchmark - Qwen/Qwen3-4B-v2-DirectCmd"
    agents:
      queue: "tpu_v7x_2_queue"
    command: ".buildkite/benchmark/scripts/run_job.sh"
    env:
      EXPECTED_ETEL: "3600000"
      VLLM_SERVE_CMD: >-
        VLLM_USE_V1=1 VLLM_TORCH_PROFILER_DIR="$$PROFILER_DIR" 
        vllm serve Qwen/Qwen3-4B 
        --seed 42 
        --max-num-seqs 512 
        --max-num-batched-tokens 4096 
        --tensor-parallel-size 2 
        --no-enable-prefix-caching 
        --max-model-len 5120 
        --kv-cache-dtype=fp8 
        --gpu-memory-utilization=0.98 
        --additional_config='{"quantization": { "qwix": { "rules": [{ "module_path": ".*", "weight_qtype": "float8_e4m3fn", "act_qtype": "float8_e4m3fn"}]}}}' 
        --async-scheduling
      BENCHMARK_CMD: >-
        vllm bench serve 
        --backend vllm 
        --model Qwen/Qwen3-4B 
        --request-rate inf 
        --dataset-name custom 
        --num-prompts 1000
        --percentile-metrics ttft,tpot,itl,e2el 
        --ignore-eos 
        --dataset-path $$DATASET_PATH 
        --custom-output-len 1024 
        --skip-chat-template
