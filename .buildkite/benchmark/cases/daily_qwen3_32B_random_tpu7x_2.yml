env:
  GCP_PROJECT_ID: "cloud-tpu-inference-test"
  GCP_REGION: "southamerica-west1"
  GCS_BUCKET: "vllm-cb-storage2"
  ARTIFACT_REPO: "vllm-tpu-bm-bk"
  GCP_INSTANCE_ID: "vllm-bm-inst"
  GCP_DATABASE_ID: "vllm-bm-bk-runs"

definitions:
  base_env_0: &base_env_0
    DEVICE: "tpu7x-2"
    MODEL: "Qwen/Qwen3-32B"
    MAX_NUM_SEQS: "256"
    MAX_NUM_BATCHED_TOKENS: "4096"
    TENSOR_PARALLEL_SIZE: "2"
    DATASET: "random"
    EXPECTED_ETEL: "10800000"
    NUM_PROMPTS: "320"
    MODELTAG: "NEW"
    USE_BENCHMARK_SERVING: "1"
    MAX_CONCURRENCY: "64"
    ADDITIONAL_CONFIG: '{"quantization": { "qwix": { "rules": [{ "module_path": ".*", "weight_qtype": "float8_e4m3fn", "act_qtype": "float8_e4m3fn"}]}}}'
    EXTRA_ARGS: '--kv-cache-dtype=fp8 --gpu-memory-utilization=0.98'

  base_cfg_0: &base_cfg_0
    depends_on: "build-vllm-tpu-image"
    agents:
      queue: "tpu_v7x_2_queue"
    command: ".buildkite/benchmark/scripts/run_job_from_env.sh"
  base_env_1: &base_env_1
    DEVICE: "tpu7x-2"
    MODEL: "Qwen/Qwen3-32B"
    MAX_NUM_SEQS: "256"
    MAX_NUM_BATCHED_TOKENS: "4096"
    TENSOR_PARALLEL_SIZE: "2"
    DATASET: "random"
    EXPECTED_ETEL: "10800000"
    NUM_PROMPTS: "320"
    MODELTAG: "NEW"
    USE_BENCHMARK_SERVING: "1"
    MAX_CONCURRENCY: "320"
    ADDITIONAL_CONFIG: '{"quantization": { "qwix": { "rules": [{ "module_path": ".*", "weight_qtype": "float8_e4m3fn", "act_qtype": "float8_e4m3fn"}]}}}'
    EXTRA_ARGS: '--kv-cache-dtype=fp8 --gpu-memory-utilization=0.98'

  base_cfg_1: &base_cfg_1
    depends_on: "build-vllm-tpu-image"
    agents:
      queue: "tpu_v7x_2_queue"
    command: ".buildkite/benchmark/scripts/run_job_from_env.sh"
  base_env_2: &base_env_2
    DEVICE: "tpu7x-2"
    MODEL: "Qwen/Qwen3-32B"
    MAX_NUM_SEQS: "135"
    MAX_NUM_BATCHED_TOKENS: "4096"
    TENSOR_PARALLEL_SIZE: "2"
    DATASET: "random"
    EXPECTED_ETEL: "10800000"
    NUM_PROMPTS: "320"
    MODELTAG: "NEW"
    USE_BENCHMARK_SERVING: "1"
    MAX_CONCURRENCY: "64"
    ADDITIONAL_CONFIG: '{"quantization": { "qwix": { "rules": [{ "module_path": ".*", "weight_qtype": "float8_e4m3fn", "act_qtype": "float8_e4m3fn"}]}}}'
    EXTRA_ARGS: '--kv-cache-dtype=fp8 --gpu-memory-utilization=0.98'

  base_cfg_2: &base_cfg_2
    depends_on: "build-vllm-tpu-image"
    agents:
      queue: "tpu_v7x_2_queue"
    command: ".buildkite/benchmark/scripts/run_job_from_env.sh"
  base_env_3: &base_env_3
    DEVICE: "tpu7x-2"
    MODEL: "Qwen/Qwen3-32B"
    MAX_NUM_SEQS: "135"
    MAX_NUM_BATCHED_TOKENS: "4096"
    TENSOR_PARALLEL_SIZE: "2"
    DATASET: "random"
    EXPECTED_ETEL: "10800000"
    NUM_PROMPTS: "320"
    MODELTAG: "NEW"
    USE_BENCHMARK_SERVING: "1"
    MAX_CONCURRENCY: "320"
    ADDITIONAL_CONFIG: '{"quantization": { "qwix": { "rules": [{ "module_path": ".*", "weight_qtype": "float8_e4m3fn", "act_qtype": "float8_e4m3fn"}]}}}'
    EXTRA_ARGS: '--kv-cache-dtype=fp8 --gpu-memory-utilization=0.98'

  base_cfg_3: &base_cfg_3
    depends_on: "build-vllm-tpu-image"
    agents:
      queue: "tpu_v7x_2_queue"
    command: ".buildkite/benchmark/scripts/run_job_from_env.sh"
steps:
  - label: "Benchmark - Qwen/Qwen3-32B-datset_random-inlen_1024-outlen_1024 RecordId: bk-${BUILDKITE_STEP_ID}"
    <<: *base_cfg_0
    env:
      <<: *base_env_0
      INPUT_LEN: "1024"
      OUTPUT_LEN: "1024"
      MAX_MODEL_LEN: "2048"
      PREFIX_LEN: "0"

  - label: "Benchmark - Qwen/Qwen3-32B-datset_random-inlen_1024-outlen_1024 RecordId: bk-${BUILDKITE_STEP_ID}"
    <<: *base_cfg_1
    env:
      <<: *base_env_1
      INPUT_LEN: "1024"
      OUTPUT_LEN: "1024"
      MAX_MODEL_LEN: "2048"
      PREFIX_LEN: "0"

  - label: "Benchmark - Qwen/Qwen3-32B-datset_random-inlen_1024-outlen_8192 RecordId: bk-${BUILDKITE_STEP_ID}"
    <<: *base_cfg_2
    env:
      <<: *base_env_2
      INPUT_LEN: "1024"
      OUTPUT_LEN: "8192"
      MAX_MODEL_LEN: "9216"
      PREFIX_LEN: "0"

  - label: "Benchmark - Qwen/Qwen3-32B-datset_random-inlen_8192-outlen_1024 RecordId: bk-${BUILDKITE_STEP_ID}"
    <<: *base_cfg_2
    env:
      <<: *base_env_2
      INPUT_LEN: "8192"
      OUTPUT_LEN: "1024"
      MAX_MODEL_LEN: "9216"
      PREFIX_LEN: "0"

  - label: "Benchmark - Qwen/Qwen3-32B-datset_random-inlen_1024-outlen_8192 RecordId: bk-${BUILDKITE_STEP_ID}"
    <<: *base_cfg_3
    env:
      <<: *base_env_3
      INPUT_LEN: "1024"
      OUTPUT_LEN: "8192"
      MAX_MODEL_LEN: "9216"
      PREFIX_LEN: "0"

  - label: "Benchmark - Qwen/Qwen3-32B-datset_random-inlen_8192-outlen_1024 RecordId: bk-${BUILDKITE_STEP_ID}"
    <<: *base_cfg_3
    env:
      <<: *base_env_3
      INPUT_LEN: "8192"
      OUTPUT_LEN: "1024"
      MAX_MODEL_LEN: "9216"
      PREFIX_LEN: "0"
