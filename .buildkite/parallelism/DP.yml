# DP
# parallelism support matrix
steps:
  - label: "${TEST_LABEL_PREFIX} Correctness tests for DP"
    key: "${TEST_KEY_PREFIX}DP_CorrectnessTest"
    soft_fail: true
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
      NEW_MODEL_DESIGN: "1"
    agents:
      queue: "${TPU_LARGE_CORE_QUEUE}"
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh \
          bash -c 'python3 -m pytest -s -v -x /workspace/tpu_inference/tests/e2e/test_data_parallel.py'
  - label: "${TEST_LABEL_PREFIX} Record correctness test result for DP"
    key: "${TEST_KEY_PREFIX}record_DP_CorrectnessTest"
    depends_on: "${TEST_KEY_PREFIX}DP_CorrectnessTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX} DP"
      CI_STAGE: "CorrectnessTest"
      CI_CATEGORY: "parallelism support matrix"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}DP_CorrectnessTest

  - label: "${TEST_LABEL_PREFIX} Performance tests for DP"
    key: "${TEST_KEY_PREFIX}DP_PerformanceTest"
    depends_on: "${TEST_KEY_PREFIX}record_DP_CorrectnessTest"
    soft_fail: true
    agents:
      queue: "${TPU_SMALL_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    commands:
      - |
        buildkite-agent meta-data set "DP_PerformanceTest" "to be added"
  - label: "${TEST_LABEL_PREFIX} Record performance test result for DP"
    key: "${TEST_KEY_PREFIX}record_DP_PerformanceTest"
    depends_on: "${TEST_KEY_PREFIX}DP_PerformanceTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX} DP"
      CI_STAGE: "PerformanceTest"
      CI_CATEGORY: "parallelism support matrix"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}DP_PerformanceTest
