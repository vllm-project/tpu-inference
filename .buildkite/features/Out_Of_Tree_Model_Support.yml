# Out-of-tree model support
# feature support matrix
steps:
  - label: "${TEST_LABEL_PREFIX} Correctness tests for Out-of-tree model support"
    key: "${TEST_KEY_PREFIX}out_of_tree_model_support_CorrectnessTest"
    soft_fail: true
    agents:
      queue: "${TPU_SMALL_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh \
          python3 -m pytest -s -v /workspace/tpu_inference/tests/e2e/test_model_loader.py::test_register_model_success \
          /workspace/tpu_inference/tests/e2e/test_model_loader.py::test_registered_model_passes_vllm_interface_check

  - label: "${TEST_LABEL_PREFIX} Record correctness test result for Out-of-tree model support"
    key: "${TEST_KEY_PREFIX}record_out_of_tree_model_support_CorrectnessTest"
    depends_on: "${TEST_KEY_PREFIX}out_of_tree_model_support_CorrectnessTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX}Out-of-tree model support"
      CI_STAGE: "CorrectnessTest"
      CI_CATEGORY: "feature support matrix"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}out_of_tree_model_support_CorrectnessTest

  - label: "${TEST_LABEL_PREFIX} Performance tests for Out-of-tree model support"
    key: "${TEST_KEY_PREFIX}out_of_tree_model_support_PerformanceTest"
    depends_on: "${TEST_KEY_PREFIX}record_out_of_tree_model_support_CorrectnessTest"
    soft_fail: true
    agents:
      queue: "${TPU_SMALL_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh \
          python3 -m pytest -s -v /workspace/tpu_inference/tests/e2e/test_model_loader.py::test_flax_nnx_vs_vllm_performance

  - label: "${TEST_LABEL_PREFIX} Record performance test result for Out-of-tree model support"
    key: "${TEST_KEY_PREFIX}record_out_of_tree_model_support_PerformanceTest"
    depends_on: "${TEST_KEY_PREFIX}out_of_tree_model_support_PerformanceTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX}Out-of-tree model support"
      CI_STAGE: "PerformanceTest"
      CI_CATEGORY: "feature support matrix"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}out_of_tree_model_support_PerformanceTest
