# Speculative Decoding: Ngram
# feature support matrix
steps:
  - label: "${TEST_LABEL_PREFIX} Correctness tests for Speculative Decoding: Ngram"
    key: "${TEST_KEY_PREFIX}Speculative_Decoding-_Ngram_CorrectnessTest"
    soft_fail: true
    agents:
      queue: "${TPU_SMALL_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh \
          python3 -m pytest -s -v /workspace/tpu_inference/tests/e2e/test_speculative_decoding.py::test_ngram_correctness_greedy \
          /workspace/tpu_inference/tests/e2e/test_speculative_decoding.py::test_ngram_correctness_random
  - label: "${TEST_LABEL_PREFIX} Record correctness test result for Speculative Decoding: Ngram"
    key: "${TEST_KEY_PREFIX}record_Speculative_Decoding-_Ngram_CorrectnessTest"
    depends_on: "${TEST_KEY_PREFIX}Speculative_Decoding-_Ngram_CorrectnessTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX}Speculative Decoding: Ngram"
      CI_STAGE: "CorrectnessTest"
      CI_CATEGORY: "feature support matrix"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}Speculative_Decoding-_Ngram_CorrectnessTest

  - label: "${TEST_LABEL_PREFIX} Performance tests for Speculative Decoding: Ngram"
    key: "${TEST_KEY_PREFIX}Speculative_Decoding-_Ngram_PerformanceTest"
    depends_on: "${TEST_KEY_PREFIX}record_Speculative_Decoding-_Ngram_CorrectnessTest"
    soft_fail: true
    agents:
      queue: "${TPU_SMALL_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh \
          python3 -m pytest -s -v /workspace/tpu_inference/tests/e2e/test_speculative_decoding.py::test_ngram_performance_greedy \
          /workspace/tpu_inference/tests/e2e/test_speculative_decoding.py::test_ngram_performance_random

  - label: "${TEST_LABEL_PREFIX} Record performance test result for Speculative Decoding: Ngram"
    key: "${TEST_KEY_PREFIX}record_Speculative_Decoding-_Ngram_PerformanceTest"
    depends_on: "${TEST_KEY_PREFIX}Speculative_Decoding-_Ngram_PerformanceTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX}Speculative Decoding: Ngram"
      CI_STAGE: "PerformanceTest"
      CI_CATEGORY: "feature support matrix"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}Speculative_Decoding-_Ngram_PerformanceTest
