  - label: "${TPU_VERSION:-tpu7x} Correctness tests for Multi-host P/D disaggregation with Speculative Decoding"
    key: "${TPU_VERSION:-tpu7x}_multi_host_disagg_speculative_CorrectnessTest"
    soft_fail: true
    agents:
      queue: tpu_v7x_16_queue
      hostname: "tpu7x-16-ci-0-cicd-us-central1-c"
    env:
      TPU_VERSION: "${TPU_VERSION:-tpu7x}"
      MODEL: "gs://tpu-commons-ci/qwen/models--Qwen--Qwen3-30B-A3B/snapshots/ad44e777bcd18fa416d9da3bd8f70d33ebb85d39"
      LOAD_FORMAT: "runai_streamer"
      SERVED_MODEL_NAME: "Qwen/Qwen3-30B-A3B"
      SPECULATIVE_METHOD: "ngram"
      SPECULATIVE_CONFIG: '{"method":"ngram","prompt_lookup_max":5,"prompt_lookup_min":3,"num_speculative_tokens":3}'
      PREFILL_HOSTS_COUNT: "1"
      DECODE_HOSTS_COUNT: "1"
      TEST_MODE: 2 # only run correctness test
    commands:
      - |
        .buildkite/e2e/run_multi_disagg_speculative.sh

  - label: "${TPU_VERSION:-tpu7x} Record correctness test result for Multi-host P/D disaggregation with Speculative Decoding"
    key: "${TPU_VERSION:-tpu7x}_record_multi_host_disagg_speculative_CorrectnessTest"
    depends_on: "${TPU_VERSION:-tpu7x}_multi_host_disagg_speculative_CorrectnessTest"
    env:
      CI_TPU_VERSION: "${TPU_VERSION:-tpu7x}"
      CI_TARGET: "Multi-host P/D disaggregation with Speculative Decoding"
      CI_STAGE: "CorrectnessTest"
      CI_CATEGORY: "feature support matrix"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TPU_VERSION:-tpu7x}_multi_host_disagg_speculative_CorrectnessTest

  - label: "${TPU_VERSION:-tpu7x} Performance tests for Multi-host P/D disaggregation with Speculative Decoding"
    key: "${TPU_VERSION:-tpu7x}_multi_host_disagg_speculative_PerformanceTest"
    depends_on: "${TPU_VERSION:-tpu7x}_record_multi_host_disagg_speculative_CorrectnessTest"
    soft_fail: true
    agents:
      queue: tpu_v7x_16_queue
    env:
      TPU_VERSION: "${TPU_VERSION:-tpu7x}"
      MODEL: "gs://tpu-commons-ci/qwen/models--Qwen--Qwen3-30B-A3B/snapshots/ad44e777bcd18fa416d9da3bd8f70d33ebb85d39"
      LOAD_FORMAT: "runai_streamer"
      SERVED_MODEL_NAME: "Qwen/Qwen3-30B-A3B"
      SPECULATIVE_METHOD: "ngram"
      SPECULATIVE_CONFIG: '{"method":"ngram","prompt_lookup_max":5,"prompt_lookup_min":3,"num_speculative_tokens":3}'
      PREFILL_HOSTS_COUNT: "1"
      DECODE_HOSTS_COUNT: "1"
      TEST_MODE: 1 # only run performance test
    commands:
      - |
        .buildkite/e2e/run_multi_disagg_speculative.sh

  - label: "${TPU_VERSION:-tpu7x} Record performance test result for Multi-host P/D disaggregation with Speculative Decoding"
    key: "${TPU_VERSION:-tpu7x}_record_multi_host_disagg_speculative_PerformanceTest"
    depends_on: "${TPU_VERSION:-tpu7x}_multi_host_disagg_speculative_PerformanceTest"
    env:
      CI_TPU_VERSION: "${TPU_VERSION:-tpu7x}"
      CI_TARGET: "Multi-host P/D disaggregation with Speculative Decoding"
      CI_STAGE: "PerformanceTest"
      CI_CATEGORY: "feature support matrix"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TPU_VERSION:-tpu7x}_multi_host_disagg_speculative_PerformanceTest
  - label: "${TPU_VERSION:-tpu7x} Correctness tests for multi-host"
    key: "${TPU_VERSION:-tpu7x}_multi-host_CorrectnessTest"
    soft_fail: true
    agents:
      queue: tpu_v7x_16_queue
      hostname: "tpu7x-16-ci-0-cicd-us-central1-c"
    env:
      TPU_VERSION: "${TPU_VERSION:-tpu6e}"
      HEAD_SSH_IP: ""
      HEAD_INTERNAL_IP: ""
      WORKER_SSH_IPS: ""
    commands:
      # Correctness Test Example:
      # 1. Start vLLM with specific model and tensor parallel size
      # 2. Run curl commands against it
      - |
        MODEL="gs://tpu-commons-ci/qwen/models--Qwen--Qwen3-30B-A3B/snapshots/ad44e777bcd18fa416d9da3bd8f70d33ebb85d39"
        .buildkite/scripts/run_multihost.sh \
          "vllm serve \${MODEL} \
            --port 8000 \
            --tensor-parallel-size 16 \
            --trust-remote-code \
            --max-model-len 1024 \
            --async-scheduling \
            --load-format=runai_streamer \
            --no-enable-prefix-caching" \
          "curl http://localhost:8000/v1/completions \
            -X POST \
            -H 'Content-Type: application/json' \
            -d '{\"model\": \"${MODEL}\", \"prompt\": \"San Francisco is a\", \"max_tokens\": 50}'
          "
  - label: "${TPU_VERSION:-tpu7x} Record correctness test result for multi-host"
    key: "${TPU_VERSION:-tpu7x}_record_multi-host_CorrectnessTest"
    depends_on: "${TPU_VERSION:-tpu7x}_multi-host_CorrectnessTest"
    env:
      CI_TPU_VERSION: "${TPU_VERSION:-tpu7x}"
      CI_TARGET: "multi-host"
      CI_STAGE: "CorrectnessTest"
      CI_CATEGORY: "feature support matrix"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TPU_VERSION:-tpu7x}_multi-host_CorrectnessTest
