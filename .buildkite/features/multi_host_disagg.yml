steps:
  - label: "${TPU_VERSION:-tpu7x} Correctness tests for Multi-host P/D disaggregation"
    key: "${TPU_VERSION:-tpu7x}_multi_host_disagg_CorrectnessTest"
    soft_fail: true
    agents:
      queue: tpu_v7x_16_queue
    env:
      TPU_VERSION: "${TPU_VERSION:-tpu7x}"
      TEST_MODE: 2 # only run correctness test
    commands:
      - |
        .buildkite/e2e/run_multi_disagg.sh

  - label: "${TPU_VERSION:-tpu7x} Record correctness test result for Multi-host P/D disaggregation"
    key: "${TPU_VERSION:-tpu7x}_record_multi_host_disagg_CorrectnessTest"
    depends_on: "${TPU_VERSION:-tpu7x}_multi_host_disagg_CorrectnessTest"
    env:
      CI_TPU_VERSION: "${TPU_VERSION:-tpu7x}"
      CI_TARGET: "Multi-host P/D disaggregation"
      CI_STAGE: "CorrectnessTest"
      CI_CATEGORY: "feature support matrix"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TPU_VERSION:-tpu7x}_multi_host_disagg_CorrectnessTest

  - label: "${TPU_VERSION:-tpu7x} Performance tests for Multi-host P/D disaggregation"
    key: "${TPU_VERSION:-tpu7x}_multi_host_disagg_PerformanceTest"
    depends_on: "${TPU_VERSION:-tpu7x}_record_multi_host_disagg_CorrectnessTest"
    soft_fail: true
    agents:
      queue: tpu_v7x_16_queue
    env:
      TPU_VERSION: "${TPU_VERSION:-tpu7x}"
      TEST_MODE: 1 # only run performance test
    commands:
      - |
        .buildkite/e2e/run_multi_disagg.sh

  - label: "${TPU_VERSION:-tpu7x} Record performance test result for Multi-host P/D disaggregation"
    key: "${TPU_VERSION:-tpu7x}_record_multi_host_disagg_PerformanceTest"
    depends_on: "${TPU_VERSION:-tpu7x}_multi_host_disagg_PerformanceTest"
    env:
      CI_TPU_VERSION: "${TPU_VERSION:-tpu7x}"
      CI_TARGET: "Multi-host P/D disaggregation"
      CI_STAGE: "PerformanceTest"
      CI_CATEGORY: "feature support matrix"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TPU_VERSION:-tpu7x}_multi_host_disagg_PerformanceTest
