steps:
  - label: "${TPU_VERSION:-tpu6e} Correctness: RunAI Model Streamer Loader + Sampling Params"
    key: "${TPU_VERSION:-tpu6e}_Combo_Streamer_Sampling_Correctness"
    depends_on: "build_docker"
    agents:
      queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
    env:
      TPU_VERSION: "${TPU_VERSION:-tpu6e}"
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh \
         python3 -m pytest -s -v /workspace/tpu_inference/tests/e2e/combo/test_combo_streamer_loader_sampling_params.py

  - label: "${TPU_VERSION:-tpu6e} Correctness: RunAI Model Streamer Loader"
    key: "${TPU_VERSION:-tpu6e}_Streamer_Loader_Correctness"
    depends_on: "build_docker"
    agents:
      queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
    env:
      TPU_VERSION: "${TPU_VERSION:-tpu6e}"
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh \
         python3 -m pytest -s -v /workspace/tpu_inference/tests/e2e/test_runai_model_streamer_loader.py

