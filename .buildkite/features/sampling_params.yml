# sampling_params
# Sampling parameters control how the model selects tokens during generation.
# These tests verify that temperature, top_p, top_k, and logprobs work correctly.
steps:
  - label: "${TEST_LABEL_PREFIX} Correctness tests for sampling_params"
    key: "${TEST_KEY_PREFIX}sampling_params_CorrectnessTest"
    soft_fail: true
    agents:
      queue: "${TPU_SMALL_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    commands:
      - .buildkite/scripts/run_in_docker.sh python3 -m pytest -s -v /workspace/tpu_inference/tests/e2e/test_sampling_params.py
  - label: "${TEST_LABEL_PREFIX} Record correctness test result for sampling_params"
    key: "${TEST_KEY_PREFIX}record_sampling_params_CorrectnessTest"
    depends_on: "${TEST_KEY_PREFIX}sampling_params_CorrectnessTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX} sampling_params"
      CI_STAGE: "CorrectnessTest"
      CI_CATEGORY: "feature support matrix"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}sampling_params_CorrectnessTest
