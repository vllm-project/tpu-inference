# async scheduler
# feature support matrix
steps:
  - label: "${TEST_LABEL_PREFIX} Correctness tests for async scheduler"
    key: "${TEST_KEY_PREFIX}async_scheduler_CorrectnessTest"
    soft_fail: true
    agents:
      queue: "${TPU_SMALL_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    commands:
      - .buildkite/scripts/run_in_docker.sh python3 -m pytest -s -v /workspace/tpu_inference/tests/e2e/test_async_scheduler.py::test_async_correctness
  - label: "${TEST_LABEL_PREFIX} Record correctness test result for async scheduler"
    key: "${TEST_KEY_PREFIX}record_async_scheduler_CorrectnessTest"
    depends_on: "${TEST_KEY_PREFIX}async_scheduler_CorrectnessTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX}async scheduler"
      CI_STAGE: "CorrectnessTest"
      CI_CATEGORY: "feature support matrix"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}async_scheduler_CorrectnessTest

  - label: "${TEST_LABEL_PREFIX} Performance tests for async scheduler"
    key: "${TEST_KEY_PREFIX}async_scheduler_PerformanceTest"
    depends_on: "${TEST_KEY_PREFIX}record_async_scheduler_CorrectnessTest"
    soft_fail: true
    agents:
      queue: "${TPU_SMALL_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    commands:
      - .buildkite/scripts/run_in_docker.sh python3 -m pytest -s -v /workspace/tpu_inference/tests/e2e/test_async_scheduler.py::test_performance
  - label: "${TEST_LABEL_PREFIX} Record performance test result for async scheduler"
    key: "${TEST_KEY_PREFIX}record_async_scheduler_PerformanceTest"
    depends_on: "${TEST_KEY_PREFIX}async_scheduler_PerformanceTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX}async scheduler"
      CI_STAGE: "PerformanceTest"
      CI_CATEGORY: "feature support matrix"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}async_scheduler_PerformanceTest
