# structured_decoding
# Structured decoding allows constraining the model's output to follow a
# specific format, such as choosing from a predefined set of options or
# following a JSON schema. This is useful for classification tasks,
# structured data extraction, and ensuring outputs conform to expected formats.
steps:
  - label: "${TEST_LABEL_PREFIX} Correctness tests for structured_decoding"
    key: "${TEST_KEY_PREFIX}structured_decoding_CorrectnessTest"
    soft_fail: true
    agents:
      queue: "${TPU_SMALL_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    commands:
      - .buildkite/scripts/run_in_docker.sh python3 -m pytest -s -v /workspace/tpu_inference/tests/e2e/test_structured_decoding.py::test_structured_decoding
  - label: "${TEST_LABEL_PREFIX} Record correctness test result for structured_decoding"
    key: "${TEST_KEY_PREFIX}record_structured_decoding_CorrectnessTest"
    depends_on: "${TEST_KEY_PREFIX}structured_decoding_CorrectnessTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX}structured_decoding"
      CI_STAGE: "CorrectnessTest"
      CI_CATEGORY: "feature support matrix"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}structured_decoding_CorrectnessTest
