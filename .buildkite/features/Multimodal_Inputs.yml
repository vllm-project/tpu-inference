# Multimodal Inputs
# feature support matrix
steps:
  - label: "${TEST_LABEL_PREFIX} Correctness tests for Multimodal Inputs"
    key: "${TEST_KEY_PREFIX}Multimodal_Inputs_CorrectnessTest"
    soft_fail: true
    agents:
      queue: "${TPU_SMALL_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    commands:
      - .buildkite/scripts/run_in_docker.sh python3 -m pytest -s -v /workspace/vllm/tests/v1/tpu/test_multimodal.py
  - label: "${TEST_LABEL_PREFIX} Record correctness test result for Multimodal Inputs"
    key: "${TEST_KEY_PREFIX}record_Multimodal_Inputs_CorrectnessTest"
    depends_on: "${TEST_KEY_PREFIX}Multimodal_Inputs_CorrectnessTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX} Multimodal Inputs"
      CI_STAGE: "CorrectnessTest"
      CI_CATEGORY: "feature support matrix"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}Multimodal_Inputs_CorrectnessTest

  - label: "${TEST_LABEL_PREFIX} Performance tests for Multimodal Inputs"
    key: "${TEST_KEY_PREFIX}Multimodal_Inputs_PerformanceTest"
    depends_on: "${TEST_KEY_PREFIX}record_Multimodal_Inputs_CorrectnessTest"
    soft_fail: true
    agents:
      queue: "${TPU_SMALL_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mm_bench.sh
  - label: "${TEST_LABEL_PREFIX} Record performance test result for Multimodal Inputs"
    key: "${TEST_KEY_PREFIX}record_Multimodal_Inputs_PerformanceTest"
    depends_on: "${TEST_KEY_PREFIX}Multimodal_Inputs_PerformanceTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX} Multimodal Inputs"
      CI_STAGE: "PerformanceTest"
      CI_CATEGORY: "feature support matrix"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}Multimodal_Inputs_PerformanceTest
