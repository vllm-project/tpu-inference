# pipeline-name: data_parallelism
# pipeline-type: feature support matrix
steps:
  - label: "${TEST_LABEL_PREFIX} Correctness tests for data_parallelism"
    key: "${TEST_KEY_PREFIX}data_parallelism_CorrectnessTest"
    soft_fail: true
    agents:
      queue: "${TPU_SMALL_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh \
          bash -c 'NEW_MODEL_DESIGN=1 python3 -m pytest -s -v -x /workspace/tpu_inference/tests/e2e/test_data_parallel.py'
  - label: "${TEST_LABEL_PREFIX} Record correctness test result for data_parallelism"
    key: "${TEST_KEY_PREFIX}record_data_parallelism_CorrectnessTest"
    depends_on: "${TEST_KEY_PREFIX}data_parallelism_CorrectnessTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX}data_parallelism"
      CI_STAGE: "CorrectnessTest"
      CI_CATEGORY: "feature support matrix"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}data_parallelism_CorrectnessTest

  - label: "${TEST_LABEL_PREFIX} Performance tests for data_parallelism"
    key: "${TEST_KEY_PREFIX}data_parallelism_PerformanceTest"
    soft_fail: true
    agents:
      queue: "${TPU_SMALL_CORE_QUEUE}"
    env:
      IS_FOR_V7X: "${IS_FOR_V7X}"
    commands:
      - |
        buildkite-agent meta-data set "${TEST_KEY_PREFIX}data_parallelism_PerformanceTest" "run together with correctness test"

  - label: "${TEST_LABEL_PREFIX} Record performance test result for data_parallelism"
    key: "${TEST_KEY_PREFIX}record_data_parallelism_PerformanceTest"
    depends_on: "${TEST_KEY_PREFIX}data_parallelism_PerformanceTest"
    env:
      CI_TARGET: "${TEST_LABEL_PREFIX}data_parallelism"
      CI_STAGE: "PerformanceTest"
      CI_CATEGORY: "feature support matrix"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TEST_KEY_PREFIX}data_parallelism_PerformanceTest
