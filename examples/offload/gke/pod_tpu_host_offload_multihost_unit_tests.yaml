apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: tpu-job-host-offload-multi-host-unit-tests
  # This LeaderWorkerSet runs the distributed multi-host unit tests for
  # TPUOffloadConnector across a Ray cluster spanning multiple TPU pods.
spec:
  replicas: 1
  leaderWorkerTemplate:
    size: 2
    restartPolicy: RecreateGroupOnPodRestart
    leaderTemplate:
      metadata:
        labels:
          role: leader
      spec:
        nodeSelector:
          cloud.google.com/gke-tpu-accelerator: tpu7x
          cloud.google.com/gke-tpu-topology: 2x2x2
        containers:
          - name: tpu-job-leader
            image: <your-tpu-inference-container-image>
            imagePullPolicy: Always
            env:
            - name: TPU_MULTIHOST_BACKEND
              value: ray
            - name: RAY_health_check_timeout_ms
              value: "30000"
            - name: RAY_health_check_failure_threshold
              value: "10"
            - name: TPU_BACKEND_TYPE
              value: jax
            - name: MODEL_IMPL_TYPE
              value: vllm
            - name: JAX_PLATFORMS
              value: ""
            - name: VLLM_LOGGING_LEVEL
              value: "DEBUG"
            - name: IS_TPU_MULTIHOST
              value: "true"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: token
            command: ["/bin/sh", "-c"]
            args:
              - |
                bash /workspace/vllm/examples/ray_serving/multi-node-serving.sh leader --ray_cluster_size=$(LWS_GROUP_SIZE);

                pytest -sv tests/offload/tpu_offload_accuracy_test.py
                pytest -sv tests/offload/tpu_offload_performance_test.py
            resources:
              limits:
                google.com/tpu: "4"
            volumeMounts:
              - mountPath: /dev/shm
                name: dshm
        volumes:
        - name: dshm
          emptyDir:
            medium: Memory
    workerTemplate:
      spec:
        nodeSelector:
          cloud.google.com/gke-tpu-accelerator: tpu7x
          cloud.google.com/gke-tpu-topology: 2x2x2
        containers:
          - name: tpu-job-worker
            image: <your-tpu-inference-container-image>
            imagePullPolicy: Always
            command: ["/bin/sh", "-c"]
            args:
              - |
                bash /workspace/vllm/examples/ray_serving/multi-node-serving.sh worker --ray_address=$(LWS_LEADER_ADDRESS)
            resources:
              limits:
                google.com/tpu: "4"
            env:
            - name: TPU_MULTIHOST_BACKEND
              value: ray
            - name: RAY_health_check_timeout_ms
              value: "30000"
            - name: RAY_health_check_failure_threshold
              value: "10"
            - name: TPU_BACKEND_TYPE
              value: jax
            - name: MODEL_IMPL_TYPE
              value: vllm
            - name: JAX_PLATFORMS
              value: ""
            - name: VLLM_LOGGING_LEVEL
              value: "DEBUG"
            - name: IS_TPU_MULTIHOST
              value: "true"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: token
            volumeMounts:
              - mountPath: /dev/shm
                name: dshm
        volumes:
        - name: dshm
          emptyDir:
            medium: Memory
