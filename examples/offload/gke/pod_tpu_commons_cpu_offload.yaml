apiVersion: v1
kind: Pod
metadata:
  name: tpu-job-offline-inference
spec:
  restartPolicy: Never
  nodeSelector:
    cloud.google.com/gke-tpu-accelerator: tpu7x
    cloud.google.com/gke-tpu-topology: 2x2x1 # Specify the physical topology for the TPU slice.
  containers:
  - name: tpu-job
    image: <your-tpu-inference-container-image>
    imagePullPolicy: Always # Uncomment to always pull the latest image for any dev work
    command:
    - python
    - /workspace/tpu_inference/examples/offload/offline_inference_kv_cache.py
    - --model=meta-llama/Llama-3.1-8B
    - --tensor_parallel_size=8
    - --max_model_len=1024
    - --kv-transfer-config
    - '{"kv_connector":"TPUOffloadConnector","kv_connector_module_path":"tpu_inference.offload.tpu_offload_connector","kv_role":"kv_both"}'
    env:
    - name: HUGGING_FACE_HUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: hf-token-secret
          key: token
    resources:
      requests:
        google.com/tpu: 4
      limits:
        google.com/tpu: 4
