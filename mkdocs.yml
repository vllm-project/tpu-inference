site_name: vLLM TPU
site_url: !ENV READTHEDOCS_CANONICAL_URL
repo_url: https://github.com/vllm-project/tpu-inference
edit_uri: edit/main/docs/
docs_dir: docs
strict: true

theme:
  name: material
  logo: https://docs.vllm.ai/en/latest/assets/logos/vllm-logo-only-light.ico
  favicon: https://docs.vllm.ai/en/latest/assets/logos/vllm-logo-only-light.ico
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      toggle:
        icon: material/brightness-2
        name: Switch to system preference
  features:
    - content.action.edit
    - content.code.copy
    - content.tabs.link
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - toc.follow

nav:
  - Home: README.md
  - Getting Started:
    - TPU Setup: getting_started/tpu_setup.md
    - Installation: getting_started/installation.md
    - Serving model: getting_started/quickstart.md
  - 'Basic Usage (I use HuggingFace model)':
    - 'Overview & TPU': basic_usage/overview.md
    - 'Recommended Models': basic_usage/recommended_models.md
    - 'Deploying model on GCE':
      - 'v7x setup (Ironwood)': https://github.com/AI-Hypercomputer/tpu-recipes/tree/main/inference/ironwood/vLLM
      - 'v6e setup (Trillium)': https://github.com/AI-Hypercomputer/tpu-recipes/tree/main/inference/trillium/vLLM
    - 'Code Examples':
      - 'Multi Modal Inference': https://github.com/vllm-project/tpu-inference/blob/main/examples/multi_modal_inference.py
      - 'Offline LoRA': https://github.com/vllm-project/tpu-inference/blob/main/examples/offline_lora_inference.py
  - Advanced Usage (I need my custom model):
    - 'JAX':
      - 'How it works': advanced_usage/jax_overview.md
      - 'Model Development': advanced_usage/jax_model_development.md
    - 'Torch':
      - 'How it works': advanced_usage/torch_overview.md
      - 'Model Development': advanced_usage/torchax_model_development.md
    - 'Your custom model on GCE': advanced_usage/gce_example.md
    - 'Recommended Features': advanced_usage/recommended_features.md
  - 'See Also':
    - 'Profiling' : profiling.md
    - 'FAQ': faq.md
    - 'Contributors Guide': contributors_guide.md

plugins:
  - search
  - same-dir
  - meta
  - glightbox
  - open-in-new-tab
  - table-reader

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  # For content tabs
  - pymdownx.superfences
  - pymdownx.tabbed:
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
      alternate_style: true
  # For code highlighting
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  # For emoji and icons
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # For in page [TOC] (not sidebar)
  - toc:
      permalink: true
  # For math rendering
  - mdx_math:
      enable_dollar_delimiter: true

extra_css:
  - mkdocs/stylesheets/extra.css

extra_javascript:
  - https://cdn.mathjax.org/mathjax/latest/MathJax.js?config=TeX-AMS_HTML

use_directory_urls: true

extra:
  analytics:
    provider: google
    property: G-XKQVS747Z2
