site_name: vLLM TPU
site_url: !ENV READTHEDOCS_CANONICAL_URL
repo_url: https://github.com/vllm-project/tpu-inference
edit_uri: edit/main/docs/
docs_dir: docs
strict: true

theme:
  name: material
  logo: https://docs.vllm.ai/en/latest/assets/logos/vllm-logo-only-light.ico
  favicon: https://docs.vllm.ai/en/latest/assets/logos/vllm-logo-only-light.ico
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      toggle:
        icon: material/brightness-2
        name: Switch to system preference
  features:
    - content.action.edit
    - content.code.copy
    - content.tabs.link
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - toc.follow

nav:
  - 'Home': README.md
  - 'Getting Started':
    - 'TPU Setup': getting_started/tpu_setup.md
    - 'TPU Setup v2': getting_started/tpu_setup_v2.md
    - 'Installation': getting_started/installation.md
    - 'Quickstart': getting_started/quickstart.md
  - 'Features & Usage':
    - 'Recommended Models': recommended_models.md
    - 'Recommended Features': recommended_features.md
    - 'Support Matrix': support_matrix.md
    - 'Deploying on GCE':
      - 'v7x setup (Ironwood)': deployment_guides/ironwood.md
      - 'v6e setup (Trillium)': deployment_guides/trillium.md
    - 'Code Examples':
      - 'Multi Modal Inference': api_and_code_examples/multi_modal_inference.md
      - 'Offline LoRA': api_and_code_examples/offline_lora_inference.md
  - 'Developers Guides':
    - 'Contributing to vLLM TPU': developers_guide/contributing.md
    - 'Adding a New Model to CI': developers_guide/buildkite.md
    - 'JAX Model Development': developers_guide/jax_model_development.md
    - 'Torchax Model Development': developers_guide/torchax_model_development.md
    - 'Profiling' : developers_guide/profiling.md

plugins:
  - search
  - same-dir
  - meta
  - glightbox
  - open-in-new-tab
  - table-reader

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  # For content tabs
  - pymdownx.superfences
  - pymdownx.tabbed:
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
      alternate_style: true
  # For code highlighting
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      check_paths: true
  # For emoji and icons
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # For in page [TOC] (not sidebar)
  - toc:
      permalink: true
  # For math rendering
  - mdx_math:
      enable_dollar_delimiter: true

extra_css:
  - mkdocs/stylesheets/extra.css
  - mkdocs/stylesheets/interactive.css
  - https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css

extra_javascript:
  - https://cdn.mathjax.org/mathjax/latest/MathJax.js?config=TeX-AMS_HTML
  - https://code.jquery.com/jquery-3.7.1.min.js
  - https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js
  - mkdocs/javascripts/interactive.js

use_directory_urls: true

extra:
  analytics:
    provider: google
    property: G-XKQVS747Z2
