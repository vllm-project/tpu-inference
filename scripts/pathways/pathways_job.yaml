apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  labels:
    kueue.x-k8s.io/queue-name: multislice-queue
  name: wenxindong-test
  namespace: default
spec:
  coordinator:
    replicatedJob: pathways-head
  failurePolicy:
    maxRestarts: 0
    restartStrategy: Recreate
  network:
    enableDNSHostnames: true
    publishNotReadyAddresses: true
  replicatedJobs:
    - name: pathways-head
      replicas: 1
      template:
        # metadata:
        # annotations:
        # kueue.x-k8s.io/safe-to-forcefully-terminate: "true"
        spec:
          backoffLimit: 0
          completionMode: Indexed
          completions: 1
          parallelism: 1
          template:
            spec:
              containers:
                - command:
                    - bash
                    - -c
                    - |
                      echo "XPK Start: $(date)"
                      _sigterm() (kill -SIGTERM $! 2>/dev/null)
                      trap _sigterm SIGTERM

                      (
                        # Patch local tpu-inference changes from GCS
                        echo "Installing tpu-inference patch from GCS..."
                        TOKEN=$(curl -s -H "Metadata-Flavor: Google" "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
                        curl -s -H "Authorization: Bearer ${TOKEN}" \
                          -o /tmp/tpu-inference.tar.gz \
                          "https://storage.googleapis.com/wenxindong-cloud-tpu-inference-test/patches/tpu-inference.tar.gz"
                        mkdir -p /tmp/tpu-inference && tar xzf /tmp/tpu-inference.tar.gz -C /tmp/tpu-inference
                        # Overwrite the pre-installed /workspace/tpu_inference in-place
                        # (editable installs there take precedence over site-packages)
                        if [ -d /workspace/tpu_inference ]; then
                          cp -a /tmp/tpu-inference/. /workspace/tpu_inference/
                        fi
                        pip install --no-deps /tmp/tpu-inference
                        echo "tpu-inference patch installed."
                        
                        # pip install jax==0.9.1
                        # pip install libtpu==0.0.38.dev20260315 --find-links https://storage.googleapis.com/jax-releases/libtpu_releases.html

                        # Environment variables
                        export VLLM_ENABLE_V1_MULTIPROCESSING=0
                        export HF_TOKEN=${HF_TOKEN}
                        export PHASED_PROFILING_DIR=gs://wenxindong-cloud-tpu-inference-test/profiling/vllm_qwen3_235b_a22b_instruct_2507/dp32/mar20
                        export VLLM_ENGINE_READY_TIMEOUT_S=7200
                        export MODEL_IMPL_TYPE=vllm
                        export NEW_MODEL_DESIGN=1
                        # export SKIP_JAX_PRECOMPILE=1

                        # Clear potentially corrupted model streamer cache
                        # rm -rf /root/.cache/vllm/assets/model_streamer

                        # Launch vllm serve via Pathways
                        JAX_PLATFORMS=proxy,cpu \
                        JAX_BACKEND_TARGET=grpc://127.0.0.1:29000 \
                        vllm serve gs://wenxindong-cloud-tpu-inference-test/models--Qwen--Qwen3-235B-A22B-Instruct-2507/ \
                          --tensor-parallel-size 8 \
                          --data-parallel-size 32 \
                          --api-server-count 1 \
                          --max-model-len 5120 \
                          --gpu-memory-utilization 0.95 \
                          --no-enable-prefix-caching \
                          --max-num-seqs 256 \
                          --max-num-batched-tokens 4096 \
                          --enable-expert-parallel \
                          --additional_config='{"sharding":{"sharding_strategy": {"enable_dp_attention":1}}}' \
                          --load-format runai_streamer
                      ) & PID=$!

                      while kill -0 $PID 2>/dev/null; do
                        sleep 5
                      done
                      wait $PID
                      EXIT_CODE=$?

                      echo "XPK End: $(date)"
                      echo "EXIT_CODE=$EXIT_CODE"
                      exit $EXIT_CODE
                  env:
                    - name: PATHWAYS_HEAD
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
                    - name: JAX_PLATFORMS
                      value: proxy
                    - name: XCLOUD_ENVIRONMENT
                      value: GCP
                    - name: JAX_BACKEND_TARGET
                      value: grpc://$(PATHWAYS_HEAD):29000
                  image: vllm/vllm-tpu:nightly
                  imagePullPolicy: Always
                  name: jax-tpu
                  resources:
                    limits:
                      cpu: "24"
                      memory: 100G
                  securityContext:
                    privileged: true
                  volumeMounts:
                    - mountPath: /tmp
                      name: shared-tmp
              dnsPolicy: ClusterFirstWithHostNet
              hostNetwork: true
              initContainers:
                - args:
                    - --server_port=29001
                    - --gcs_scratch_location=gs://cloud-pathways-staging/tmp
                    - --node_type=resource_manager
                    - --instance_count=1
                    - --instance_type=tpu7x:4x4x8
                  env:
                    - name: REPLICATED_JOB_NAME
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.annotations['jobset.sigs.k8s.io/replicatedjob-name']
                    - name: JOBSET_NAME
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.annotations['jobset.sigs.k8s.io/jobset-name']
                    - name: HOST_ADDRESS
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
                    - name: TPU_SKIP_MDS_QUERY
                      value: "true"
                  image: us-docker.pkg.dev/cloud-tpu-v2-images/pathways/server:latest
                  imagePullPolicy: Always
                  name: pathways-rm
                  ports:
                    - containerPort: 29001
                      protocol: TCP
                    - containerPort: 29002
                      protocol: TCP
                  resources:
                    limits:
                      cpu: "8"
                      memory: 32G
                  restartPolicy: Always
                - args:
                    - --server_port=29000
                    - --resource_manager_address=$(PATHWAYS_HEAD):29001
                    - --gcs_scratch_location=gs://cloud-pathways-staging/tmp
                    - --sidecar_name=external
                  env:
                    - name: PATHWAYS_HEAD
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
                  image: us-docker.pkg.dev/cloud-tpu-v2-images/pathways/proxy_server:latest
                  imagePullPolicy: Always
                  name: pathways-proxy
                  ports:
                    - containerPort: 29000
                      protocol: TCP
                  resources:
                    limits:
                      cpu: "16"
                      memory: 700G
                  restartPolicy: Always
              nodeSelector:
                cloud.google.com/gke-nodepool: cpu-np-high-ram-2
              restartPolicy: Never
              volumes:
                - hostPath:
                    path: /tmp
                    type: DirectoryOrCreate
                  name: shared-tmp
    - name: worker
      replicas: 1
      template:
        metadata:
          annotations:
            cloud.google.com/gke-tpu-slice-topology: 4x4x8
        spec:
          backoffLimit: 0
          completionMode: Indexed
          completions: 32
          parallelism: 32
          template:
            metadata:
              annotations:
                cloud.google.com/gke-tpu-slice-topology: 4x4x8
            spec:
              tolerations:
                - key: "google.com/tpu"
                  operator: "Equal"
                  value: "present"
                  effect: "NoSchedule"
              affinity:
                nodeAffinity:
                  requiredDuringSchedulingIgnoredDuringExecution:
                    nodeSelectorTerms:
                      - matchExpressions:
                          - key: cloud.google.com/gke-tpu-partition-4x4x4-state
                            operator: In
                            values:
                              - HEALTHY
                              - DEGRADED
              containers:
                - args:
                    - --server_port=29005
                    - --resource_manager_address=$(PATHWAYS_HEAD):29001
                    - --gcs_scratch_location=gs://cloud-pathways-staging/tmp
                  env:
                    - name: LIBTPU_INIT_ARGS
                      value: "--xla_tpu_log_allocations_on_oom=true"
                    - name: TPU_MIN_LOG_LEVEL
                      value: "0"
                    - name: TF_CPP_MIN_LOG_LEVEL
                      value: "0"
                    - name: XCLOUD_ENVIRONMENT
                      value: GCP
                    - name: MEGASCALE_GRPC_ENABLE_XOR_TRACER
                      value: "false"
                    - name: MEGASCALE_NUM_SLICES
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.labels['jobset.sigs.k8s.io/replicatedjob-replicas']
                    - name: JOBSET_NAME
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.annotations['jobset.sigs.k8s.io/jobset-name']
                    - name: REPLICATED_JOB_NAME
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.annotations['jobset.sigs.k8s.io/replicatedjob-name']
                    - name: MEGASCALE_SLICE_ID
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.labels['jobset.sigs.k8s.io/job-index']
                    - name: PATHWAYS_HEAD
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
                    - name: MEGASCALE_COORDINATOR_ADDRESS
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
                  image: us-docker.pkg.dev/cloud-tpu-v2-images/pathways/server:latest
                  imagePullPolicy: Always
                  name: pathways-worker
                  ports:
                    - containerPort: 29005
                      protocol: TCP
                    - containerPort: 29006
                      protocol: TCP
                    - containerPort: 8471
                      protocol: TCP
                    - containerPort: 8080
                      protocol: TCP
                  resources:
                    limits:
                      google.com/tpu: "4"
                  volumeMounts:
                    - mountPath: /tmp
                      name: shared-tmp
                - name: colocated-python-sidecar
                  image: us-east5-docker.pkg.dev/cloud-tpu-inference-test/wenxindong/colocated_python:latest
              dnsPolicy: ClusterFirstWithHostNet
              hostNetwork: true
              nodeSelector:
                cloud.google.com/gke-tpu-accelerator: tpu7x
                # cloud.google.com/gke-tpu-topology: 4x4x4
              priorityClassName: medium
              restartPolicy: Never
              terminationGracePeriodSeconds: 30
              volumes:
                - hostPath:
                    path: /tmp
                    type: DirectoryOrCreate
                  name: shared-tmp
  startupPolicy:
    startupPolicyOrder: InOrder
  successPolicy:
    operator: All
    targetReplicatedJobs:
      - pathways-head
