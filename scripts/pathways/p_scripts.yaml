apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  annotations:
    jobset.sigs.k8s.io/hack: "true"
  labels: {}
  name: s-dp16-tp8-adp # Change to your favorite run name (please use your ldap)
  namespace: default
spec:
  coordinator:
    replicatedJob: pathways-head
  failurePolicy:
    maxRestarts: 3
    restartStrategy: Recreate
  network:
    enableDNSHostnames: true
    publishNotReadyAddresses: true
  replicatedJobs:
  # ── Pathways Head (CPU pod): Resource Manager + Proxy Server + vLLM client ──
  - name: pathways-head
    replicas: 1
    template:
      metadata:
        annotations: {}
      spec:
        backoffLimit: 0
        completionMode: Indexed
        completions: 1
        parallelism: 1
        template:
          metadata:
            annotations:
              kueue.x-k8s.io/safe-to-forcefully-delete: "true"
            labels: {}
          spec:
            containers:
            - name: jax-tpu
              image: vllm/vllm-tpu:nightly
              imagePullPolicy: Always
              securityContext:
                privileged: true
              command:
                - bash
                - -c
                - |
                  echo "XPK Start: $(date)"
                  _sigterm() (kill -SIGTERM $! 2>/dev/null)
                  trap _sigterm SIGTERM

                  (
                    # # Patch local tpu-inference changes from GCS
                    # echo "Installing tpu-inference patch from GCS..."
                    # TOKEN=$(curl -s -H "Metadata-Flavor: Google" "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
                    # curl -s -H "Authorization: Bearer ${TOKEN}" \
                    #   -o /tmp/tpu-inference.tar.gz \
                    #   "https://storage.googleapis.com/wenxindong-multipod-dev/patches/tpu-inference-dp16-tp8-adp.tar.gz"
                    # mkdir -p /tmp/tpu-inference && tar xf /tmp/tpu-inference.tar.gz -C /tmp/tpu-inference || tar xzf /tmp/tpu-inference.tar.gz -C /tmp/tpu-inference
                    # # Overwrite the pre-installed /workspace/tpu_inference in-place
                    # # (editable installs there take precedence over site-packages)
                    # if [ -d /workspace/tpu_inference ]; then
                    #   cp -a /tmp/tpu-inference/. /workspace/tpu_inference/
                    # fi
                    # pip install --no-deps /tmp/tpu-inference
                    # echo "tpu-inference patch installed."

                    # Environment variables
                    export VLLM_ENABLE_V1_MULTIPROCESSING=0
                    export HF_TOKEN=${HF_TOKEN}
                    export PHASED_PROFILING_DIR=gs://wenxindong-multipod-dev/sierraq/profiling/vllm_qwen3_235b_a22b_instruct_2507/dp16-tp8-adp/20260421_000306
                    export PHASED_PROFILER_NUM_STEPS_TO_PROFILE_FOR=100
                    # export PHASED_PROFILER_NUM_DECODE_STEPS_TO_SKIP=2000
                    export VLLM_ENGINE_READY_TIMEOUT_S=72000
                    export MODEL_IMPL_TYPE=vllm
                    export NEW_MODEL_DESIGN=1
                    # export SKIP_JAX_PRECOMPILE=1
                    export RPA_D_BLOCK_SIZES="1,1024,1,512"

                    # Clear potentially corrupted model streamer cache
                    # rm -rf /root/.cache/vllm/assets/model_streamer

                    # Launch vllm serve via Pathways
                    JAX_PLATFORMS=proxy,cpu \
                    JAX_BACKEND_TARGET=grpc://127.0.0.1:29000 \
                    vllm serve Qwen/Qwen3-235B-A22B \
                    --tensor-parallel-size 8 \
                    --data-parallel-size 16 \
                    --max-model-len 5120 \
                    --gpu-memory-utilization 0.95 \
                    --no-enable-prefix-caching \
                    --max-num-seqs 256 \
                    --max-num-batched-tokens 4096 \
                    --load-format dummy \
                    --enable-expert-parallel \
                    --additional_config='{"sharding":{"sharding_strategy": {"enable_dp_attention":1}}}'
                  ) & PID=$!
                  
                  #  --enable-expert-parallel \

                  while kill -0 $PID 2>/dev/null; do
                    sleep 5
                  done
                  wait $PID
                  EXIT_CODE=$?

                  echo "XPK End: $(date)"
                  echo "EXIT_CODE=$EXIT_CODE"
                  exit $EXIT_CODE
              env:
              - name: PATHWAYS_HEAD
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
              - name: JAX_PLATFORMS
                value: proxy
              - name: XCLOUD_ENVIRONMENT
                value: GCP
              - name: JAX_BACKEND_TARGET
                value: grpc://$(PATHWAYS_HEAD):29000
              resources:
                limits:
                  cpu: "24"
                  memory: 150G
              volumeMounts:
              - mountPath: /tmp
                name: shared-tmp
            dnsPolicy: ClusterFirstWithHostNet
            hostNetwork: true
            # ── Pathways Resource Manager (sidecar initContainer) ──
            initContainers:
            - name: pathways-rm
              image: us-docker.pkg.dev/cloud-tpu-v2-images-dev/pathways/gke/ksadi/unsanitized_server@sha256:bea35fb014edf250718ce32820777ceb943dfdcf08a593b3fb762ad9ea433fdc
              imagePullPolicy: Always
              args:
              - --server_port=29001
              - --gcs_scratch_location=gs://cloud-pathways-staging/tmp
              - --node_type=resource_manager
              - --instance_count=1
              - --instance_type=tpu7x:4x4x4
              env:
              - name: REPLICATED_JOB_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.annotations['jobset.sigs.k8s.io/replicatedjob-name']
              - name: JOBSET_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.annotations['jobset.sigs.k8s.io/jobset-name']
              - name: HOST_ADDRESS
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
              - name: TPU_SKIP_MDS_QUERY
                value: "true"
              ports:
              - containerPort: 29001
                protocol: TCP
              - containerPort: 29002
                protocol: TCP
              resources:
                limits:
                  cpu: "8"
                  memory: 32G
              restartPolicy: Always
            # ── Pathways Proxy Server (sidecar initContainer, port 29000) ──
            - name: pathways-proxy
              image: us-docker.pkg.dev/cloud-tpu-v2-images-dev/pathways/gke/ksadi/unsanitized_proxy_server@sha256:e5ad4ef0ec907ba2378394f59c4ba074a82231112c03d7f80d7c4a38b19c043c
              imagePullPolicy: Always
              args:
              - --server_port=29000
              - --resource_manager_address=$(PATHWAYS_HEAD):29001
              - --gcs_scratch_location=gs://cloud-pathways-staging/tmp
              - --sidecar_name=external
              env:
              - name: PATHWAYS_HEAD
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
              ports:
              - containerPort: 29000
                protocol: TCP
              resources:
                limits:
                  cpu: "16"
                  memory: 200G
              restartPolicy: Always
            nodeSelector:
              cloud.google.com/gke-nodepool: cpu-np
            restartPolicy: Never
            terminationGracePeriodSeconds: 300
            volumes:
            - name: shared-tmp
              hostPath:
                path: /tmp
                type: DirectoryOrCreate
  # ── TPU Workers: Pathways Worker + Colocated Python sidecar ──
  - name: worker
    replicas: 1
    template:
      metadata:
        labels:
          kueue.x-k8s.io/queue-name: lq
        annotations:
          cloud.google.com/gke-tpu-slice-topology: 4x4x4 # Use your favorite 4m x 4n x 4k topology
      spec:
        backoffLimit: 2048000
        completionMode: Indexed
        completions: 16 # use num_chips / 4 (see your topology setting above)
        parallelism: 16 # same as above
        template:
          metadata:
            annotations:
              cloud.google.com/gke-tpu-slice-topology: 4x4x4 # same as above
              kueue.k8s.io/podset-required-topology: cloud.google.com/gce-topology-block
              kueue.x-k8s.io/podset-slice-required-topology: cloud.google.com/gke-tpu-partition-4x4x4-id
              kueue.x-k8s.io/podset-slice-size: "16"
              cloud.google.com/skip-tpu-webhook-check: "true"
              kueue.x-k8s.io/safe-to-forcefully-delete: "true"
            labels: {}
          spec:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                  - matchExpressions:
                    - key: cloud.google.com/gke-tpu-partition-4x4x4-state
                      operator: In
                      values:
                      - HEALTHY
                      - DEGRADED
            tolerations:
            - key: "google.com/tpu"
              operator: "Equal"
              value: "present"
              effect: "NoSchedule"
            nodeSelector:
              cloud.google.com/gke-tpu-accelerator: tpu7x
              cloud.google.com/reservation-name: ghostfish-l0727cey97uen
            hostNetwork: true
            dnsPolicy: ClusterFirstWithHostNet
            containers:
            - name: pathways-worker
              image: us-docker.pkg.dev/cloud-tpu-v2-images-dev/pathways/gke/ksadi/unsanitized_server@sha256:bea35fb014edf250718ce32820777ceb943dfdcf08a593b3fb762ad9ea433fdc
              imagePullPolicy: Always
              restartPolicy: OnFailure
              args:
              - --server_port=29005
              - --resource_manager_address=$(PATHWAYS_HEAD):29001
              - --gcs_scratch_location=gs://cloud-pathways-staging/tmp
              env:
              - name: LIBTPU_INIT_ARGS
                value: "--xla_tpu_log_allocations_on_oom=true"
              - name: TPU_MIN_LOG_LEVEL
                value: "0"
              - name: TF_CPP_MIN_LOG_LEVEL
                value: "0"
              - name: XCLOUD_ENVIRONMENT
                value: GCP
              - name: MEGASCALE_GRPC_ENABLE_XOR_TRACER
                value: "false"
              - name: MEGASCALE_NUM_SLICES
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['jobset.sigs.k8s.io/replicatedjob-replicas']
              - name: JOBSET_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.annotations['jobset.sigs.k8s.io/jobset-name']
              - name: REPLICATED_JOB_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.annotations['jobset.sigs.k8s.io/replicatedjob-name']
              - name: MEGASCALE_SLICE_ID
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['jobset.sigs.k8s.io/job-index']
              - name: PATHWAYS_HEAD
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
              - name: MEGASCALE_COORDINATOR_ADDRESS
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
              ports:
              - containerPort: 29005
                protocol: TCP
              - containerPort: 29006
                protocol: TCP
              - containerPort: 8471
                protocol: TCP
              - containerPort: 8080
                protocol: TCP
              resources:
                limits:
                  google.com/tpu: "4"
                requests:
                  google.com/tpu: "4"
              volumeMounts:
              - mountPath: /tmp
                name: shared-tmp
            initContainers:
            - name: colocated-python-sidecar
              image: us-east5-docker.pkg.dev/cloud-tpu-inference-test/wenxindong/colocated_python:latest
              imagePullPolicy: Always
              env:
              - name: GRPC_SERVER_ADDRESS
                value: "'0.0.0.0:50051'"
              ports:
              - containerPort: 50051
                protocol: TCP
              resources: {}
              restartPolicy: Always
              volumeMounts:
              - mountPath: /tmp
                name: shared-tmp
            restartPolicy: OnFailure
            terminationGracePeriodSeconds: 300
            volumes:
            - name: shared-tmp
              hostPath:
                path: /tmp
                type: DirectoryOrCreate
  startupPolicy:
    startupPolicyOrder: AnyOrder
  successPolicy:
    operator: All
    targetReplicatedJobs:
    - pathways-head