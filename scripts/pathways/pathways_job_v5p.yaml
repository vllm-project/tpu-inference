
    apiVersion: pathways-job.pathways.domain/v1
    kind: PathwaysJob
    metadata:
      name: wenxindongtest
      labels:
        kueue.x-k8s.io/queue-name: multislice-queue  # Name of the LocalQueue
        xpk.google.com/workload: wenxindongtest
    spec:
      maxRestarts: 0
      customComponents:
      
      
      
      
      workers:
      - type: ct5p-hightpu-4t
        topology: 4x8x8
        numSlices: 1
        maxSliceRestarts: 1
        terminationGracePeriodSeconds: 30
        priorityClassName: very-high
        nodeSelector:
          
          
      pathwaysDir: gs://cloud-pathways-staging/tmp #This bucket needs to be created in advance.
      controller:
        # #Pod template for training, default mode.
        deploymentMode: default
        mainContainerName: jax-tpu
        elasticSlices: 0
        template:
      
          metadata:
          spec:
            containers:
              
              - name: jax-tpu
                image: vllm/vllm-tpu:nightly
                imagePullPolicy: Always
                env: 
                securityContext:
                  privileged: true
                command:
                - bash
                - -c
                - |
                  echo "XPK Start: $(date)"
                  _sigterm() (kill -SIGTERM $! 2>/dev/null)
                  trap _sigterm SIGTERM

                  (
                    # Patch local tpu-inference changes from GCS
                    echo "Installing tpu-inference patch from GCS..."
                    TOKEN=$(curl -s -H "Metadata-Flavor: Google" "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
                    curl -s -H "Authorization: Bearer ${TOKEN}" \
                      -o /tmp/tpu-inference.tar.gz \
                      "https://storage.googleapis.com/wenxindong-multipod-dev/patches/tpu-inference.tar.gz"
                    mkdir -p /tmp/tpu-inference && tar xzf /tmp/tpu-inference.tar.gz -C /tmp/tpu-inference
                    # Overwrite the pre-installed /workspace/tpu_inference in-place
                    # (editable installs there take precedence over site-packages)
                    if [ -d /workspace/tpu_inference ]; then
                      cp -a /tmp/tpu-inference/. /workspace/tpu_inference/
                    fi
                    pip install --no-deps /tmp/tpu-inference
                    echo "tpu-inference patch installed."

                    # Environment variables
                    export VLLM_ENABLE_V1_MULTIPROCESSING=0
                    export HF_TOKEN=${HF_TOKEN}
                    export PHASED_PROFILING_DIR=gs://wenxindong-multipod-dev/profiling/vllm_qwen3_235b_a22b_instruct_2507/dp32/mar20
                    export VLLM_ENGINE_READY_TIMEOUT_S=7200
                    export MODEL_IMPL_TYPE=vllm
                    export NEW_MODEL_DESIGN=1
                    # export SKIP_JAX_PRECOMPILE=1

                    # Clear potentially corrupted model streamer cache
                    # rm -rf /root/.cache/vllm/assets/model_streamer

                    # Launch vllm serve via Pathways
                    JAX_PLATFORMS=proxy,cpu \
                    JAX_BACKEND_TARGET=grpc://127.0.0.1:29000 \
                    vllm serve gs://wenxindong-multipod-dev/models--Qwen--Qwen3-235B-A22B-Instruct-2507/ \
                      --tensor-parallel-size 8 \
                      --data-parallel-size 32 \
                      --api-server-count 1 \
                      --max-model-len 5120 \
                      --gpu-memory-utilization 0.95 \
                      --no-enable-prefix-caching \
                      --max-num-seqs 256 \
                      --max-num-batched-tokens 4096 \
                      --enable-expert-parallel \
                      --additional_config='{"sharding":{"sharding_strategy": {"enable_dp_attention":1}}}' \
                      --load-format runai_streamer
                  ) & PID=$!

                  while kill -0 $PID 2>/dev/null; do
                    sleep 5
                  done
                  wait $PID
                  EXIT_CODE=$?

                  echo "XPK End: $(date)"
                  echo "EXIT_CODE=$EXIT_CODE"
                  exit $EXIT_CODE
                resources:
                  limits:
                    cpu: "24"
                    memory: 700G

                volumeMounts:
                - mountPath: /tmp
                  name: shared-tmp
                

            nodeSelector:
              cloud.google.com/gke-nodepool: cpu-np-high-ram
            hostNetwork: true
            dnsPolicy: ClusterFirstWithHostNet
            restartPolicy: Never
            volumes:
            - hostPath:
                path: /tmp
                type: DirectoryOrCreate
              name: shared-tmp
    
