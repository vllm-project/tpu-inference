name: Create Branch and PR
on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Name of the branch to create'
        required: true
        default: 'buildkite-patch'
      pr_title:
        description: 'Title of the PR'
        required: true
        default: 'Automated PR from Buildkite'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Example modification to create a change
      - name: Make changes
        run: echo "Triggered by Buildkite" >> build-log.txt

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Or use your Peter Evans GitHub App Token
          branch: ${{ github.event.inputs.branch_name }}
          title: ${{ github.event.inputs.pr_title }}
          body: "This PR was automatically generated by Buildkite."