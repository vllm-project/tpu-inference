name: Marin Nightly Release

on:
  schedule:
    - cron: '35 6 * * *'
  workflow_dispatch:
    inputs:
      ref:
        description: Optional SHA or ref to publish. Defaults to the latest successful marin-validate run on main.
        required: false
        type: string

concurrency:
  group: marin-nightly
  cancel-in-progress: false

permissions:
  actions: read
  contents: write

jobs:
  publish:
    name: Publish Marin Nightly
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GH_TOKEN: ${{ secrets.MARIN_RELEASE_TOKEN != '' && secrets.MARIN_RELEASE_TOKEN || github.token }}
      JAX_PLATFORMS: cpu
      TPU_ACCELERATOR_TYPE: v6e-8
      TPU_NAME: ci
      TPU_WORKER_ID: "0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require cross-repo release token
        run: |
          if [[ -z "${{ secrets.MARIN_RELEASE_TOKEN }}" ]]; then
            echo "MARIN_RELEASE_TOKEN is required to attach paired manifests in marin-community/vllm." >&2
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Resolve requested SHA
        id: ref
        run: |
          TARGET_SHA=""
          if [[ -n "${{ inputs.ref }}" ]]; then
            git fetch origin "${{ inputs.ref }}" --depth=1 || true
            TARGET_SHA=$(git rev-parse "${{ inputs.ref }}^{commit}")
          fi
          echo "TARGET_SHA=${TARGET_SHA}" >> "$GITHUB_OUTPUT"

      - name: Download validated artifact
        run: |
          RUN_ID=$(bash .github/scripts/marin_release.sh resolve-validate-run \
            "$GITHUB_REPOSITORY" \
            "marin-validate.yml" \
            "main" \
            "${{ steps.ref.outputs.TARGET_SHA }}")
          bash .github/scripts/marin_release.sh download-validate-artifact \
            "$GITHUB_REPOSITORY" \
            "$RUN_ID" \
            "marin-validate-dist" \
            validated

      - name: Download paired vLLM nightly assets
        run: |
          bash .github/scripts/marin_release.sh download-release-assets \
            "marin-community/vllm" \
            "marin-nightly" \
            paired-vllm \
            "*.whl" \
            "marin-build.json"

      - name: Pair-validate exact nightly wheels
        run: |
          python .github/scripts/wheel_metadata.py \
            --wheel paired-vllm/*.whl \
            --requirements-out /tmp/vllm-wheel-reqs.txt \
            --forbid-prefix tpu-inference \
            --forbid-prefix tpu_inference \
            --error-on-forbidden

          uv venv .marin-nightly
          . .marin-nightly/bin/activate
          uv pip install -r /tmp/vllm-wheel-reqs.txt validated/*.whl
          uv pip install --no-deps paired-vllm/*.whl
          python -c "import tpu_inference; from tpu_inference.runner.tpu_runner import TPUModelRunner"

      - name: Publish immutable nightly release
        id: immutable
        run: |
          SHORT_SHA=$(jq -r '.short_sha' validated/marin-build.json)
          DATE=$(jq -r '.date' validated/marin-build.json)
          SHA=$(jq -r '.sha' validated/marin-build.json)
          TAG="marin-nightly-${DATE}-${SHORT_SHA}"
          TITLE="Marin nightly ${DATE} (${SHORT_SHA})"

          cat > /tmp/tpu-nightly-notes.md <<EOF
          Auto-published nightly release for \`$SHA\`.

          This release reuses the exact wheel produced by the latest successful \`marin-validate.yml\` run on \`main\`.

          The paired \`vllm\` nightly manifest is attached to this release and the matching \`marin-community/vllm\` release after the pair gate passes.
          EOF

          bash .github/scripts/marin_release.sh upsert-release \
            "$GITHUB_REPOSITORY" \
            "$TAG" \
            "$SHA" \
            true \
            "$TITLE" \
            /tmp/tpu-nightly-notes.md \
            validated/*.whl \
            validated/marin-build.json

          echo "TAG=${TAG}" >> "$GITHUB_OUTPUT"
          echo "SHA=${SHA}" >> "$GITHUB_OUTPUT"
          echo "DATE=${DATE}" >> "$GITHUB_OUTPUT"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Update nightly alias
        run: |
          cat > /tmp/tpu-nightly-alias-notes.md <<EOF
          Moving alias for the latest Marin nightly release.

          Current immutable release: \`${{ steps.immutable.outputs.TAG }}\`
          Commit: \`${{ steps.immutable.outputs.SHA }}\`
          EOF

          bash .github/scripts/marin_release.sh move-tag \
            "$GITHUB_REPOSITORY" \
            "marin-nightly" \
            "${{ steps.immutable.outputs.SHA }}"

          bash .github/scripts/marin_release.sh upsert-release \
            "$GITHUB_REPOSITORY" \
            "marin-nightly" \
            "${{ steps.immutable.outputs.SHA }}" \
            true \
            "Marin nightly (latest)" \
            /tmp/tpu-nightly-alias-notes.md \
            validated/*.whl \
            validated/marin-build.json

      - name: Create pair manifest
        id: pair
        run: |
          VLLM_DATE=$(jq -r '.date' paired-vllm/marin-build.json)
          VLLM_SHORT_SHA=$(jq -r '.short_sha' paired-vllm/marin-build.json)
          VLLM_SHA=$(jq -r '.sha' paired-vllm/marin-build.json)
          VLLM_TAG="marin-nightly-${VLLM_DATE}-${VLLM_SHORT_SHA}"
          RELEASED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          jq -n \
            --arg release_type "nightly" \
            --arg released_at "$RELEASED_AT" \
            --arg vllm_sha "$VLLM_SHA" \
            --arg vllm_tag "$VLLM_TAG" \
            --arg tpu_sha "${{ steps.immutable.outputs.SHA }}" \
            --arg tpu_tag "${{ steps.immutable.outputs.TAG }}" \
            '{
              release_type: $release_type,
              released_at: $released_at,
              vllm_sha: $vllm_sha,
              vllm_tag: $vllm_tag,
              tpu_inference_sha: $tpu_sha,
              tpu_inference_tag: $tpu_tag
            }' > marin-release-pair.json

          {
            echo "VLLM_TAG=${VLLM_TAG}"
            echo "VLLM_SHA=${VLLM_SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Attach paired manifest to both repos
        run: |
          VLLM_IMMUTABLE_TITLE="Marin nightly $(jq -r '.date' paired-vllm/marin-build.json) ($(jq -r '.short_sha' paired-vllm/marin-build.json))"

          cat > /tmp/vllm-nightly-paired-notes.md <<EOF
          Auto-published nightly release for \`${{ steps.pair.outputs.VLLM_SHA }}\`.

          Paired \`tpu-inference\` nightly: \`${{ steps.immutable.outputs.TAG }}\`
          EOF

          cat > /tmp/vllm-nightly-alias-paired-notes.md <<EOF
          Moving alias for the latest Marin nightly release.

          Current immutable release: \`${{ steps.pair.outputs.VLLM_TAG }}\`
          Paired \`tpu-inference\` nightly: \`${{ steps.immutable.outputs.TAG }}\`
          EOF

          cat > /tmp/tpu-nightly-paired-notes.md <<EOF
          Auto-published nightly release for \`${{ steps.immutable.outputs.SHA }}\`.

          Paired \`vllm\` nightly: \`${{ steps.pair.outputs.VLLM_TAG }}\`
          EOF

          cat > /tmp/tpu-nightly-alias-paired-notes.md <<EOF
          Moving alias for the latest Marin nightly release.

          Current immutable release: \`${{ steps.immutable.outputs.TAG }}\`
          Paired \`vllm\` nightly: \`${{ steps.pair.outputs.VLLM_TAG }}\`
          EOF

          bash .github/scripts/marin_release.sh upsert-release \
            "marin-community/vllm" \
            "${{ steps.pair.outputs.VLLM_TAG }}" \
            "${{ steps.pair.outputs.VLLM_SHA }}" \
            true \
            "$VLLM_IMMUTABLE_TITLE" \
            /tmp/vllm-nightly-paired-notes.md \
            paired-vllm/*.whl \
            paired-vllm/marin-build.json \
            marin-release-pair.json

          bash .github/scripts/marin_release.sh upsert-release \
            "marin-community/vllm" \
            "marin-nightly" \
            "${{ steps.pair.outputs.VLLM_SHA }}" \
            true \
            "Marin nightly (latest)" \
            /tmp/vllm-nightly-alias-paired-notes.md \
            paired-vllm/*.whl \
            paired-vllm/marin-build.json \
            marin-release-pair.json

          bash .github/scripts/marin_release.sh upsert-release \
            "$GITHUB_REPOSITORY" \
            "${{ steps.immutable.outputs.TAG }}" \
            "${{ steps.immutable.outputs.SHA }}" \
            true \
            "Marin nightly ${{ steps.immutable.outputs.DATE }} (${{ steps.immutable.outputs.SHORT_SHA }})" \
            /tmp/tpu-nightly-paired-notes.md \
            validated/*.whl \
            validated/marin-build.json \
            marin-release-pair.json

          bash .github/scripts/marin_release.sh upsert-release \
            "$GITHUB_REPOSITORY" \
            "marin-nightly" \
            "${{ steps.immutable.outputs.SHA }}" \
            true \
            "Marin nightly (latest)" \
            /tmp/tpu-nightly-alias-paired-notes.md \
            validated/*.whl \
            validated/marin-build.json \
            marin-release-pair.json
