name: pre-commit

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Resolve changed files
        id: files
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            mapfile -t FILES < <(
              git diff --name-only --diff-filter=ACMR \
                "origin/${{ github.base_ref }}...${GITHUB_SHA}"
            )
          else
            BEFORE="${{ github.event.before }}"
            if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
              mapfile -t FILES < <(git diff-tree --no-commit-id --name-only -r "${GITHUB_SHA}")
            else
              mapfile -t FILES < <(git diff --name-only --diff-filter=ACMR "$BEFORE" "${GITHUB_SHA}")
            fi
          fi

          if [[ "${#FILES[@]}" -eq 0 ]]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "count=${#FILES[@]}"
            echo "files<<EOF"
            printf '%s\n' "${FILES[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run pre-commit on changed files
        if: steps.files.outputs.count != '0'
        run: |
          mapfile -t FILES <<'EOF'
          ${{ steps.files.outputs.files }}
          EOF
          pre-commit run --show-diff-on-failure --color=always --files "${FILES[@]}"
